function renderTeacherGen(){const p=document.getElementById('page-teacher-gen');if(!p)return;const book=getCurrentBook();p.innerHTML=`<div class="content"><div class="section-title">시험지 <span>출제</span></div><div class="teacher-section"><h2>📘 목록 선택</h2><p style="font-size:.82rem;color:var(--text2);margin-bottom:1rem;">현재 단어장: ${eh(book.title)}</p><div id="teacher-day-grid" style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;"></div><div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;"><div><div style="font-size:.75rem;color:var(--text2);margin-bottom:.25rem;">문제 수</div><select id="exam-count" class="inp" style="width:auto;padding:.5rem .75rem;"><option value="20">20개</option><option value="40">40개</option><option value="60">60개</option><option value="100" selected>100개</option></select></div></div><button class="gen-btn" onclick="genExam()">✦ 시험지 생성</button></div><div id="gen-result"></div><div class="teacher-section" style="margin-top:1rem;"><h2>📋 생성된 시험 목록</h2><div id="exam-list"></div></div></div>`;const grid=document.getElementById('teacher-day-grid');getDayKeys(book).forEach(dk=>{const el=document.createElement('label');el.style.cssText='display:flex;align-items:center;gap:6px;font-size:.82rem;cursor:pointer;padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);';el.innerHTML=`<input type="checkbox" value="${ea(dk)}" style="accent-color:var(--teacher);"> ${getDayLabel(dk)}`;grid.appendChild(el);});renderExamList();}
async function genExam(){const book=getCurrentBook();const selected=[];document.querySelectorAll('#teacher-day-grid input[type=checkbox]:checked').forEach(cb=>selected.push(cb.value));if(!selected.length){alert('목록을 선택하세요.');return;}const count=parseInt((document.getElementById('exam-count')||{}).value||100,10);let pool=[];selected.forEach(dk=>pool=pool.concat((getDayWords(book,dk)||[]).map(w=>({...w,dayKey:String(dk),bookId:book.id,bookTitle:book.title}))));pool=shuffle(pool).slice(0,Math.min(count,pool.length));const code='EX'+String(Math.floor(Math.random()*9000)+1000);const exam={code,bookId:book.id,bookTitle:book.title,dayKeys:selected,words:pool,created:new Date().toISOString(),count:pool.length,ownerUid:currentUid,ownerUsername:activeUsername,active:true};if(firebaseEnabled&&fbDb){try{await fbDb.collection('exams').doc(code).set(exam,{merge:true});}catch(e){alert('저장 실패: '+e.message);return;}}generatedExams.unshift(exam);document.getElementById('gen-result').innerHTML=`<div class="exam-code-display"><div style="font-size:.8rem;color:var(--text2);margin-bottom:.5rem;">시험 코드 생성 완료</div><div class="exam-code">${code}</div><div style="font-size:.85rem;color:var(--text2);margin-top:.5rem;">${eh(book.title)} · ${pool.length}문제 · ${selected.map(getDayLabel).join(', ')}</div></div>`;renderExamList();}
function renderExamList(){const el=document.getElementById('exam-list');if(!el)return;if(!generatedExams.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div>아직 출제한 시험이 없습니다.</div>`;return;}el.innerHTML=generatedExams.map(e=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:.6rem;display:flex;align-items:center;gap:1rem;"><div class="exam-code" style="font-size:1.5rem;">${e.code}</div><div style="flex:1;"><div style="font-weight:700;">${eh(e.bookTitle||'')}</div><div style="font-size:.78rem;color:var(--text2);">${(e.dayKeys||[]).map(getDayLabel).join(', ')} · ${e.count}문제 · ${new Date(e.created).toLocaleDateString('ko-KR')}</div></div><button onclick="delExam('${e.code}')" style="background:none;border:none;color:var(--text3);cursor:pointer;">🗑</button></div>`).join('');}
async function delExam(code){if(!confirm('시험을 삭제할까요?'))return;if(firebaseEnabled&&fbDb){try{await fbDb.collection('exams').doc(code).delete();}catch(e){}}generatedExams=generatedExams.filter(e=>e.code!==code);renderExamList();}

function buildDSMulti(cid,book,sel,cb){const c=document.getElementById(cid);if(!c)return;c.innerHTML='';getDayKeys(book).forEach(dk=>{const b=document.createElement('button');b.className='day-btn'+(sel.includes(dk)?' active':'');b.textContent=getDayLabel(dk);b.onclick=()=>{if(sel.includes(dk))sel=sel.filter(x=>x!==dk);else sel=[...sel,dk];b.classList.toggle('active',sel.includes(dk));cb([...sel]);};c.appendChild(b);});}
function renderStudentExam(){const p=document.getElementById('page-exam');if(!p)return;const book=getCurrentBook();let pracDays=getDayKeys(book).slice(0,1);p.innerHTML=`<div class="content"><div class="section-title">단어 <span>시험</span></div><div class="account-note">계정: <strong>${eh(activeUsername)}</strong></div><div class="code-entry"><h2>시험 코드 입력</h2><p style="font-size:.82rem;color:var(--text2);">선생님이 출제한 시험 코드를 입력하세요.</p><input class="big-input" id="student-code" maxlength="6" placeholder="EX1234" oninput="this.value=this.value.toUpperCase()"><button class="btn primary" onclick="startExam()">시험 시작</button><div style="border-top:1px solid var(--border);padding-top:1.25rem;margin-top:.5rem;"><p style="font-size:.82rem;color:var(--text2);margin-bottom:.75rem;">또는 연습 시험</p><div class="day-selector" id="exam-days"></div><button class="btn" style="margin-top:.75rem;" onclick="startPractice()">연습 시험 보기</button></div></div></div>`;buildDSMulti('exam-days',book,pracDays,days=>{pracDays=days;});window._getPD=()=>pracDays;}
async function startExam(){const code=(document.getElementById('student-code')||{}).value||'';if(!code.trim()){alert('시험 코드를 입력하세요.');return;}if(!firebaseEnabled||!fbDb){alert('Firebase 연결이 필요합니다.');return;}try{const doc=await fbDb.collection('exams').doc(code.trim().toUpperCase()).get();if(!doc.exists){alert('해당 코드의 시험을 찾을 수 없습니다.');return;}const exam=doc.data()||{};examStudentName=activeUsername||'학생';examDays=exam.dayKeys||[];examWords=(exam.words||[]).map(w=>({...w}));currentExamCode=doc.id;currentExamOwnerUid=exam.ownerUid||'';beginExam();}catch(e){alert('오류: '+e.message);}}
function startPractice(){const book=getCurrentBook();const days=window._getPD?window._getPD():getDayKeys(book).slice(0,1);if(!days.length){alert('목록을 선택하세요.');return;}examStudentName=activeUsername||'연습';examDays=days;let pool=[];days.forEach(dk=>pool=pool.concat((getDayWords(book,dk)||[]).map(w=>({...w,dayKey:String(dk),bookId:book.id,bookTitle:book.title}))));examWords=shuffle(pool).slice(0,Math.min(100,pool.length));currentExamCode=null;beginExam();}
function beginExam(){examAnswers=examWords.map(()=>({val:'',result:''}));examIndex=0;clearExamTimer();renderRunner();}
function clearExamTimer(){if(examTimer)clearInterval(examTimer);examTimer=null;}
function renderRunner(){const p=document.getElementById('page-exam');if(!p)return;const cur=examWords[examIndex];if(!cur){renderStudentExam();return;}p.innerHTML=`<div class="content"><div class="section-title">단어 시험 <span style="font-size:.8rem;color:var(--text2);">— ${eh(examStudentName)}</span></div><div class="exam-meta"><div class="exam-meta-card"><div class="exam-meta-label">진행</div><div class="exam-meta-val">${examIndex+1}/${examWords.length}</div></div><div class="exam-meta-card"><div class="exam-meta-label">제한시간</div><div class="exam-meta-val">40초</div></div><div class="exam-meta-card"><div class="exam-meta-label">목록</div><div class="exam-meta-val" style="font-size:.85rem;">${examDays.map(getDayLabel).join(', ')}</div></div></div><div class="exam-stage"><div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;"><div style="font-size:.7rem;color:var(--text3);font-family:var(--mono);">${String(examIndex+1).padStart(2,'0')}</div><div class="exam-timer" id="e-timer">40</div><div style="font-size:.82rem;color:var(--text2);">한국어 뜻을 쓰세요</div></div><div class="exam-word-big">${eh(cur.en)}</div><input class="exam-input" id="e-inp" placeholder="한글 뜻 입력..." autocomplete="off" onkeydown="if(event.key==='Enter')submitAns(false)"><div class="exam-controls"><button class="btn primary" onclick="submitAns(false)">${examIndex===examWords.length-1?'제출 후 결과 보기':'입력 후 다음'}</button><button class="btn" onclick="submitAns(true)">${examIndex===examWords.length-1?'건너뛰고 결과':'건너뛰기'}</button></div><div class="inline-danger">입력 즉시 다음 문제로 넘어갑니다. 선생님이 최종 채점합니다.</div></div></div>`;document.getElementById('e-inp')?.focus();startTimer();}
function startTimer(){clearExamTimer();examCountdown=40;const el=document.getElementById('e-timer');if(el){el.textContent=40;el.className='exam-timer';}examTimer=setInterval(()=>{examCountdown--;const t=document.getElementById('e-timer');if(!t){clearExamTimer();return;}t.textContent=examCountdown;if(examCountdown<=10)t.classList.add('urgent');if(examCountdown<=0)submitAns(false,true);},1000);}
function submitAns(skip=false,timeout=false){clearExamTimer();const inp=document.getElementById('e-inp');const raw=skip||timeout?'':(inp&&inp.value)||'';examAnswers[examIndex].val=raw;if(examIndex>=examWords.length-1)finishExam();else{examIndex++;renderRunner();}}
function finishExam(){clearExamTimer();examWords.forEach((w,i)=>{const ans=(examAnswers[i].val||'').trim();if(!ans)examAnswers[i].result='empty';else if(isMeaningCorrect(ans,w.kr||''))examAnswers[i].result='correct';else examAnswers[i].result='wrong';});const{correct,wrong,empty,score}=summarizeAnswers(examAnswers);renderResult(score,correct,wrong,empty);}
function renderResult(score,correct,wrong,empty){const p=document.getElementById('page-exam');const pass=score>=60;const dayStr=examDays.map(getDayLabel).join(', ');const now=new Date().toLocaleString('ko-KR');p.innerHTML=`<div class="content"><div class="section-title">시험 <span>결과</span></div><div class="result-hero"><div class="result-score ${pass?'pass':'fail'}">${score}점</div><div style="color:var(--text2);font-size:.85rem;margin-top:.5rem;">${eh(examStudentName)} · ${eh(dayStr)} · ${now}</div><div style="margin-top:.75rem;">${correct}개 정답 · ${wrong}개 오답 · ${empty}개 미응답 / 총 ${examWords.length}</div><div class="result-review-note">📝 임시 채점입니다. 선생님이 최종 수정할 수 있습니다.</div></div><div class="result-list">${examWords.map((w,i)=>{const r=examAnswers[i].result;return `<div class="result-row ${r}"><div class="result-num">${String(i+1).padStart(2,'0')}</div><div class="result-word">${eh(w.en)}</div><div style="color:${r==='correct'?'var(--accent)':r==='wrong'?'var(--accent2)':'var(--text3)'};">${eh(examAnswers[i].val||'(미응답)')}</div><div style="color:var(--text2);font-size:.8rem;">기준: ${eh(w.kr||'')}</div></div>`;}).join('')}</div><div style="padding:1rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);"><div id="submit-status">${currentExamCode?'선생님께 자동 제출 중...':'연습 시험은 자동 제출되지 않습니다.'}</div></div><button class="btn" style="margin-top:.75rem;" onclick="renderStudentExam()">← 처음으로</button></div>`;if(currentExamCode)autoSubmit(score,correct,wrong,empty);}
async function autoSubmit(score,correct,wrong,empty){if(!firebaseEnabled||!fbDb){setEl('submit-status','Firebase 연결 필요');return;}const sub={name:examStudentName||activeUsername,studentUid:currentUid,studentEmail:currentEmail,score,correct,wrong,empty,total:examWords.length,days:examDays,code:currentExamCode,teacherUid:currentExamOwnerUid||null,bookTitle:examWords[0]?.bookTitle||getCurrentBook().title,timestamp:new Date().toISOString(),reviewPending:true,answers:examWords.map((w,i)=>({word:w.en,kr:w.kr,student:examAnswers[i].val||'',result:examAnswers[i].result,dayKey:w.dayKey||''}))};try{const ref=await fbDb.collection('submissions').add(sub);studentSubmissions.unshift({...sub,_docId:ref.id});setEl('submit-status',`✅ 자동 제출 완료 · 임시 ${score}점 · 선생님이 최종 채점합니다.`);}catch(e){setEl('submit-status','제출 실패: '+e.message);}}

function renderTeacherInbox(){const p=document.getElementById('page-teacher-inbox');if(!p)return;p.innerHTML=`<div class="content"><div class="section-title">제출함 <span>(${submissions.length})</span></div><div style="display:flex;justify-content:flex-end;margin-bottom:1rem;"><button class="btn" onclick="loadSubmissions().then(renderTeacherInbox)">새로고침</button></div>${!submissions.length?'<div class="empty-state"><div class="empty-icon">📬</div>제출된 결과가 없습니다.</div>':''}<div class="inbox-list">${submissions.slice().reverse().map((s,ri)=>{const idx=submissions.length-1-ri;const pass=s.score>=60;return `<div class="inbox-item" onclick="openSub(${idx})"><div class="inbox-item-header"><div class="inbox-name">${eh(s.name)} ${s.reviewPending?'🕒':'✅'}</div><div class="inbox-score ${pass?'pass':'fail'}">${s.score}점</div></div><div class="inbox-meta">${eh(s.bookTitle||'')} · ${(s.days||[]).map(getDayLabel).join(', ')} · ${s.correct}/${s.total} · ${new Date(s.timestamp).toLocaleString('ko-KR')} ${s.code?'· '+s.code:''}</div></div>`;}).join('')}</div>${submissions.length?`<button class="btn danger" style="margin-top:1.25rem;" onclick="clearSubs()">제출 기록 초기화</button>`:''}</div>`;}
function openSub(idx){const s=submissions[idx];if(!s)return;const mc=document.getElementById('modal-content');const pass=s.score>=60;mc.innerHTML=`<h2>${eh(s.name)}님 시험 결과</h2><div class="review-summary-grid"><div class="review-summary-card"><div style="font-size:2rem;font-weight:800;color:${pass?'var(--accent3)':'var(--accent2)'};">${s.score}점</div></div><div class="review-summary-card"><div style="font-size:1.5rem;font-weight:800;color:var(--accent);">${s.correct}</div><div style="font-size:.75rem;color:var(--text2);">정답</div></div><div class="review-summary-card"><div style="font-size:1.5rem;font-weight:800;color:var(--accent2);">${s.wrong}</div><div style="font-size:.75rem;color:var(--text2);">오답</div></div></div><div class="result-review-note">문항을 클릭해서 정답/오답을 수정할 수 있습니다.</div><div class="result-list">${(s.answers||[]).map((a,i)=>`<div class="result-row ${a.result}"><div class="result-num">${String(i+1).padStart(2,'0')}</div><div style="flex:1;"><div class="result-word">${eh(a.word)}</div><div style="font-size:.8rem;color:var(--text2);">기준: ${eh(a.kr||'')}</div><div style="font-size:.88rem;margin-top:.25rem;">학생 답: <strong>${eh(a.student||'(미응답)')}</strong></div><div class="review-chip-row"><button class="review-chip${a.result==='correct'?' active correct':''}" onclick="setR(${idx},${i},'correct')">정답</button><button class="review-chip${a.result==='wrong'?' active wrong':''}" onclick="setR(${idx},${i},'wrong')">오답</button><button class="review-chip${a.result==='empty'?' active empty':''}" onclick="setR(${idx},${i},'empty')">미응답</button></div></div></div>`).join('')}</div>`;document.getElementById('modal-overlay').classList.add('show');}
async function setR(subIdx,ansIdx,r){const s=submissions[subIdx];if(!s||!s.answers[ansIdx])return;s.answers[ansIdx].result=r;s.reviewPending=false;const{correct,wrong,empty,total,score}=summarizeAnswers(s.answers);Object.assign(s,{correct,wrong,empty,total,score});if(firebaseEnabled&&fbDb&&s._docId){try{await fbDb.collection('submissions').doc(s._docId).set({answers:s.answers,reviewPending:false,correct,wrong,empty,total,score,reviewedAt:new Date().toISOString()},{merge:true});}catch(e){console.warn(e);}}renderTeacherInbox();openSub(subIdx);}
async function clearSubs(){if(!confirm('제출 기록을 모두 삭제할까요?'))return;if(firebaseEnabled&&fbDb){const snap=await fbDb.collection('submissions').where('teacherUid','==',currentUid).get();const batch=fbDb.batch();snap.docs.forEach(d=>batch.delete(d.ref));await batch.commit();}submissions=[];renderTeacherInbox();}

async function renderStudentResults(){const p=document.getElementById('page-student-results');if(!p)return;await loadStudentSubmissions();p.innerHTML=`<div class="content"><div class="section-title">내 <span>결과</span></div><div class="account-note">계정: <strong>${eh(activeUsername)}</strong></div><div style="display:flex;justify-content:flex-end;margin-bottom:1rem;"><button class="btn" onclick="renderStudentResults()">새로고침</button></div>${!studentSubmissions.length?'<div class="empty-state"><div class="empty-icon">📊</div>아직 제출한 시험 결과가 없습니다.</div>':''}<div class="inbox-list">${studentSubmissions.map((s,idx)=>{const pass=s.score>=60;const reviewed=!s.reviewPending;return `<div class="inbox-item" onclick="openStudentSub(${idx})"><div class="inbox-item-header"><div class="inbox-name">${eh(s.bookTitle||'')} ${reviewed?'✅':'🕒'}</div><div class="inbox-score ${pass?'pass':'fail'}">${s.score}점</div></div><div class="inbox-meta">${(s.days||[]).map(getDayLabel).join(', ')} · ${s.correct}/${s.total} · ${new Date(s.timestamp).toLocaleString('ko-KR')} ${reviewed?'· 검토완료':'· 검토중'}</div></div>`;}).join('')}</div></div>`;}
function openStudentSub(idx){const s=studentSubmissions[idx];if(!s)return;const mc=document.getElementById('modal-content');const pass=s.score>=60;mc.innerHTML=`<h2>내 시험 결과</h2><div class="review-summary-grid"><div class="review-summary-card"><div style="font-size:2rem;font-weight:800;color:${pass?'var(--accent3)':'var(--accent2)'};">${s.score}점</div><div style="font-size:.75rem;color:var(--text2);">${new Date(s.timestamp).toLocaleString('ko-KR')}</div></div><div class="review-summary-card"><div style="font-size:1.5rem;font-weight:800;color:var(--accent);">${s.correct}</div><div style="font-size:.75rem;color:var(--text2);">정답</div></div><div class="review-summary-card"><div style="font-size:1.5rem;font-weight:800;color:var(--accent2);">${s.wrong}</div><div style="font-size:.75rem;color:var(--text2);">오답</div></div></div><div class="result-review-note">${s.reviewPending?'🕒 선생님 검토 중':'✅ 검토 완료'}</div><div class="result-list">${(s.answers||[]).map((a,i)=>`<div class="result-row ${a.result}"><div class="result-num">${String(i+1).padStart(2,'0')}</div><div style="flex:1;"><div class="result-word">${eh(a.word)}</div><div style="font-size:.8rem;color:var(--text2);">기준: ${eh(a.kr||'')}</div><div style="font-size:.88rem;margin-top:.25rem;">내 답: <strong>${eh(a.student||'(미응답)')}</strong></div><div style="margin-top:.35rem;font-size:.82rem;font-weight:700;color:${a.result==='correct'?'var(--accent)':a.result==='wrong'?'var(--accent2)':'var(--text3)'};">${a.result==='correct'?'정답':a.result==='wrong'?'오답':'미응답'}</div></div></div>`).join('')}</div>`;document.getElementById('modal-overlay').classList.add('show');}

function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('show');}
</script>

<script>
(function(){
  let allProfiles = [];
  let teacherStudentFilter = 'all';
  let unsubProfiles = null;
  let unsubTeacherSubs = null;
  let unsubStudentSubs = null;
  const original = {
    unsubAll: window.unsubAll,
    buildNav: window.buildNav,
    renderAll: window.renderAll,
    loadAllData: window.loadAllData,
    loadProfile: window.loadProfile,
    saveProfile: window.saveProfile,
    renderPassContent: window.renderPassContent,
    togHwDone: window.togHwDone,
    autoSubmit: window.autoSubmit,
    renderTeacherInbox: window.renderTeacherInbox,
    renderPassageTeacherPage: window.renderPassageTeacherPage,
    renderHomeworkTeacherPage: window.renderHomeworkTeacherPage,
    renderStudentResults: window.renderStudentResults
  };

  function nowISO(){ return new Date().toISOString(); }
  function debounce(fn, delay=600){
    let t=null;
    return function(...args){
      clearTimeout(t);
      t=setTimeout(()=>fn.apply(this,args), delay);
    };
  }
  function getProfileMap(){
    const m = new Map();
    (allProfiles||[]).forEach(p=>m.set(p.id, p));
    return m;
  }
  function getStudentDirectory(){
    const m = new Map();
    (allProfiles||[]).forEach(p=>{
      const name = p.username || p.email || p.id;
      m.set(p.id,{uid:p.id,name,email:p.email||'',profile:p});
    });
    (submissions||[]).forEach(s=>{
      if(!s.studentUid) return;
      const prev = m.get(s.studentUid) || {uid:s.studentUid,name:s.name||s.studentEmail||s.studentUid,email:s.studentEmail||''};
      if(!prev.name && s.name) prev.name = s.name;
      if(!prev.email && s.studentEmail) prev.email = s.studentEmail;
      m.set(s.studentUid, prev);
    });
    (passages||[]).forEach(ps=>{
      (ps.vocabRequests||[]).forEach(r=>{
        if(!r.studentUid) return;
        const prev = m.get(r.studentUid) || {uid:r.studentUid,name:r.studentName||r.studentUid,email:''};
        if(!prev.name && r.studentName) prev.name = r.studentName;
        m.set(r.studentUid, prev);
      });
    });
    return Array.from(m.values()).sort((a,b)=>String(a.name||a.uid).localeCompare(String(b.name||b.uid),'ko'));
  }
  function currentTeacherStudent(){ return teacherStudentFilter; }
  function setTeacherStudent(uid){
    teacherStudentFilter = uid || 'all';
    const ids = ['teacher-inbox','passage-teacher','homework-teacher','teacher-students'];
    ids.forEach(id=>{
      const page = document.getElementById('page-'+id);
      if(page && page.classList.contains('active')){
        const fnMap = {
          'teacher-inbox': window.renderTeacherInbox,
          'passage-teacher': window.renderPassageTeacherPage,
          'homework-teacher': window.renderHomeworkTeacherPage,
          'teacher-students': window.renderTeacherStudentsPage
        };
        if(fnMap[id]) fnMap[id]();
      }
    });
  }
  window.setTeacherStudent = setTeacherStudent;

  function studentFilterBar(){
    const students = getStudentDirectory();
    const pills = [
      `<button class="student-pill ${teacherStudentFilter==='all'?'active':''}" onclick="setTeacherStudent('all')">전체 학생</button>`,
      ...students.map(s=>`<button class="student-pill ${teacherStudentFilter===s.uid?'active':''}" onclick="setTeacherStudent('${s.uid}')">${eh(s.name||s.uid)}</button>`)
    ];
    return `<div class="student-filter-bar">${pills.join('')}</div>`;
  }

  async function subscribeProfiles(){
    if(!firebaseEnabled || !fbDb || role!=='teacher') return;
    if(unsubProfiles) unsubProfiles();
    unsubProfiles = fbDb.collection('profiles').onSnapshot(snap=>{
      allProfiles = snap.docs.map(d=>({id:d.id, ...d.data()}));
      const activeMap = {
        'page-teacher-inbox': window.renderTeacherInbox,
        'page-passage-teacher': window.renderPassageTeacherPage,
        'page-homework-teacher': window.renderHomeworkTeacherPage,
        'page-teacher-students': window.renderTeacherStudentsPage
      };
      Object.entries(activeMap).forEach(([id,fn])=>{
        if(document.getElementById(id)?.classList.contains('active')) fn();
      });
    }, err=>console.warn('profiles:', err));
  }

  async function subscribeSubmissionStreams(){
    if(!firebaseEnabled || !fbDb || !currentUid) return;
    if(unsubTeacherSubs) unsubTeacherSubs();
    if(unsubStudentSubs) unsubStudentSubs();

    if(role==='teacher'){
      unsubTeacherSubs = fbDb.collection('submissions')
        .where('teacherUid','==',currentUid)
        .onSnapshot(snap=>{
          submissions = snap.docs.map(d=>({...d.data(), _docId:d.id}));
          submissions.sort((a,b)=>String(b.timestamp||'').localeCompare(String(a.timestamp||'')));
          if(document.getElementById('page-teacher-inbox')?.classList.contains('active')) window.renderTeacherInbox();
          if(document.getElementById('page-teacher-students')?.classList.contains('active')) window.renderTeacherStudentsPage();
        }, err=>console.warn('submissions-live:', err));
    } else {
      unsubStudentSubs = fbDb.collection('submissions')
        .where('studentUid','==',currentUid)
        .onSnapshot(snap=>{
          studentSubmissions = snap.docs.map(d=>({...d.data(), _docId:d.id}));
          studentSubmissions.sort((a,b)=>String(b.timestamp||'').localeCompare(String(a.timestamp||'')));
          if(document.getElementById('page-student-results')?.classList.contains('active')) window.renderStudentResults();
        }, err=>console.warn('student-submissions-live:', err));
    }
  }

  window.unsubAll = function(){
    try{ original.unsubAll && original.unsubAll(); }catch(e){}
    if(unsubProfiles){unsubProfiles();unsubProfiles=null;}
    if(unsubTeacherSubs){unsubTeacherSubs();unsubTeacherSubs=null;}
    if(unsubStudentSubs){unsubStudentSubs();unsubStudentSubs=null;}
  };

  window.loadProfile = async function(){
    await original.loadProfile();
    if(!fbDb || !currentUid) return;
    try{
      const doc = await fbDb.collection('profiles').doc(currentUid).get();
      const d = doc.exists ? (doc.data()||{}) : {};
      window.passageState = d.passageState || {};
      window.hwState = d.hwState || {};
    }catch(e){ console.warn('loadProfileExt:', e); }
  };

  window.saveProfile = async function(){
    if(!fbDb || !currentUid) return;
    try{
      await fbDb.collection('profiles').doc(currentUid).set({
        email: currentEmail,
        username: activeUsername,
        weakWords: weakWords || [],
        examResults: examResults || [],
        currentBookId: currentBookId || BASE_BOOK_ID,
        hwDone: [...hwDoneSet],
        hwState: window.hwState || {},
        passageState: window.passageState || {},
        lastSeenAt: nowISO(),
        updatedAt: nowISO()
      }, {merge:true});
    }catch(e){
      console.warn('saveProfileExt:', e);
      throw e;
    }
  };

  const debouncedSaveProfile = debounce(()=>{
    window.saveProfile().catch(err=>console.warn(err));
  }, 500);

  function trackPassageOpen(ps){
    if(role!=='student' || !currentUid || !ps) return;
    window.passageState = window.passageState || {};
    const prev = window.passageState[ps.id] || {};
    window.passageState[ps.id] = {
      ...prev,
      title: ps.title || '',
      opened: true,
      firstOpenedAt: prev.firstOpenedAt || nowISO(),
      lastViewedAt: nowISO()
    };
    debouncedSaveProfile();
  }

  window.renderPassContent = function(ps){
    original.renderPassContent(ps);
    trackPassageOpen(ps);
  };

  window.togHwDone = function(id){
    if(hwDoneSet.has(id)) hwDoneSet.delete(id); else hwDoneSet.add(id);
    window.hwState = window.hwState || {};
    const hw = (homeworks||[]).find(h=>h.id===id);
    window.hwState[id] = {
      done: hwDoneSet.has(id),
      title: hw?.title || '',
      updatedAt: nowISO()
    };
    debouncedSaveProfile();
    const activeBtn=document.querySelector('.hw-filter-btn.active');
    const txt=activeBtn?.textContent||'';
    const filter=txt.includes('긴급')?'urgent':txt.includes('중요')?'important':txt.includes('미완료')?'undone':txt.includes('완료')?'done':'all';
    if(typeof renderHwList==='function') renderHwList(filter);
  };

  window.loadAllData = async function(){
    if(!firebaseEnabled || !currentUid) return;
    await Promise.all([loadBooks(), loadProfile(), loadGeneratedExams(), loadSubmissions(), loadStudentSubmissions()]);
    subscribePassages();
    subscribeHomeworks();
    subscribeSubmissionStreams();
    if(role==='teacher') subscribeProfiles();
  };

  window.buildNav = function(){
    const tabs=document.getElementById('nav-tabs');
    const pages=document.getElementById('pages');
    tabs.innerHTML=''; pages.innerHTML='';
    const items = role==='student'
      ? [['books','📚 단어장'],['flash','🃏 플래시카드'],['list','📋 단어목록'],['weak','⚡ 약한단어'],['passage','📖 본문'],['exam','✏️ 시험'],['homework','📝 숙제장'],['student-results','📊 내결과']]
      : [['books','📚 단어장'],['passage-teacher','📖 본문관리'],['teacher-gen','🎯 시험출제'],['teacher-inbox','📥 제출함'],['homework-teacher','📝 숙제관리'],['teacher-students','👥 학생별 보기']];
    items.forEach(([id,label],i)=>{
      const t=document.createElement('button');
      t.className='nav-tab'+(i===0?' active':'');
      t.textContent=label;
      t.onclick=()=>switchPage(id);
      t.id='tab-'+id;
      tabs.appendChild(t);
      const p=document.createElement('div');
      p.className='page'+(i===0?' active':'');
      p.id='page-'+id;
      pages.appendChild(p);
    });
    renderAll();
  };

  window.switchPage = function(id){
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    const tab=document.getElementById('tab-'+id); if(tab) tab.classList.add('active');
    const page=document.getElementById('page-'+id); if(page) page.classList.add('active');
    const rmap={
      'books':renderBooksPage,'flash':renderFlash,'list':renderList,'weak':renderWeak,'passage':renderPassagePage,'passage-teacher':window.renderPassageTeacherPage,
      'exam':renderStudentExam,'teacher-gen':renderTeacherGen,'teacher-inbox':window.renderTeacherInbox,'homework':renderHomeworkPage,
      'homework-teacher':window.renderHomeworkTeacherPage,'student-results':window.renderStudentResults,'teacher-students':window.renderTeacherStudentsPage
    };
    if(rmap[id]) rmap[id]();
  };

  window.renderAll = function(){
    renderBooksPage();
    if(role==='student'){
      renderFlash(); renderList(); renderWeak(); renderPassagePage(); renderStudentExam(); renderHomeworkPage(); window.renderStudentResults();
    }else{
      window.renderPassageTeacherPage(); renderTeacherGen(); window.renderTeacherInbox(); window.renderHomeworkTeacherPage(); window.renderTeacherStudentsPage();
    }
  };

  window.autoSubmit = async function(score,correct,wrong,empty){
    if(!firebaseEnabled || !fbDb){ setEl('submit-status','Firebase 연결 필요'); return; }
    const teacherUid = currentExamOwnerUid || null;
    const docId = currentExamCode && currentUid ? `${currentExamCode}_${currentUid}` : null;
    const sub = {
      name: examStudentName || activeUsername,
      studentUid: currentUid,
      studentEmail: currentEmail,
      score, correct, wrong, empty,
      total: examWords.length,
      days: examDays,
      code: currentExamCode,
      teacherUid,
      bookTitle: examWords[0]?.bookTitle || getCurrentBook().title,
      timestamp: nowISO(),
      updatedAt: nowISO(),
      reviewPending: true,
      deliveryState: 'submitted',
      answers: examWords.map((w,i)=>({
        word:w.en, kr:w.kr, student:examAnswers[i].val||'', result:examAnswers[i].result, dayKey:w.dayKey||''
      }))
    };
    try{
      let ref = null;
      if(docId){
        ref = fbDb.collection('submissions').doc(docId);
        const prev = await ref.get();
        if(prev.exists){
          const old = prev.data() || {};
          if(old.reviewPending === false){
            sub.reviewPending = false;
          }
        }
        await ref.set(sub,{merge:true});
        studentSubmissions = [{...sub,_docId:docId}, ...studentSubmissions.filter(s=>s._docId!==docId)];
      }else{
        ref = await fbDb.collection('submissions').add(sub);
        studentSubmissions.unshift({...sub,_docId:ref.id});
      }
      setEl('submit-status', `✅ 자동 제출 완료 · 임시 ${score}점 · 선생님 제출함에 반영됩니다.`);
    }catch(e){
      setEl('submit-status','제출 실패: '+e.message);
    }
  };

  function filterSubmissionsByStudent(list){
    if(teacherStudentFilter==='all') return list;
    return list.filter(s=>s.studentUid===teacherStudentFilter);
  }

  window.renderTeacherInbox = function(){
    const p=document.getElementById('page-teacher-inbox'); if(!p) return;
    const list = filterSubmissionsByStudent(submissions);
    p.innerHTML = `<div class="content"><div class="section-title">제출함 <span>(${list.length})</span></div>${studentFilterBar()}<div style="display:flex;justify-content:flex-end;margin-bottom:1rem;"><button class="btn" onclick="loadSubmissions().then(renderTeacherInbox)">새로고침</button></div>${!list.length?'<div class="empty-state"><div class="empty-icon">📬</div>제출된 결과가 없습니다.</div>':''}<div class="inbox-list">${list.map((s)=>{const idx=submissions.findIndex(x=>x._docId===s._docId);const pass=s.score>=60;return `<div class="inbox-item" onclick="openSub(${idx})"><div class="inbox-item-header"><div class="inbox-name">${eh(s.name||'학생')} ${s.reviewPending?'🕒':'✅'}</div><div class="inbox-score ${pass?'pass':'fail'}">${s.score}점</div></div><div class="inbox-meta">${eh(s.bookTitle||'')} · ${(s.days||[]).map(getDayLabel).join(', ')} · ${s.correct}/${s.total} · ${new Date(s.timestamp).toLocaleString('ko-KR')} ${s.code?'· '+s.code:''}</div></div>`;}).join('')}</div>${list.length?`<button class="btn danger" style="margin-top:1.25rem;" onclick="clearSubs()">제출 기록 초기화</button>`:''}</div>`;
  };

  function computeHomeworkSummary(profile){
    const doneIds = new Set(Array.isArray(profile?.hwDone)? profile.hwDone : []);
    const hwState = profile?.hwState || {};
    return (homeworks||[]).map(hw=>{
      const st = hwState[hw.id] || {};
      return { id: hw.id, title: hw.title, done: st.done ?? doneIds.has(hw.id), updatedAt: st.updatedAt || '' };
    });
  }

  function computePassageSummary(profile){
    const psState = profile?.passageState || {};
    return (passages||[]).map(ps=>{
      const st = psState[ps.id] || {};
      return { id: ps.id, title: ps.title, opened: !!st.opened, firstOpenedAt: st.firstOpenedAt || '', lastViewedAt: st.lastViewedAt || '' };
    });
  }

  window.renderHomeworkTeacherPage = function(){
    const p=document.getElementById('page-homework-teacher'); if(!p) return;
    const students = getStudentDirectory();
    const map = getProfileMap();
    const filteredStudents = teacherStudentFilter==='all' ? students : students.filter(s=>s.uid===teacherStudentFilter);
    p.innerHTML = `<div class="content"><div class="section-title">📝 숙제 <span>관리</span></div>${studentFilterBar()}<div class="tab-inner"><button class="tab-inner-btn active" onclick="hwTTab('list',this)">숙제 목록 (${homeworks.length})</button><button class="tab-inner-btn" onclick="hwTTab('add',this)">숙제 등록</button><button class="tab-inner-btn" onclick="hwTTab('student',this)">학생별 현황</button></div><div id="hw-teacher-list"></div><div id="hw-teacher-add" style="display:none"></div><div id="hw-teacher-student" style="display:none"></div></div>`;
    renderHwTList();
    renderHwTAdd();
    const box = document.getElementById('hw-teacher-student');
    if(box){
      box.innerHTML = filteredStudents.length ? filteredStudents.map(st=>{
        const prof = map.get(st.uid) || {};
        const items = computeHomeworkSummary(prof);
        const done = items.filter(x=>x.done).length;
        return `<div class="teacher-mini-card" style="margin-bottom:.75rem;"><div class="teacher-mini-title">${eh(st.name||st.uid)} · 완료 ${done}/${items.length}</div>${items.length?items.map(item=>`<div class="timeline-item"><div class="t1">${item.done?'✅':'⬜'} ${eh(item.title||item.id)}</div><div class="t2">${item.updatedAt?new Date(item.updatedAt).toLocaleString('ko-KR'):'기록 없음'}</div></div>`).join(''):'<div class="empty-state" style="padding:1rem;">등록된 숙제가 없습니다.</div>'}</div>`;
      }).join('') : '<div class="empty-state"><div class="empty-icon">👤</div>학생 정보가 없습니다.</div>';
    }
  };

  window.renderPassageTeacherPage = function(){
    const p=document.getElementById('page-passage-teacher'); if(!p) return;
    const reqCount=passages.reduce((s,ps)=>s+(ps.vocabRequests||[]).length,0);
    const students = getStudentDirectory();
    const map = getProfileMap();
    const filteredStudents = teacherStudentFilter==='all' ? students : students.filter(s=>s.uid===teacherStudentFilter);
    p.innerHTML=`<div class="content"><div class="section-title">📖 본문 <span>관리</span></div>${studentFilterBar()}<div class="tab-inner"><button class="tab-inner-btn active" onclick="ptTab('list',this)">본문 목록</button><button class="tab-inner-btn" onclick="ptTab('add',this)">새 본문 추가</button><button class="tab-inner-btn" onclick="ptTab('req',this)">단어 요청 (${reqCount})</button><button class="tab-inner-btn" onclick="ptTab('student',this)">학생별 보기</button></div><div id="pt-list"></div><div id="pt-add" style="display:none"></div><div id="pt-req" style="display:none"></div><div id="pt-student" style="display:none"></div></div>`;
    renderPTList();
    renderPTAdd();
    renderPTReq();
    const box = document.getElementById('pt-student');
    if(box){
      box.innerHTML = filteredStudents.length ? filteredStudents.map(st=>{
        const prof = map.get(st.uid) || {};
        const items = computePassageSummary(prof);
        const opened = items.filter(x=>x.opened).length;
        const vocabReqs = [];
        (passages||[]).forEach(ps=>{
          (ps.vocabRequests||[]).forEach(r=>{
            if(r.studentUid===st.uid) vocabReqs.push({title:ps.title, words:r.words||[], createdAt:r.createdAt});
          });
        });
        return `<div class="teacher-mini-card" style="margin-bottom:.75rem;"><div class="teacher-mini-title">${eh(st.name||st.uid)} · 열람 ${opened}/${items.length}</div>${items.length?items.map(item=>`<div class="timeline-item"><div class="t1">${item.opened?'✅':'⬜'} ${eh(item.title||item.id)}</div><div class="t2">${item.lastViewedAt?('마지막 열람: '+new Date(item.lastViewedAt).toLocaleString('ko-KR')):'열람 기록 없음'}</div></div>`).join(''):'<div class="empty-state" style="padding:1rem;">등록된 본문이 없습니다.</div>'}<div style="margin-top:.75rem;font-size:.8rem;font-weight:700;color:var(--text2);">단어 요청</div>${vocabReqs.length?vocabReqs.map(v=>`<div class="timeline-item"><div class="t1">${eh(v.title)}</div><div class="t2">${eh((v.words||[]).join(', '))} · ${v.createdAt?new Date(v.createdAt).toLocaleString('ko-KR'):''}</div></div>`).join(''):'<div class="t2" style="padding:.5rem 0;">요청 없음</div>'}</div>`;
      }).join('') : '<div class="empty-state"><div class="empty-icon">👤</div>학생 정보가 없습니다.</div>';
    }
  };

  window.renderTeacherStudentsPage = function(){
    const p=document.getElementById('page-teacher-students'); if(!p) return;
    const students = getStudentDirectory();
    const map = getProfileMap();
    const selected = teacherStudentFilter==='all' ? (students[0]?.uid || 'all') : teacherStudentFilter;
    if(teacherStudentFilter==='all' && students[0]) teacherStudentFilter = students[0].uid;
    const st = students.find(x=>x.uid===teacherStudentFilter) || students[0];
    const prof = st ? (map.get(st.uid) || {}) : null;
    const subList = st ? submissions.filter(s=>s.studentUid===st.uid) : [];
    const hwItems = prof ? computeHomeworkSummary(prof) : [];
    const psItems = prof ? computePassageSummary(prof) : [];
    const doneHw = hwItems.filter(x=>x.done).length;
    const openedPs = psItems.filter(x=>x.opened).length;
    p.innerHTML = `<div class="content"><div class="section-title">학생별 <span>보기</span></div><div class="teacher-student-panel"><div class="teacher-student-list">${students.length?students.map(s=>`<div class="student-summary-row ${teacherStudentFilter===s.uid?'active':''}" onclick="setTeacherStudent('${s.uid}');renderTeacherStudentsPage();"><div><div class="student-summary-name">${eh(s.name||s.uid)}</div><div style="font-size:.75rem;color:var(--text2);">${eh(s.email||s.uid)}</div></div><div style="font-size:.75rem;color:var(--text2);">보기</div></div>`).join(''):'<div class="empty-state"><div class="empty-icon">👥</div>학생이 없습니다.</div>'}</div><div>${st?`<div class="kv-grid"><div class="kv-box"><div class="n">${subList.length}</div><div class="l">시험 제출</div></div><div class="kv-box"><div class="n">${doneHw}/${hwItems.length}</div><div class="l">숙제 완료</div></div><div class="kv-box"><div class="n">${openedPs}/${psItems.length}</div><div class="l">본문 열람</div></div></div><div class="teacher-grid-2" style="margin-top:1rem;"><div class="teacher-mini-card"><div class="teacher-mini-title">최근 시험 결과</div>${subList.length?subList.slice().sort((a,b)=>String(b.timestamp||'').localeCompare(String(a.timestamp||''))).map(s=>`<div class="timeline-item"><div class="t1">${eh(s.bookTitle||'시험')} · ${s.score}점 ${s.reviewPending?'🕒':'✅'}</div><div class="t2">${new Date(s.timestamp).toLocaleString('ko-KR')} ${s.code?'· '+s.code:''}</div></div>`).join(''):'<div class="t2">제출 없음</div>'}</div><div class="teacher-mini-card"><div class="teacher-mini-title">최근 숙제/본문 활동</div>${[...hwItems.filter(x=>x.updatedAt).map(x=>({type:'숙제', title:x.title, status:x.done?'완료':'미완료', at:x.updatedAt})), ...psItems.filter(x=>x.lastViewedAt).map(x=>({type:'본문', title:x.title, status:'열람', at:x.lastViewedAt}))].sort((a,b)=>String(b.at).localeCompare(String(a.at))).slice(0,10).map(x=>`<div class="timeline-item"><div class="t1">${x.type} · ${eh(x.title||'')}</div><div class="t2">${eh(x.status)} · ${new Date(x.at).toLocaleString('ko-KR')}</div></div>`).join('') || '<div class="t2">기록 없음</div>'}</div></div>`:'<div class="empty-state"><div class="empty-icon">👤</div>학생을 선택하세요.</div>'}</div></div></div>`;
  };

  window.renderStudentResults = async function(){
    const p=document.getElementById('page-student-results'); if(!p) return;
    p.innerHTML=`<div class="content"><div class="section-title">내 <span>결과</span></div><div class="account-note">계정: <strong>${eh(activeUsername)}</strong></div><div style="display:flex;justify-content:flex-end;margin-bottom:1rem;"><button class="btn" onclick="renderStudentResults()">새로고침</button></div>${!studentSubmissions.length?'<div class="empty-state"><div class="empty-icon">📊</div>아직 제출한 시험 결과가 없습니다.</div>':''}<div class="inbox-list">${studentSubmissions.map((s,idx)=>{const pass=s.score>=60;const reviewed=!s.reviewPending;return `<div class="inbox-item" onclick="openStudentSub(${idx})"><div class="inbox-item-header"><div class="inbox-name">${eh(s.bookTitle||'')} ${reviewed?'✅':'🕒'}</div><div class="inbox-score ${pass?'pass':'fail'}">${s.score}점</div></div><div class="inbox-meta">${(s.days||[]).map(getDayLabel).join(', ')} · ${s.correct}/${s.total} · ${new Date(s.timestamp).toLocaleString('ko-KR')} ${reviewed?'· 검토완료':'· 검토중'}</div></div>`;}).join('')}</div></div>`;
  };

  const oldEnterApp = window.enterApp;
  window.enterApp = async function(r){
    await oldEnterApp(r);
    try{ await window.loadAllData(); }catch(e){ console.warn(e); }
  };

  // autosave for passage/homework editors
  function attachTeacherAutosave(){
    const ptTitle = document.getElementById('pt-title');
    const ptText = document.getElementById('pt-text');
    const ptTrans = document.getElementById('pt-trans');
    const hwTitle = document.getElementById('hw-title');
    const hwContent = document.getElementById('hw-content');
    const hwDue = document.getElementById('hw-due');
    const hwLevel = document.getElementById('hw-level');

    const autoPassage = debounce(async ()=>{
      if(role!=='teacher' || !ptTitle || !ptText) return;
      const title = ptTitle.value.trim();
      const text = ptText.value.trim();
      const translation = ptTrans ? ptTrans.value.trim() : '';
      if(!title || !text || !firebaseEnabled || !fbDb) return;
      const editId = (document.getElementById('pt-save-btn')||{}).dataset.editId || '';
      const id = editId || localStorage.getItem('wm_passage_draft_id') || ('ps-'+Date.now());
      if(!editId) localStorage.setItem('wm_passage_draft_id', id);
      const old = passages.find(p=>p.id===id);
      await fbDb.collection('passages').doc(id).set({
        id,title,text,translation,
        vocabRequests: old?.vocabRequests || [],
        createdAt: old?.createdAt || nowISO(),
        updatedAt: nowISO(),
        ownerUid: currentUid
      },{merge:true});
    },800);

    [ptTitle,ptText,ptTrans].forEach(el=>el && el.addEventListener('input', autoPassage));

    const autoHomework = debounce(async ()=>{
      if(role!=='teacher' || !hwTitle || !hwContent) return;
      const title = hwTitle.value.trim();
      const content = hwContent.value.trim();
      const due = hwDue ? hwDue.value : '';
      const level = hwLevel ? hwLevel.value : 'normal';
      if(!title || !content || !firebaseEnabled || !fbDb) return;
      const draftId = localStorage.getItem('wm_homework_draft_id') || ('hw-'+Date.now());
      localStorage.setItem('wm_homework_draft_id', draftId);
      const old = homeworks.find(h=>h.id===draftId);
      await fbDb.collection('homeworks').doc(draftId).set({
        id:draftId,title,content,due,level,
        createdAt: old?.createdAt || nowISO(),
        updatedAt: nowISO(),
        ownerUid: currentUid
      },{merge:true});
    },800);

    [hwTitle,hwContent,hwDue,hwLevel].forEach(el=>{
      if(!el) return;
      el.addEventListener(el.tagName==='SELECT' ? 'change' : 'input', autoHomework);
    });
  }

  const oldRenderPTAdd = window.renderPTAdd;
  if(oldRenderPTAdd){
    window.renderPTAdd = function(editId){
      oldRenderPTAdd(editId);
      setTimeout(()=>{
        const btn = document.querySelector('#pt-add button.gen-btn, #pt-add button.btn.primary, #pt-add button[onclick*="ptSave"]');
        if(btn){
          const m = (btn.getAttribute('onclick')||'').match(/ptSave\('([^']*)'\)/);
          if(m) btn.id='pt-save-btn', btn.dataset.editId = m[1] || '';
          else btn.id='pt-save-btn', btn.dataset.editId = '';
        }
        attachTeacherAutosave();
      },0);
    }
  }
  const oldRenderHwTAdd = window.renderHwTAdd;
  if(oldRenderHwTAdd){
    window.renderHwTAdd = function(){
      oldRenderHwTAdd();
      setTimeout(attachTeacherAutosave,0);
    }
  }
})();
</script>
