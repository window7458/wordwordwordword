<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English Master</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f4f6;
  --surface: #ffffff;
  --accent: #3182f6; /* Toss Blue */
  --accent-light: #e8f3ff;
  --text: #191f28;
  --text2: #4e5968;
  --text3: #8b95a1;
  --border: #eceef0;
  --red: #f04452;
  --r: 24px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans KR', sans-serif; }
body { background: var(--bg); color: var(--text); overflow-x: hidden; }

/* Mobile Centered Layout */
#app { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--surface); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.05); }

/* Header */
.header { height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--border); }
.brand { font-family: 'Outfit'; font-weight: 900; font-size: 1.25rem; color: var(--accent); }

/* Main Content Area */
#main { flex: 1; padding: 20px; padding-bottom: 100px; }

/* Bottom Tab Navigation */
.bottom-nav { height: 75px; display: flex; background: var(--surface); border-top: 1px solid var(--border); position: fixed; bottom: 0; width: 100%; max-width: 500px; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: var(--text3); font-size: 0.7rem; font-weight: 700; cursor: pointer; }
.nav-item.on { color: var(--accent); }
.nav-icon { font-size: 1.4rem; }

/* Components */
.card { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); transition: 0.2s; }
.btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
.btn-p { background: var(--accent); color: #fff; }
.btn-g { background: var(--accent-light); color: var(--accent); }
.inp { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #f9fafb; font-size: 1rem; margin-bottom: 10px; }
.inp:focus { outline: none; border-color: var(--accent); background: #fff; }

/* Study Modes Tab */
.mode-tabs { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 20px; padding: 5px 0; scrollbar-width: none; }
.mode-tabs::-webkit-scrollbar { display: none; }
.mode-tab { padding: 10px 18px; border-radius: 12px; font-size: 0.85rem; font-weight: 800; white-space: nowrap; background: var(--bg); color: var(--text3); border: none; cursor: pointer; }
.mode-tab.on { background: var(--accent); color: #fff; }

/* Memory Mode Content */
.study-line { margin-bottom: 14px; border-left: 4px solid var(--border); padding: 5px 0 5px 15px; cursor: pointer; transition: 0.2s; }
.study-line.active { border-left-color: var(--accent); background: #f8faff; }
.en-txt { font-weight: 700; font-size: 1.1rem; color: var(--text); margin-bottom: 6px; transition: 0.3s; }
.kr-txt { font-size: 0.95rem; color: var(--text2); transition: 0.3s; }
.blurred { filter: blur(6px); background: #eee; color: transparent !important; user-select: none; border-radius: 4px; }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; display: none; align-items: flex-end; }
.modal { background: #fff; width: 100%; border-radius: 24px 24px 0 0; padding: 25px 20px; transform: translateY(100%); transition: 0.3s; max-height: 85vh; overflow-y: auto; }
.modal.show { transform: translateY(0); }

/* Login Overlay */
#login-screen { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
</style>
</head>
<body>

<div id="login-screen">
  <div style="font-size: 4.5rem; margin-bottom: 20px;">🎓</div>
  <h1 style="font-family:'Outfit'; font-weight:900; font-size:2.2rem; margin-bottom:5px;">English <span style="color:var(--accent)">Master</span></h1>
  <p style="color:var(--text3); margin-bottom:40px; font-weight:500;">AI 기반 본문 & 단어 학습 솔루션</p>
  <input class="inp" id="wid" placeholder="아이디">
  <input class="inp" id="wpw" type="password" placeholder="비밀번호">
  <button class="btn btn-p" onclick="doAuth()" style="margin-top:20px; box-shadow: 0 8px 20px rgba(49, 130, 246, 0.2);">학습 시작하기</button>
</div>

<div id="app" style="display:none;">
  <header class="header">
    <div class="brand">English Master</div>
    <div id="user-tag" style="font-size: 0.75rem; font-weight: 800; color: var(--text2); background: var(--bg); padding: 4px 10px; border-radius: 20px;"></div>
  </header>
  
  <main id="main"></main>
  
  <nav class="bottom-nav" id="bot-nav"></nav>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
<script>
// --- [초기화] ---
const TID = 'gfedbKqE30VwTDfls7cfiGwaD982';
const FBCFG = {apiKey: "AIzaSyDRXpHtMbbLg5_zHn9DHclOQNacYWC1bFk", authDomain: "word-test-4cdf6.firebaseapp.com", projectId: "word-test-4cdf6", storageBucket: "word-test-4cdf6.firebasestorage.app", messagingSenderId: "175982857143", appId: "1:175982857143:web:2aae221a1e051c197ab632"};
firebase.initializeApp(FBCFG);
const db = firebase.firestore();
const auth = firebase.auth();

let user = null, role = 'student', curPage = '', curStudyMode = 'all';
let students = [], passages = [], activePs = null;

// --- [인증 로직] ---
auth.onAuthStateChanged(async u => {
  if(u) {
    user = u;
    role = (u.uid === TID) ? 'teacher' : 'student';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('user-tag').textContent = u.email.split('@')[0] + (role==='teacher'?' 👩‍🏫':' 📖');
    
    initDataLoad();
    renderNav();
    goPage(role === 'teacher' ? 'ps-t' : 'ps-s');
  }
});

async function doAuth() {
  const id = document.getElementById('wid').value.trim();
  const pw = document.getElementById('wpw').value.trim();
  if(!id || !pw) return alert("계정 정보를 입력해 주세요.");
  const email = id.includes('@') ? id : id + "@wordtest.local";
  try { await auth.signInWithEmailAndPassword(email, pw); } 
  catch(e) { try { await auth.createUserWithEmailAndPassword(email, pw); } catch(e2) { alert(e2.message); } }
}

function initDataLoad() {
  db.collection('profiles').onSnapshot(s => { students = s.docs.map(d => ({id:d.id, ...d.data()})).filter(x => x.id !== TID); });
  db.collection('passages').onSnapshot(s => { 
    passages = s.docs.map(d => ({id:d.id, ...d.data()}));
    if(curPage === 'ps-t') renderPsTeacher();
    if(curPage === 'ps-s') renderPsStudent();
  });
}

// --- [네비게이션] ---
function renderNav() {
  const nav = document.getElementById('bot-nav');
  const items = role === 'teacher' ? 
    [{id:'ps-t', i:'📖', l:'본문관리'}, {id:'voc-t', i:'📚', l:'단어관리'}, {id:'stu', i:'👥', l:'학생목록'}] :
    [{id:'ps-s', i:'📖', l:'나의본문'}, {id:'voc-s', i:'📚', l:'내단어장'}, {id:'exam', i:'✏️', l:'실전시험'}];
  
  nav.innerHTML = items.map(it => `
    <div class="nav-item ${curPage === it.id ? 'on' : ''}" onclick="goPage('${it.id}')">
      <span class="nav-icon">${it.i}</span>
      <span>${it.l}</span>
    </div>
  `).join('');
}

function goPage(id) {
  curPage = id;
  renderNav();
  const main = document.getElementById('main');
  window.scrollTo(0,0);
  
  if(id === 'ps-t') renderPsTeacher();
  else if(id === 'ps-s') renderPsStudent();
  else if(id === 'voc-s') main.innerHTML = `<div class="card" style="text-align:center; padding:50px 0; color:var(--text3);">단어장 기능 업데이트 중입니다.</div>`;
  else main.innerHTML = `<div class="card" style="text-align:center; padding:50px 0; color:var(--text3);">English Master의 새로운 기능을 기대해 주세요.</div>`;
}

// --- [선생님: 본문 관리] ---
function renderPsTeacher() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <h2 style="font-weight:900; font-size:1.5rem; margin-bottom:20px;">본문 관리 센터</h2>
    <button class="btn btn-g" onclick="openPsEditor()" style="margin-bottom:24px; border:1px solid #d0e4ff;">+ 새로운 본문 배정하기</button>
    ${passages.length === 0 ? '<div class="card" style="text-align:center; color:var(--text3);">등록된 본문이 없습니다.</div>' : ''}
    ${passages.map(p => `
      <div class="card" onclick="openPsEditor('${p.id}')">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div style="flex:1;">
            <div style="font-weight:900; font-size:1.15rem; color:var(--text);">${p.title}</div>
            <div style="font-size:0.75rem; color:var(--accent); font-weight:700; margin-top:6px;">
              ${p.assignedTo === 'all' ? '● 전체 공개 중' : `● ${p.assignedTo?.length || 0}명의 학생에게 배정됨`}
            </div>
          </div>
          <button style="border:none; background:none; color:var(--red); font-weight:800; padding:5px;" onclick="event.stopPropagation(); deletePs('${p.id}')">삭제</button>
        </div>
      </div>
    `).join('')}
  `;
}

function openPsEditor(id = null) {
  const p = passages.find(x => x.id === id) || {title:'', text:'', translation:'', assignedTo: 'all'};
  const isAll = p.assignedTo === 'all';
  const assignedSet = new Set(isAll ? [] : (p.assignedTo || []));

  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <h3 style="margin-bottom:20px; font-weight:900; font-size:1.3rem;">지문 편집 및 배정</h3>
    <input class="inp" id="ed-title" value="${p.title}" placeholder="지문 제목 입력">
    <textarea class="inp" id="ed-text" style="height:150px;" placeholder="영어 지문 (문장별 엔터)">${p.text}</textarea>
    <textarea class="inp" id="ed-trans" style="height:150px;" placeholder="한글 해석 (영어 문장 순서와 동일하게 엔터)">${p.translation}</textarea>
    
    <div style="margin:20px 0;">
      <p style="font-weight:900; font-size:0.95rem; margin-bottom:12px;">학습 대상 학생 선택</p>
      <div style="background:var(--bg); border-radius:16px; padding:15px;">
        <label style="display:flex; align-items:center; gap:12px; margin-bottom:12px; font-weight:700;">
          <input type="checkbox" id="chk-all" style="width:18px; height:18px;" ${isAll?'checked':''} onchange="toggleStuCheck(this.checked)"> 모든 학생에게 공개
        </label>
        <div id="stu-selector" style="display:${isAll?'none':'block'}; max-height:160px; overflow-y:auto; border-top:1px solid #ddd; padding-top:10px;">
          ${students.map(s => `
            <label style="display:flex; align-items:center; gap:12px; padding:10px 0; font-size:0.9rem;">
              <input type="checkbox" class="stu-chk" style="width:16px; height:16px;" value="${s.id}" ${assignedSet.has(s.id)?'checked':''}> 
              ${s.displayName || s.email.split('@')[0]}
            </label>
          `).join('')}
        </div>
      </div>
    </div>

    <div style="display:flex; gap:10px; margin-top:10px;">
      <button class="btn btn-outline" style="flex:1;" onclick="closeModal()">취소</button>
      <button class="btn btn-p" style="flex:2;" onclick="savePs('${id}')">저장하기</button>
    </div>
  `;
  openModal();
}

function toggleStuCheck(isAll) { document.getElementById('stu-selector').style.display = isAll ? 'none' : 'block'; }

async function savePs(id) {
  const title = document.getElementById('ed-title').value.trim();
  const text = document.getElementById('ed-text').value.trim();
  const translation = document.getElementById('ed-trans').value.trim();
  const isAll = document.getElementById('chk-all').checked;
  const assignedTo = isAll ? 'all' : Array.from(document.querySelectorAll('.stu-chk:checked')).map(c => c.value);

  if(!title || !text) return alert("제목과 영문 텍스트는 필수입니다.");

  const data = { title, text, translation, assignedTo, updatedAt: new Date().toISOString() };
  if(!id || id==='null') await db.collection('passages').add(data);
  else await db.collection('passages').doc(id).update(data);
  closeModal();
}

async function deletePs(id) { if(confirm("이 본문을 삭제하시겠습니까? 학생들의 학습 기록도 사라집니다.")) await db.collection('passages').doc(id).delete(); }

// --- [학생: 나의 학습 & 4대 암기모드] ---
function renderPsStudent() {
  const main = document.getElementById('main');
  const myPassages = passages.filter(p => p.assignedTo === 'all' || (Array.isArray(p.assignedTo) && p.assignedTo.includes(user.uid)));

  main.innerHTML = `
    <h2 style="font-weight:900; font-size:1.5rem; margin-bottom:20px;">나의 학습 지문</h2>
    ${myPassages.length === 0 ? '<div class="card" style="text-align:center; padding:40px 0; color:var(--text3);">선생님이 배정한 지문이 아직 없습니다.</div>' : ''}
    ${myPassages.map(p => `
      <div class="card" onclick="openStudyView('${p.id}')">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <span style="font-family:'Outfit'; font-weight:900; color:var(--accent); font-size:0.75rem; letter-spacing:1px;">PASSAGE</span>
          <span style="font-size:0.7rem; color:var(--text3); font-weight:700;">${p.updatedAt ? p.updatedAt.split('T')[0] : ''}</span>
        </div>
        <div style="font-weight:900; font-size:1.2rem; margin-bottom:8px;">${p.title}</div>
        <div style="font-size:0.85rem; color:var(--text2); line-height:1.5; height:2.4em; overflow:hidden;">${p.text.slice(0, 100)}...</div>
      </div>
    `).join('')}
  `;
}

function openStudyView(id) {
  activePs = passages.find(p => p.id === id);
  renderStudyDetail();
}

function renderStudyDetail() {
  const main = document.getElementById('main');
  const enLines = activePs.text.split('\n').filter(l => l.trim());
  const krLines = (activePs.translation || '').split('\n').filter(l => l.trim());

  main.innerHTML = `
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:18px;">
      <button onclick="goPage('ps-s')" style="border:none; background:var(--bg); width:40px; height:40px; border-radius:12px; font-size:1.2rem; cursor:pointer;">←</button>
      <h2 style="font-weight:900; font-size:1.3rem;">${activePs.title}</h2>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab ${curStudyMode==='all'?'on':''}" onclick="setStudyMode('all')">영어 + 한글</button>
      <button class="mode-tab ${curStudyMode==='en-only'?'on':''}" onclick="setStudyMode('en-only')">영어만 보기</button>
      <button class="mode-tab ${curStudyMode==='kr-focus'?'on':''}" onclick="setStudyMode('kr-focus')">한글 보고 영작</button>
      <button class="mode-tab ${curStudyMode==='blind'?'on':''}" onclick="setStudyMode('blind')">완전 암기</button>
    </div>

    <div style="margin-bottom:20px; display:flex; gap:10px;">
      <button class="btn btn-outline" style="font-size:0.85rem; padding:12px; border-color:var(--accent); color:var(--accent); flex:1;" 
          onclick="playTTS(activePs.text)">▶ 본문 전체 듣기</button>
    </div>

    <div id="study-list">
      ${enLines.map((en, i) => {
        const isEnVisible = (curStudyMode === 'all' || curStudyMode === 'en-only');
        return `
        <div class="study-line" onclick="handleLineClick(this)">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <span style="font-family:'Outfit'; font-size:0.65rem; font-weight:800; color:var(--text3);"># SENTENCE ${i+1}</span>
            ${isEnVisible ? `<span onclick="event.stopPropagation(); playTTS('${en.replace(/'/g, "\\'")}')" style="font-size:1.1rem; cursor:pointer; padding:2px;">🔊</span>` : ''}
          </div>
          <div class="en-txt ${ (curStudyMode==='blind' || curStudyMode==='kr-focus') ? 'blurred' : ''}">${en}</div>
          <div class="kr-txt ${ (curStudyMode==='blind' || curStudyMode==='en-only') ? 'blurred' : ''}" 
               style="display:${curStudyMode==='en-only'?'none':'block'}">${krLines[i] || '해석 정보 없음'}</div>
        </div>`;
      }).join('')}
    </div>
    <p style="text-align:center; color:var(--text3); font-size:0.8rem; margin-top:30px;">카드를 터치하면 숨겨진 문장이 보입니다.</p>
  `;
}

function setStudyMode(m) { curStudyMode = m; renderStudyDetail(); }
function handleLineClick(el) { 
  el.classList.toggle('active');
  el.querySelectorAll('.blurred').forEach(b => b.classList.toggle('blurred')); 
}

// --- [공통 기능: TTS & 모달] ---
function playTTS(text) {
  window.speechSynthesis.cancel();
  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = 'en-US';
  uttr.rate = 0.95;
  window.speechSynthesis.speak(uttr);
}

function openModal() {
  const bg = document.getElementById('modal-bg');
  const m = document.getElementById('modal');
  bg.style.display = 'flex';
  setTimeout(() => m.classList.add('show'), 10);
}

function closeModal(e) {
  if(e && e.target.id !== 'modal-bg') return;
  const m = document.getElementById('modal');
  m.classList.remove('show');
  setTimeout(() => document.getElementById('modal-bg').style.display = 'none', 300);
}
</script>
</body>
</html>
