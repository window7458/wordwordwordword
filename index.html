<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Master 단어장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f7fb;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: #d9e2f0;
  --border2: #bfd0e6;
  --accent: #2563eb;
  --accent-dark: #1d4ed8;
  --accent-glow: rgba(37,99,235,0.14);
  --accent2: #dc2626;
  --accent3: #0ea5e9;
  --accent4: #f59e0b;
  --text: #152033;
  --text2: #475569;
  --text3: #7b8aa0;
  --card: #ffffff;
  --teacher: #d97706;
  --student: #2563eb;
  --shadow-soft: 0 12px 28px rgba(15, 23, 42, 0.08);
  --shadow-glow: 0 8px 24px rgba(37,99,235,0.10);
  --radius: 18px;
  --radius-sm: 12px;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 10% 0%, rgba(74,222,128,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 100%, rgba(96,165,250,0.05) 0%, transparent 50%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
.mono { font-family: var(--mono); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ===== LOGIN SCREEN ===== */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(74,222,128,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(96,165,250,0.08) 0%, transparent 50%),
    var(--bg);
  position: relative;
  overflow: hidden;
}
#login-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(74,222,128,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.login-wrap { text-align: center; max-width: 500px; width: 100%; padding: 2rem; position: relative; z-index: 1; }
.login-logo {
  display: inline-flex; align-items: center; gap: .5rem;
  font-family: 'Outfit', sans-serif; font-size: .75rem; font-weight: 700;
  letter-spacing: .25em; color: var(--accent); text-transform: uppercase;
  padding: .4rem 1rem; border: 1px solid rgba(74,222,128,0.3);
  border-radius: 20px; background: rgba(74,222,128,0.08);
  margin-bottom: 2rem;
}
.login-title {
  font-family: 'Outfit', sans-serif; font-size: 3.2rem; font-weight: 800;
  line-height: 1.05; margin-bottom: .6rem; color: var(--text);
  letter-spacing: -0.03em;
}
.login-title span { color: var(--accent); display: block; }
.login-sub { color: var(--text2); font-size: .88rem; margin-bottom: 2.5rem; line-height: 1.7; }
.role-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.role-card {
  padding: 2rem 1.5rem; border-radius: var(--radius);
  border: 1px solid var(--border);
  background: linear-gradient(145deg, var(--surface), var(--surface2));
  cursor: pointer; transition: all .3s; text-align: center; position: relative; overflow: hidden;
}
.role-card::after {
  content: '';
  position: absolute; inset: 0;
  opacity: 0; transition: opacity .3s;
}
.role-card.student::after { background: radial-gradient(circle at center, rgba(74,222,128,0.08), transparent 70%); }
.role-card.teacher::after { background: radial-gradient(circle at center, rgba(251,146,60,0.08), transparent 70%); }
.role-card:hover { transform: translateY(-5px); border-color: var(--border2); }
.role-card:hover::after { opacity: 1; }
.role-card.student:hover { border-color: rgba(74,222,128,0.5); box-shadow: 0 16px 40px rgba(74,222,128,0.15); }
.role-card.teacher:hover { border-color: rgba(251,146,60,0.5); box-shadow: 0 16px 40px rgba(251,146,60,0.15); }
.role-icon { font-size: 2.8rem; margin-bottom: .75rem; display: block; }
.role-name { font-family: 'Outfit', sans-serif; font-size: 1.15rem; font-weight: 700; margin-bottom: .3rem; }
.role-card.student .role-name { color: var(--student); }
.role-card.teacher .role-name { color: var(--teacher); }
.role-desc { font-size: .78rem; color: var(--text2); line-height: 1.6; }

/* ===== MAIN LAYOUT ===== */
#app { display: none; min-height: 100vh; flex-direction: column; }
.topbar {
  height: 58px; display: flex; align-items: center; padding: 0 1.5rem;
  border-bottom: 1px solid var(--border); background: rgba(15,17,23,0.92);
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 100; gap: 1rem;
}
.topbar-logo {
  font-family: 'Outfit', sans-serif; font-size: .8rem; font-weight: 800;
  letter-spacing: .18em; color: var(--accent); text-transform: uppercase; flex: 1;
}
.topbar-role {
  font-size: .72rem; font-weight: 700; padding: 4px 12px; border-radius: 20px;
  letter-spacing: .06em;
}
.role-student { background: rgba(74,222,128,0.12); color: var(--student); border: 1px solid rgba(74,222,128,0.25); }
.role-teacher { background: rgba(251,146,60,0.12); color: var(--teacher); border: 1px solid rgba(251,146,60,0.25); }
.topbar-back {
  font-size: .75rem; color: var(--text2); cursor: pointer; padding: 5px 12px;
  border-radius: var(--radius-sm); border: 1px solid var(--border); transition: all .2s;
  background: transparent;
}
.topbar-back:hover { background: var(--surface); color: var(--text); border-color: var(--border2); }

.nav-tabs {
  display: flex; border-bottom: 1px solid var(--border); padding: 0 1.5rem;
  background: rgba(15,17,23,0.8); backdrop-filter: blur(8px);
  gap: 0; overflow-x: auto; position: sticky; top: 58px; z-index: 90;
}
.nav-tab {
  padding: .85rem 1.2rem; font-size: .82rem; font-weight: 600; cursor: pointer;
  border-bottom: 2px solid transparent; color: var(--text2); transition: all .2s; white-space: nowrap;
  position: relative;
}
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-tab:hover:not(.active) { color: var(--text); }

.page { display: none; flex: 1; overflow-y: auto; }
.page.active { display: block; }
.content { max-width: 920px; margin: 0 auto; padding: 2rem 1.5rem; }

/* ===== FLASHCARD ===== */
.day-selector { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.day-btn {
  padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); font-size: .78rem;
  font-family: var(--mono); cursor: pointer; transition: all .15s;
}
.day-btn.active { background: var(--accent); color: #0f1117; border-color: var(--accent); font-weight: 700; }
.day-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

.fc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.fc-progress-wrap { flex: 1; margin: 0 1rem; }
.fc-progress-text { font-size: .72rem; color: var(--text2); margin-bottom: 4px; display: flex; justify-content: space-between; font-family: var(--mono); }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-dark), var(--accent)); border-radius: 2px; transition: width .4s cubic-bezier(.4,0,.2,1); }

.fc-scene { perspective: 1000px; height: 290px; margin-bottom: 1.5rem; cursor: pointer; }
.fc-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .5s cubic-bezier(.4,0,.2,1); }
.fc-inner.flipped { transform: rotateY(180deg); }
.fc-face {
  position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
  border-radius: 18px; border: 1px solid var(--border); display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 2rem;
}
.fc-front { background: linear-gradient(145deg, var(--surface), var(--surface2)); }
.fc-back {
  transform: rotateY(180deg);
  background: linear-gradient(145deg, #0d1f12, #112218);
  border-color: rgba(74,222,128,0.3);
  box-shadow: 0 0 40px rgba(74,222,128,0.06);
}
.fc-hint { font-size: .65rem; font-weight: 700; letter-spacing: .2em; color: var(--text3); text-transform: uppercase; margin-bottom: 1rem; font-family: var(--mono); }
.fc-back .fc-hint { color: rgba(74,222,128,0.5); }
.fc-word { font-family: 'Outfit', sans-serif; font-size: 2.6rem; font-weight: 800; color: var(--text); text-align: center; letter-spacing: -0.02em; }
.fc-phonetic { font-size: .82rem; color: var(--text2); margin-top: .5rem; font-family: var(--mono); }
.fc-back .fc-word { color: #a7f3c2; font-size: 3rem; text-shadow: 0 0 30px rgba(74,222,128,0.3); }
.fc-meaning { font-size: 1.25rem; color: var(--text); text-align: center; line-height: 1.8; margin-top: .75rem; font-weight: 700; word-break: keep-all; }
.fc-back .fc-meaning { color: #e8fdf0; }
.fc-meaning .pos { color: var(--accent); font-size: .85rem; font-weight: 800; margin-right: .35rem; font-family: var(--mono); }
.fc-num { font-size: .72rem; color: var(--text3); margin-top: 1rem; font-family: var(--mono); }
.fc-tip { font-size: .72rem; color: var(--text3); margin-top: .5rem; }
.fc-back .fc-num, .fc-back .fc-tip { color: rgba(74,222,128,0.4); }

.fc-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .75rem; margin-bottom: 1.5rem; }
.fc-btn {
  padding: .85rem; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); font-size: .82rem; font-weight: 600;
  cursor: pointer; transition: all .2s; font-family: inherit;
}
.fc-btn:hover { transform: translateY(-2px); }
.fc-btn.know { border-color: rgba(96,165,250,0.4); color: var(--accent3); background: rgba(96,165,250,0.06); }
.fc-btn.know:hover { background: rgba(96,165,250,0.12); box-shadow: 0 4px 16px rgba(96,165,250,0.12); }
.fc-btn.unsure { border-color: rgba(248,113,113,0.4); color: var(--accent2); background: rgba(248,113,113,0.06); }
.fc-btn.unsure:hover { background: rgba(248,113,113,0.12); }
.fc-btn.flip-btn { border-color: rgba(74,222,128,0.3); color: var(--accent); background: rgba(74,222,128,0.06); }
.fc-btn.flip-btn:hover { background: rgba(74,222,128,0.12); }

.fc-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: .75rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; text-align: center; }
.stat-num { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800; }
.stat-label { font-size: .7rem; color: var(--text2); margin-top: 2px; }
.stat-card.total .stat-num { color: var(--text); }
.stat-card.know .stat-num { color: var(--accent3); }
.stat-card.unsure .stat-num { color: var(--accent2); }

/* ===== WORD LIST ===== */
.word-list { display: flex; flex-direction: column; gap: .4rem; }
.word-row {
  display: flex; align-items: flex-start; gap: 1rem; padding: .9rem 1.2rem;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  transition: all .15s;
}
.word-row:hover { border-color: var(--border2); background: var(--surface2); }
.word-row.weak { border-left: 2px solid var(--accent2); }
.word-idx { font-size: .65rem; color: var(--text3); font-family: var(--mono); min-width: 28px; margin-top: 3px; }
.word-en { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); min-width: 140px; }
.word-kr { font-size: .85rem; color: var(--text2); flex: 1; line-height: 1.6; }
.word-tag { font-size: .62rem; padding: 2px 8px; border-radius: 20px; white-space: nowrap; margin-top: 2px; font-weight: 600; }
.tag-weak { background: rgba(248,113,113,0.12); color: var(--accent2); }

.search-bar { position: relative; margin-bottom: 1rem; }
.search-bar input {
  width: 100%; padding: .75rem 1rem .75rem 2.75rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: .88rem; outline: none;
  transition: border-color .2s; font-family: inherit;
}
.search-bar input::placeholder { color: var(--text3); }
.search-bar input:focus { border-color: rgba(74,222,128,0.4); }
.search-icon { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: .85rem; }

/* ===== WEAK WORDS ===== */
.weak-header { display: flex; align-items: center; gap: .75rem; margin-bottom: 1.5rem; }
.weak-count { background: rgba(248,113,113,0.12); color: var(--accent2); font-size: .75rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
.clear-btn { margin-left: auto; font-size: .78rem; color: var(--text3); cursor: pointer; padding: 5px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); transition: all .2s; background: transparent; }
.clear-btn:hover { color: var(--accent2); border-color: rgba(248,113,113,0.4); }
.clear-btn:hover { color: var(--accent2); border-color: var(--accent2); }

/* ===== STUDENT EXAM ===== */
.exam-meta { display: grid; grid-template-columns: repeat(3,1fr); gap: .75rem; margin-bottom: 1.5rem; }
.exam-meta-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; }
.exam-meta-label { font-size: .68rem; color: var(--text2); margin-bottom: .25rem; font-family: var(--mono); text-transform: uppercase; letter-spacing: .05em; }
.exam-meta-val { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 700; }

.exam-q-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: .75rem; transition: border-color .2s; }
.exam-q-wrap.timeout { border-color: rgba(248,113,113,0.4); }
.exam-q-wrap.answered { border-color: rgba(74,222,128,0.3); }
.exam-q-header { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; }
.exam-q-num { font-size: .7rem; font-family: var(--mono); color: var(--text3); min-width: 36px; }
.exam-q-word { font-family: 'Outfit', sans-serif; font-size: 1.35rem; font-weight: 700; color: var(--text); flex: 1; }
.exam-timer {
  width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: .72rem; font-weight: 700; font-family: var(--mono);
  border: 2px solid var(--border); color: var(--text2); transition: all .3s; flex-shrink: 0;
}
.exam-timer.urgent { border-color: var(--accent2); color: var(--accent2); animation: pulse .5s infinite alternate; }
.exam-timer.done { border-color: var(--text3); color: var(--text3); }
@keyframes pulse { from { opacity: 1; } to { opacity: .4; } }
.exam-hint { font-size: .78rem; color: var(--text2); margin-bottom: .75rem; }
.exam-input {
  width: 100%; padding: .75rem 1rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: .95rem; outline: none;
  transition: border-color .2s; font-family: var(--mono);
}
.exam-input:focus { border-color: rgba(74,222,128,0.4); }
.exam-input:disabled { opacity: .35; cursor: not-allowed; }
.exam-input.retry-mode { border-color: rgba(251,146,60,0.4); background: rgba(251,146,60,0.05); }

.retry-banner { background: rgba(251,146,60,0.08); border: 1px solid rgba(251,146,60,0.3); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: none; }
.retry-banner.show { display: block; }
.retry-banner h3 { color: var(--teacher); font-size: .92rem; margin-bottom: .25rem; }
.retry-banner p { color: var(--text2); font-size: .8rem; }

.exam-btn { width: 100%; padding: 1rem; border-radius: var(--radius-sm); border: none; font-size: .95rem; font-weight: 700; cursor: pointer; transition: all .2s; margin-top: 1.5rem; font-family: inherit; }
.exam-btn.primary { background: linear-gradient(135deg, #22c55e, #4ade80); color: #0f1117; box-shadow: 0 4px 16px rgba(74,222,128,0.25); }
.exam-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(74,222,128,0.35); }
.exam-btn.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text2); }
.exam-btn.secondary:hover { border-color: var(--border2); color: var(--text); }
.exam-btn.danger { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--accent2); }

/* ===== RESULTS ===== */
.result-hero { text-align: center; padding: 2rem; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 1.5rem; }
.result-score { font-family: 'Outfit', sans-serif; font-size: 4.5rem; font-weight: 800; letter-spacing: -0.03em; }
.result-score.pass { color: var(--accent); text-shadow: 0 0 40px rgba(74,222,128,0.3); }
.result-score.fail { color: var(--accent2); }
.result-sub { color: var(--text2); font-size: .88rem; margin-top: .5rem; }
.result-list { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1.5rem; }
.result-row { display: grid; grid-template-columns: 32px 140px 1fr 1fr; gap: .75rem; align-items: center; padding: .8rem 1.2rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: .83rem; }
.result-row.correct { border-left: 2px solid var(--accent); }
.result-row.wrong { border-left: 2px solid var(--accent2); }
.result-row.empty { border-left: 2px solid var(--text3); }
.result-num { color: var(--text3); font-family: var(--mono); font-size: .7rem; }
.result-word { font-weight: 700; font-family: 'Outfit', sans-serif; }
.result-student { color: var(--text2); }
.result-correct-ans { color: var(--accent); }
.result-wrong-ans { color: var(--accent2); }
.result-icon { font-size: .88rem; }
.submit-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
.submit-section h3 { margin-bottom: 1rem; font-size: .95rem; }
.submit-row { display: flex; gap: .75rem; margin-bottom: .75rem; }
.submit-input {
  flex: 1; padding: .65rem 1rem; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: .88rem; outline: none; font-family: inherit;
}
.submit-input:focus { border-color: rgba(74,222,128,0.4); }

/* ===== TEACHER ===== */
.teacher-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
.teacher-section h2 { font-size: .95rem; color: var(--teacher); margin-bottom: 1.25rem; display: flex; align-items: center; gap: .5rem; font-family: 'Outfit', sans-serif; font-weight: 700; }
.day-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: .5rem; }
.day-checkbox { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.day-checkbox input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--teacher); cursor: pointer; }
.day-checkbox label { font-size: .68rem; color: var(--text2); font-family: var(--mono); }
.gen-btn {
  width: 100%; padding: 1rem; border-radius: var(--radius-sm); border: none;
  background: linear-gradient(135deg, #ea580c, var(--teacher));
  color: #fff; font-size: .95rem; font-weight: 700; cursor: pointer; transition: all .2s;
  margin-top: 1rem; font-family: inherit;
  box-shadow: 0 4px 16px rgba(251,146,60,0.25);
}
.gen-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(251,146,60,0.35); }
.gen-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }

.inbox-list { display: flex; flex-direction: column; gap: .6rem; }
.inbox-item { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1.1rem; cursor: pointer; transition: all .2s; }
.inbox-item:hover { border-color: rgba(251,146,60,0.4); background: rgba(251,146,60,0.04); }
.inbox-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .4rem; }
.inbox-name { font-weight: 700; font-size: .9rem; }
.inbox-score { font-family: var(--mono); font-size: .82rem; font-weight: 700; }
.inbox-score.pass { color: var(--accent); }
.inbox-score.fail { color: var(--accent2); }
.inbox-meta { font-size: .72rem; color: var(--text2); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 1.5rem; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-close { float: right; font-size: 1.1rem; cursor: pointer; color: var(--text2); transition: color .2s; }
.modal-close:hover { color: var(--text); }
.modal h2 { font-size: 1.05rem; margin-bottom: 1.25rem; font-family: 'Outfit', sans-serif; }

/* ===== LIVE EXAM PAGE ===== */
.exam-code-display { text-align: center; padding: 2rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1.5rem; }
.exam-code { font-family: var(--mono); font-size: 3rem; font-weight: 700; color: var(--teacher); letter-spacing: .15em; }
.exam-code-label { color: var(--text2); font-size: .83rem; margin-top: .5rem; }

.code-entry { display: flex; flex-direction: column; gap: 1rem; max-width: 360px; margin: 2rem auto; text-align: center; }
.code-entry h2 { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 700; }
.big-input {
  padding: 1rem 1.5rem; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: 1.6rem; text-align: center;
  font-family: var(--mono); outline: none; letter-spacing: .2em; transition: border-color .2s;
}
.big-input:focus { border-color: rgba(74,222,128,0.4); }

.section-title {
  font-family: 'Outfit', sans-serif; font-size: 1.3rem; font-weight: 800;
  color: var(--text); margin-bottom: 1.5rem; letter-spacing: -0.02em;
}
.section-title span { color: var(--accent); }

.empty-state { text-align: center; padding: 3rem; color: var(--text3); font-size: .88rem; }
.empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }

/* Audio btn */
.audio-btn {
  width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: .78rem;
  transition: all .2s; flex-shrink: 0;
}
.audio-btn:hover { border-color: rgba(74,222,128,0.4); color: var(--accent); }

.tag-day { font-size: .62rem; padding: 2px 8px; border-radius: 20px; background: rgba(74,222,128,0.1); color: var(--accent); white-space: nowrap; font-family: var(--mono); }

/* ===== BOOKS ===== */
.book-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1rem; margin-bottom:1.5rem; }
.book-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; cursor:pointer; transition:all .2s; }
.book-card:hover { border-color:var(--border2); transform:translateY(-2px); }
.book-card.active { border-color:rgba(74,222,128,0.4); box-shadow:0 0 0 1px rgba(74,222,128,0.12); background: rgba(74,222,128,0.03); }
.book-title { font-family:'Outfit',sans-serif; font-size:1rem; font-weight:700; margin-bottom:.35rem; }
.book-meta { font-size:.78rem; color:var(--text2); line-height:1.6; }
.teacher-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:.75rem; }
.teacher-textarea {
  width:100%; min-height:200px; padding:1rem;
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm);
  color:var(--text); font-size:.85rem; outline:none; resize:vertical; font-family:var(--mono);
}
.teacher-textarea:focus { border-color:rgba(74,222,128,0.4); }
.helper-text { color:var(--text2); font-size:.78rem; line-height:1.7; margin-bottom:.75rem; }
.day-list-chip { font-size:.65rem; padding:3px 9px; border-radius:999px; background:rgba(74,222,128,0.08); color:var(--accent); display:inline-block; margin:0 .3rem .3rem 0; font-family:var(--mono); }
.exam-stage { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; margin-bottom:1rem; }
.exam-progress-line { display:flex; justify-content:space-between; gap:1rem; margin-bottom:1rem; color:var(--text2); font-size:.8rem; }
.exam-word-meaning { font-family:'Outfit',sans-serif; font-size:1.7rem; font-weight:800; line-height:1.5; margin:1rem 0 1.25rem; letter-spacing:-0.02em; }
.exam-controls { display:flex; gap:.75rem; margin-top:1rem; }
.exam-controls .exam-btn { margin-top:0; }
.inline-danger { color:var(--accent2); font-size:.8rem; margin-top:.75rem; }

.account-note { margin-top: .75rem; font-size: .78rem; color: var(--text2); }
.history-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; margin-top: .9rem; }
.history-card h3 { font-family:'Outfit',sans-serif; font-size: .92rem; margin-bottom: .4rem; font-weight:700; }
.history-meta { font-size: .78rem; color: var(--text2); line-height: 1.7; }
.history-empty { margin-top:1rem; padding:1rem; border:1px dashed var(--border); border-radius:var(--radius-sm); color:var(--text2); }

@media (max-width: 700px) {
  .teacher-form-grid, .exam-meta, .fc-stats { grid-template-columns:1fr; }
  .exam-controls { flex-direction:column; }
  .result-row { grid-template-columns: 28px 1fr 1fr; }
  .result-row .result-word { grid-column: 2 / -1; }
}

/* ===== POLISH DETAILS ===== */
.review-chip-row { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.55rem; }
.review-chip { border:1px solid var(--border); border-radius:999px; padding:.35rem .7rem; font-size:.75rem; font-weight:700; cursor:pointer; background:var(--surface); color:var(--text2); transition:all .2s; }
.review-chip.active.correct { background:rgba(74,222,128,0.12); color:var(--accent); border-color:rgba(74,222,128,0.3); }
.review-chip.active.wrong { background:rgba(248,113,113,0.12); color:var(--accent2); border-color:rgba(248,113,113,0.3); }
.review-chip.active.empty { background:rgba(96,165,250,0.12); color:var(--accent3); border-color:rgba(96,165,250,0.3); }
.review-summary-grid { display:flex; gap:.75rem; margin-bottom:1rem; flex-wrap:wrap; }
.review-summary-card { flex:1; min-width:120px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:1rem; text-align:center; }
.result-review-note { margin-top:.75rem; padding:.8rem 1rem; border-radius:var(--radius-sm); background:rgba(251,146,60,0.08); border:1px solid rgba(251,146,60,0.25); color:#c97b30; font-size:.84rem; }

/* ===== PASSAGE / TEXT STUDY FEATURES ===== */
.passage-container {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.5rem; margin-bottom: 1.5rem;
}
.passage-toolbar {
  display: flex; align-items: center; gap: .6rem; margin-bottom: 1rem;
  flex-wrap: wrap;
}
.passage-btn {
  padding: .45rem .9rem; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); font-size: .78rem; font-weight: 600;
  cursor: pointer; transition: all .2s; font-family: inherit;
}
.passage-btn:hover { border-color: var(--border2); color: var(--text); }
.passage-btn.active { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.4); color: var(--accent); }
.passage-btn.teacher-active { background: rgba(251,146,60,0.1); border-color: rgba(251,146,60,0.4); color: var(--teacher); }
.passage-title {
  font-family: 'Outfit', sans-serif; font-size: .95rem; font-weight: 700;
  color: var(--text); margin-bottom: .75rem;
}
.passage-text {
  font-size: .95rem; line-height: 2; color: var(--text); user-select: text;
  word-break: break-word;
}
.passage-word {
  cursor: pointer; border-radius: 3px; padding: 0 2px;
  transition: background .15s, color .15s;
  display: inline;
}
.passage-word:hover { background: rgba(74,222,128,0.15); }
.passage-word.selected { background: rgba(74,222,128,0.25); color: var(--accent); font-weight: 700; }
.passage-word.unknown { background: rgba(248,113,113,0.18); color: var(--accent2); border-bottom: 1.5px solid var(--accent2); }
.passage-word.in-vocab { background: rgba(96,165,250,0.15); color: var(--accent3); }
.passage-word.hidden { background: rgba(74,222,128,0.1); color: transparent; border-radius: 4px; border-bottom: none; cursor: default; }
.passage-word.hidden:hover { background: rgba(74,222,128,0.2); color: var(--accent); }

.selected-words-panel {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.25rem; margin-top: 1rem;
}
.selected-words-panel h4 { font-size: .85rem; font-weight: 700; margin-bottom: .75rem; color: var(--text); }
.selected-word-chip {
  display: inline-flex; align-items: center; gap: .4rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: .3rem .8rem; margin: .25rem;
  font-size: .8rem; font-weight: 600; color: var(--text);
}
.selected-word-chip .chip-remove {
  color: var(--text3); cursor: pointer; font-size: .7rem;
  transition: color .15s;
}
.selected-word-chip .chip-remove:hover { color: var(--accent2); }

.passage-memo-area {
  width: 100%; min-height: 80px; padding: .85rem 1rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: .88rem;
  outline: none; resize: vertical; font-family: inherit; margin-top: .75rem;
}
.passage-memo-area:focus { border-color: rgba(74,222,128,0.35); }
.passage-memo-area::placeholder { color: var(--text3); }

.translate-panel {
  background: rgba(96,165,250,0.06); border: 1px solid rgba(96,165,250,0.2);
  border-radius: var(--radius-sm); padding: 1rem 1.25rem; margin-top: 1rem;
  font-size: .88rem; line-height: 1.8; color: var(--text2);
}
.translate-panel .t-label {
  font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .15em;
  color: var(--accent3); margin-bottom: .4rem; font-family: var(--mono);
}

.vocab-request-banner {
  background: rgba(74,222,128,0.06); border: 1px solid rgba(74,222,128,0.2);
  border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem;
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
.vocab-request-info { flex: 1; font-size: .85rem; color: var(--text2); }
.vocab-request-info strong { color: var(--accent); }

/* ===== PASSAGE INPUT (TEACHER) ===== */
.passage-input-wrap { position: relative; }
.passage-input-wrap textarea {
  width: 100%; min-height: 180px; padding: 1rem;
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-size: .9rem; outline: none; resize: vertical; font-family: inherit;
  line-height: 1.8;
}
.passage-input-wrap textarea:focus { border-color: rgba(74,222,128,0.35); }
.passage-input-wrap textarea::placeholder { color: var(--text3); }

.vocab-book-list { display: flex; flex-direction: column; gap: .5rem; }
.vocab-book-item {
  display: flex; align-items: center; gap: .75rem; padding: .85rem 1.1rem;
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
  transition: all .15s;
}
.vocab-book-item:hover { border-color: var(--border2); }
.vocab-book-item .vbi-word { font-family:'Outfit',sans-serif; font-weight:700; font-size:.95rem; min-width:140px; }
.vocab-book-item .vbi-meaning { font-size:.83rem; color:var(--text2); flex:1; }
.vocab-book-item .vbi-actions { display:flex; gap:.4rem; }

.memoise-panel {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.5rem; margin-top: 1rem;
}
.memoise-line {
  font-size: 1rem; line-height: 2.2; color: var(--text);
  padding: .5rem .75rem; border-radius: var(--radius-sm);
  transition: background .2s;
}
.memoise-line.revealed { background: rgba(74,222,128,0.06); }
.memoise-line.concealed { background: var(--surface2); color: transparent; cursor: pointer; user-select: none; position: relative; }
.memoise-line.concealed::after {
  content: '탭하여 확인';
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  font-size: .72rem; color: var(--text3); font-family: var(--mono);
}

.passage-list-item {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 1rem 1.25rem; margin-bottom: .5rem; cursor: pointer; transition: all .2s;
  display: flex; align-items: flex-start; gap: .75rem;
}
.passage-list-item:hover { border-color: var(--border2); }
.passage-list-item.active { border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.03); }
.passage-list-item .pli-title { font-weight:700; font-size:.9rem; margin-bottom:.25rem; }
.passage-list-item .pli-meta { font-size:.75rem; color:var(--text2); }

.tab-inner { border-bottom: 1px solid var(--border); display: flex; gap: 0; margin-bottom: 1.5rem; }
.tab-inner-btn {
  padding: .6rem 1rem; font-size: .8rem; font-weight: 600; cursor: pointer;
  border-bottom: 2px solid transparent; color: var(--text2); transition: all .2s;
}
.tab-inner-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-inner-btn:hover:not(.active) { color: var(--text); }

/* scrollbar for passage areas */
.passage-text { max-height: 500px; overflow-y: auto; }
.passage-line { margin-bottom: .7rem; line-height: 1.9; }
.passage-line:last-child { margin-bottom: 0; }

/* ===== 2026 LIGHT UI / PASSAGE UX OVERRIDES ===== */
:root {
  --bg: #f4f7fb;
  --surface: #ffffff;
  --surface2: #f8fbff;
  --border: #d7e0ea;
  --border2: #bcc9d8;

  --accent-dark: #15803d;
  --accent-glow: rgba(22,163,74,0.12);

  --accent3: #2563eb;
  --accent4: #ea580c;
  --text: #16202d;
  --text2: #526174;
  --text3: #7a8798;
  --card: #ffffff;
  --teacher: #ea580c;
  --student: #16a34a;

}
body {

.gen-btn:active, .fc-btn:active, .passage-btn:active, .audio-btn:active {

.passage-btn, .audio-btn {
  background: linear-gradient(180deg, #ffffff, #eef4fb) !important;

}
.passage-btn.active {
  background: linear-gradient(180deg, #ecfdf3, #dcfce7) !important;

}

.passage-line {

}

.passage-line.clickable:hover { background: rgba(37,99,235,0.07); }
.passage-line.playing {

.passage-line .line-audio {

.passage-word { position: relative; border-radius: 8px; padding: 1px 4px; }
.passage-word:hover { background: rgba(22,163,74,0.12); }
.passage-word.speaking { background: rgba(37,99,235,0.16); color: #1d4ed8; font-weight: 700; }
.passage-helper {
  margin-top: .8rem; color: var(--text2); font-size: .8rem;

.teacher-manage-card {
  background: linear-gradient(180deg, #ffffff, #f7fafc);

}
.teacher-mini-btn {
  border: 1px solid var(--border2);
  background: linear-gradient(180deg, #ffffff, #edf3fa);
  color: var(--text);
  border-radius: 10px;
  padding: .5rem .8rem;
  cursor: pointer;
  font-weight: 700;
}
.teacher-mini-btn.danger { color: var(--accent2); }
.teacher-mini-btn.primary { color: var(--accent3); }

function getProfileStore() { return JSON.parse(localStorage.getItem(PROFILE_STORAGE_KEY)||'{}'); }

  const builtins = (BUILTIN_BOOKS || []).map(b => b.id);

  if (!getBookById(currentBookId)) currentBookId = getDefaultBookId();

function getBaseBook() {

}
function getAllBooks() {
  const builtins = BUILTIN_BOOKS.map(b => ({ ...b, themes: b.themes || {}, isBase: true }));
  return [...builtins, ...customBooks.map(b => ({ ...b, themes: b.themes || {}, isBase: false }))];
}
function getBookById(id) {
  const all = getAllBooks();
  return all.find(b => b.id === id) || all[0] || null;
}
function getCurrentBook() {
  const book = getBookById(currentBookId);
  return book || getBaseBook();
}
function setCurrentBook(id) {
  currentBookId = getBookById(id)?.id || getDefaultBookId();
  saveCurrentBook();
}
function normalizeBookDays(book = getCurrentBook()) {
  if (!book || typeof book !== 'object') return {};

  const cleanWordArray = (arr) => Array.isArray(arr)
    ? arr.filter(item => item && typeof item === 'object' && (item.en || item.kr)).map(item => ({
        ...item,
        en: String(item.en || '').trim(),
        kr: String(item.kr || '').trim()
      })).filter(item => item.en || item.kr)
    : [];

  const fromDays = (src) => {
    const out = {};
    Object.entries(src || {}).forEach(([key, value]) => {
      const cleaned = cleanWordArray(value);
      if (cleaned.length) out[String(key)] = cleaned;
    });
    return out;
  };

  // 1) 정상 형식: { days: { day1:[...], day2:[...] } }
  if (book.days && typeof book.days === 'object' && !Array.isArray(book.days)) {
    const normalized = fromDays(book.days);
    if (Object.keys(normalized).length) return normalized;
  }

  // 2) 레거시 형식: { day1:[...], day2:[...] } 가 루트에 직접 저장된 경우
  const rootDayEntries = Object.entries(book)
    .filter(([key, value]) => (/^day\s*\d+$/i.test(String(key)) || /^\d+$/.test(String(key))) && Array.isArray(value));
  if (rootDayEntries.length) {
    const normalized = fromDays(Object.fromEntries(rootDayEntries));
    if (Object.keys(normalized).length) return normalized;
  }

  // 3) 더 오래된 형식: { words:[...] } 또는 { items:[...] }
  const rootWords = cleanWordArray(book.words || book.items || []);
  if (rootWords.length) return { all: rootWords };

  return {};
}
function getDayKeys(book = getCurrentBook()) {
  const keys = Object.keys(normalizeBookDays(book));
  return keys.sort((a,b) => daySortValue(a) - daySortValue(b) || String(a).localeCompare(String(b), 'ko'));
}
function daySortValue(key) {
  const m = String(key).match(/\d+/);
  return m ? parseInt(m[0], 10) : Number.MAX_SAFE_INTEGER;
}
function getDayLabel(dayKey) {
  if (String(dayKey) === 'all') return '전체';
  return /^\d+$/.test(String(dayKey)) ? `Day ${dayKey}` : String(dayKey);
}
function getDayTheme(book, dayKey) {
  return (book.themes || {})[dayKey] || (book.themes || {})[Number(dayKey)] || '';
}
function getWordsByDay(book = getCurrentBook(), dayKey = getDayKeys(book)[0]) {
  const days = normalizeBookDays(book);
  return days[String(dayKey)] || [];
}
function ensureCurrentDay() {
  const book = getCurrentBook();
  const dayKeys = getDayKeys(book);
  if (!dayKeys.length) return null;
  if (!fcDayKey || !dayKeys.includes(String(fcDayKey)) && !dayKeys.includes(fcDayKey)) fcDayKey = dayKeys[0];
  return fcDayKey;
}
function normalizeWeakWords() {
  weakWords = weakWords.map(w => ({
    bookId: w.bookId || getDefaultBookId(),
    dayKey: w.dayKey != null ? String(w.dayKey) : String(w.day || 1),
    en: w.en, kr: w.kr
  }));
  saveWeak();
}

normalizeWeakWords();

function ensureAccountAuth() {
  const store = getAuthStore();
  let username = prompt(activeUsername ? `현재 로그인: ${activeUsername}\n다른 계정으로 바꾸려면 아이디를 입력하세요.\n같은 계정이면 그대로 확인을 누르세요.` : `아이디를 입력하세요.\n처음이면 새 계정이 생성됩니다.`, activeUsername || '');
  if (username === null) return false;
  username = String(username).trim();
  if (!username) {
    alert('아이디를 입력해야 합니다.');
    return false;
  }
  const password = prompt('비밀번호를 입력하세요.');
  if (password === null) return false;
  if (!store[username]) {
    store[username] = { password: String(password), createdAt: new Date().toISOString() };
    saveAuthStore(store);
  } else if (store[username].password !== String(password)) {
    alert('비밀번호가 올바르지 않습니다.');
    return false;
  }
  activeUsername = username;
  localStorage.setItem(SESSION_STORAGE_KEY, activeUsername);
  loadProfile(activeUsername);
  normalizeWeakWords();
  updateAccountBadge();
  return true;
}

    ? [['books','📚 단어장'],['flash','🃏 플래시카드'],['list','📋 단어목록'],['weak','⚡ 약한단어'],['passage','📖 본문학습'],['exam','✏️ 시험'],['student-results','📊 내결과']]

  navItems.forEach(([id,label],i) => {
    const t = document.createElement('div');
    t.className = 'nav-tab' + (i===0?' active':'');
    t.textContent = label;
    t.onclick = () => switchPage(id);
    t.id = 'tab-'+id;
    tabs.appendChild(t);
    const p = document.createElement('div');
    p.className = 'page' + (i===0?' active':'');
    p.id = 'page-'+id;
    pages.appendChild(p);
  });
  renderAll();
}

function switchPage(id) {
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');

  if (id === 'teacher-inbox') renderTeacherInbox();

  if (id === 'list') renderList();
  if (id === 'weak') renderWeak();

  if (id === 'books') renderBooksPage();
  if (id === 'passage') renderPassagePage();
  if (id === 'passage-teacher') renderPassageTeacherPage();
}

function ptAddPassage() {
  const title = (document.getElementById('pt-title')||{}).value?.trim();
  const text = (document.getElementById('pt-text')||{}).value?.trim();
  const translation = (document.getElementById('pt-translation')||{}).value?.trim();
  if (!title) { alert('제목을 입력하세요.'); return; }
  if (!text) { alert('본문을 입력하세요.'); return; }
  const id = 'ps-' + Date.now();
  passages.unshift({ id, title, text, translation: translation || '', vocabRequests: [], createdAt: new Date().toISOString() });
  savePassages();
  renderPassageTeacherPage();
  alert('본문이 추가되었습니다!');
}

function ptAddWordsToVocab(passageId, reqIdx, wordsRaw) {
  const words = typeof wordsRaw === 'string' ? wordsRaw.replace(/'/g,'"') : '';
  let wordArr;
  try { wordArr = JSON.parse(words); } catch(e) { wordArr = []; }
  // Add to customBooks as a new day or append
  const book = getCurrentBook();
  const dayKeys = getDayKeys(book);
  const newDayKey = 'passage-' + Date.now();
  const ps = passages.find(p=>p.id===passageId);
  const newWords = (wordArr||[]).map(w=>({ en: String(w), kr: '(번역 필요)' }));
  if (!newWords.length) { alert('단어가 없습니다.'); return; }
  if (!book.isBase) {
    if (!book.days) book.days = {};
    book.days[newDayKey] = newWords;
    saveBooks();
  } else {
    // Add to customBooks
    const newBook = {
      id: 'vocab-' + Date.now(),
      title: (ps ? ps.title : '본문') + ' 단어장',
      days: { [newDayKey]: newWords },
      themes: {},
      createdAt: new Date().toISOString()
    };
    customBooks.push(newBook);
    saveBooks();
  }
  alert(`${newWords.length}개 단어가 단어장에 추가되었습니다!\n(뜻은 단어장 관리에서 수정하세요)`);
  ptDismissRequest(passageId, null, reqIdx);
}

async function ptDismissRequest(passageId, studentName, reqIdx) {
  const ps = passages.find(p=>p.id===passageId);
  if (!ps) return;
  // remove the specific request
  const allReqs = [];
  passages.forEach(p => (p.vocabRequests||[]).forEach(r => allReqs.push({pid:p.id,...r})));
  const target = allReqs[reqIdx];
  if (target && ps) {
    ps.vocabRequests = (ps.vocabRequests||[]).filter(r => !(r.studentName===target.studentName && r.createdAt===target.createdAt));
    ps.updatedAt = new Date().toISOString();
  }
  if (typeof cloudSavePassage === 'function') {
    await cloudSavePassage(ps);
  } else {
    savePassages();
  }
  renderPTRequests();
  updateReqCount();
}

function splitPassageIntoLines(text) {
  const raw = String(text || '').replace(/\r?\n+/g, ' ').replace(/\s+/g, ' ').trim();
  if (!raw) return [];
  const parts = raw.match(/[^.!?]+(?:[.!?]+|$)/g) || [raw];
  return parts.map(s => s.trim()).filter(Boolean);
}

function formatPassageText(text) {
  const lines = splitPassageIntoLines(text);
  if (!lines.length) return '';
  return lines.map(line => `<div class="passage-line">${escapeHtml(line)}</div>`).join('');
}

function renderPassageContent(ps) {
  const area = document.getElementById('passage-content-area');
  const extra = document.getElementById('passage-extra-area');
  if (!area) return;

  if (passageStudyMode === 'read') {
    area.innerHTML = `<div class="passage-text" style="max-height:none;">${formatPassageText(ps.text)}</div>`;
    if (extra) extra.innerHTML = '';

  } else if (passageStudyMode === 'vocab') {
    // Tokenize into clickable words
    const tokens = tokenizePassage(ps.text);
    area.innerHTML = `<div class="passage-text" style="max-height:none;" id="clickable-text">${tokens.map((tok,i) => {
      if (tok.type === 'word') {
        const sel = selectedPassageWords.find(s=>s.idx===i);
        return `<span class="passage-word${sel?' selected':''}" data-idx="${i}" onclick="togglePassageWord(${i},'${escapeAttr(tok.value)}')">${escapeHtml(tok.value)}</span>`;
      }
      return tok.value.includes('.') ? `<span>${escapeHtml(tok.value).replace(/\./g, '.<br>')}</span>` : `<span>${escapeHtml(tok.value)}</span>`;
    }).join('')}</div>`;
    renderVocabPanel(extra);

  } else if (passageStudyMode === 'memorize') {
    renderMemorizeMode(area, ps);
    if (extra) extra.innerHTML = '';

  } else if (passageStudyMode === 'translate') {
    area.innerHTML = `<div class="passage-text" style="max-height:none;">${formatPassageText(ps.text)}</div>`;
    if (extra) extra.innerHTML = `<div class="translate-panel">
      <div class="t-label">한국어 번역</div>
      <div>${escapeHtml(ps.translation)}</div>
    </div>`;
  }
}

function tokenizePassage(text) {
  const tokens = [];
  const re = /([a-zA-Z''-]+|[^a-zA-Z''-]+)/g;
  let m;
  let idx = 0;
  while ((m = re.exec(text)) !== null) {
    const val = m[0];
    if (/^[a-zA-Z''-]+$/.test(val)) {
      tokens.push({ type: 'word', value: val, idx: idx++ });
    } else {
      tokens.push({ type: 'other', value: val });
    }
  }
  return tokens;
}

function togglePassageWord(idx, word) {
  const clean = word.replace(/[^a-zA-Z]/g,'');
  if (!clean) return;
  const existing = selectedPassageWords.findIndex(s=>s.idx===idx);
  if (existing >= 0) {
    selectedPassageWords.splice(existing, 1);
  } else {
    selectedPassageWords.push({ idx, word: clean });
  }
  const span = document.querySelector(`.passage-word[data-idx="${idx}"]`);
  if (span) span.classList.toggle('selected', selectedPassageWords.some(s=>s.idx===idx));
  const ps = passages.find(ps=>ps.id===currentPassageId);
  renderVocabPanel(document.getElementById('passage-extra-area'));
}

  if (!extra) return;
  if (!selectedPassageWords.length) {
    extra.innerHTML = `<div class="selected-words-panel"><h4>모르는 단어를 클릭하여 선택하세요</h4><div style="font-size:.8rem;color:var(--text3);">선택한 단어는 선생님께 단어장 생성을 요청할 수 있습니다.</div></div>`;
    return;
  }
  const chips = selectedPassageWords.map(s =>
    `<span class="selected-word-chip">
      <span>${escapeHtml(s.word)}</span>
      <span class="chip-remove" onclick="togglePassageWord(${s.idx},'${escapeAttr(s.word)}')">✕</span>
    </span>`).join('');

  extra.innerHTML = `<div class="selected-words-panel">
    <h4>선택된 단어 (${selectedPassageWords.length}개)</h4>
    <div style="margin-bottom:.75rem;">${chips}</div>

      <button class="passage-btn" onclick="speakSelectedWords()">🔊 발음 듣기</button>
    </div>
  </div>`;
}

function sendVocabRequest() {
  if (!selectedPassageWords.length) { alert('단어를 선택하세요.'); return; }
  const ps = passages.find(ps=>ps.id===currentPassageId);
  if (!ps) return;
  const words = selectedPassageWords.map(s=>s.word);
  const req = {
    studentName: activeUsername || '학생',
    words,
    createdAt: new Date().toISOString()
  };
  if (!ps.vocabRequests) ps.vocabRequests = [];
  ps.vocabRequests.push(req);
  savePassages();
  selectedPassageWords = [];
  alert(`${words.length}개 단어 요청을 보냈습니다!\n선생님이 단어장을 만들어 드릴 거예요.`);
  renderPassageContent(ps);
}

function speakSelectedWords() {
  const words = selectedPassageWords.map(s=>s.word);
  if (!words.length) return;
  let i = 0;
  function speakNext() {
    if (i >= words.length) return;
    const u = new SpeechSynthesisUtterance(words[i]);
    u.lang = 'en-US'; u.rate = 0.9;
    u.onend = () => { i++; setTimeout(speakNext, 600); };
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
  speakNext();
}

function speakPassage() {
  const ps = passages.find(ps=>ps.id===currentPassageId);
  if (!ps) return;
  const lines = splitPassageIntoLines(ps.text);
  if (!lines.length) return;
  let i = 0;
  function speakNextLine() {
    if (i >= lines.length) return;
    const u = new SpeechSynthesisUtterance(lines[i]);
    u.lang = 'en-US';
    u.rate = 0.85;
    u.onend = () => { i++; setTimeout(speakNextLine, 300); };
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
  speakNextLine();
}

function renderMemorizeMode(area, ps) {
  // Split into sentences
  const sentences = ps.text.match(/[^.!?]+[.!?]+/g) || [ps.text];
  let revealed = new Set();

  function render() {
    area.innerHTML = `<div class="memoise-panel">
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;">
        <div style="font-size:.8rem;color:var(--text2);">문장을 클릭하면 보여집니다. 모두 기억하면 완료!</div>
        <button class="passage-btn" onclick="memRevealAll()" style="margin-left:auto;">전체 보기</button>
        <button class="passage-btn" onclick="memHideAll()">전체 숨기기</button>
      </div>
      ${sentences.map((s,i) => `
        <div class="memoise-line ${revealed.has(i)?'revealed':'concealed'}" id="mem-line-${i}" onclick="memRevealLine(${i})">${escapeHtml(s.trim())}</div>
      `).join('')}
      <div style="margin-top:1rem;font-size:.8rem;color:var(--text3);">${revealed.size}/${sentences.length} 문장 확인됨</div>
    </div>`;
  }

  window.memRevealLine = (i) => {
    if (revealed.has(i)) revealed.delete(i); else revealed.add(i);
    render();
  };
  window.memRevealAll = () => { sentences.forEach((_,i) => revealed.add(i)); render(); };
  window.memHideAll = () => { revealed.clear(); render(); };

  render();
}

  const firstDay = getDayKeys(getCurrentBook())[0] || null;
  fcDayKey = firstDay;
  fcIdx = 0;
  renderAll();
}

function addCustomBook() {
  const title = (document.getElementById('new-book-title')||{}).value?.trim();
  const customIdRaw = (document.getElementById('new-book-id')||{}).value?.trim();
  const jsonText = (document.getElementById('new-book-json')||{}).value?.trim();
  if (!title) { alert('단어장 제목을 입력하세요.'); return; }
  if (!jsonText) { alert('단어 JSON을 입력하세요.'); return; }

  let parsed;
  try {
    parsed = JSON.parse(jsonText);
  } catch (e) {
    alert('JSON 형식이 올바르지 않습니다.');
    return;
  }

  if (Array.isArray(parsed) || typeof parsed !== 'object' || !Object.keys(parsed).length) {
    alert('JSON은 {"day1":[...], "day2":[...]} 형태의 객체여야 합니다.');
    return;
  }

  const normalizedDays = {};
  for (const [key, value] of Object.entries(parsed)) {
    if (!Array.isArray(value)) {
      alert(`"${key}"의 값은 배열이어야 합니다.`);
      return;
    }
    const cleaned = value.map((item, idx) => {
      if (!item || typeof item !== 'object' || !item.en || !item.kr) {
        throw new Error(`"${key}"의 ${idx+1}번째 항목에 en, kr가 필요합니다.`);
      }
      return { en: String(item.en).trim(), kr: String(item.kr).trim() };
    });
    normalizedDays[String(key)] = cleaned;
  }

  const newId = customIdRaw || ('book-' + Date.now());
  if (getAllBooks().some(b => b.id === newId)) {
    alert('이미 존재하는 book id입니다.');
    return;
  }

  try {
    customBooks.push({
      id: newId,
      title,
      days: normalizedDays,
      themes: {},
      createdAt: new Date().toISOString()
    });
  } catch (e) {
    alert(e.message || '단어장을 추가할 수 없습니다.');
    return;
  }

  saveBooks();
  setCurrentBook(newId);
  fcDayKey = getDayKeys(getCurrentBook())[0] || null;
  renderAll();
  alert('단어장이 추가되었습니다.');
}

function deleteCustomBook(bookId) {
  if (!confirm('이 단어장을 삭제할까요?')) return;
  customBooks = customBooks.filter(b => b.id !== bookId);
  generatedExams = generatedExams.filter(e => e.bookId !== bookId);
  weakWords = weakWords.filter(w => w.bookId !== bookId);
  if (currentBookId === bookId) setCurrentBook(getDefaultBookId());
  saveBooks(); saveExams(); saveWeak();
  renderAll();
}

function buildDaySelectorGeneric(containerId, book, activeDayKey, cb) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = '';
  getDayKeys(book).forEach(dayKey => {
    const b = document.createElement('button');
    b.className = 'day-btn'+(String(dayKey)===String(activeDayKey)?' active':'');
    b.textContent = getDayLabel(dayKey);
    b.onclick = ()=>cb(String(dayKey));
    c.appendChild(b);
  });
}

function updateFcCard() {
  const book = getCurrentBook();
  const dayWords = getWordsByDay(book, ensureCurrentDay());
  const w = dayWords[fcIdx];
  if(!w) return;
  const inner = document.getElementById('fc-inner');
  if(inner){
    inner.classList.remove('flipped');
    fcFlipped = false;
  }
  setEl('fc-word', w.en);
  setEl('fc-meaning', w.kr);
  setEl('fc-daynum', `${getDayLabel(fcDayKey)} · ${fcIdx+1} / ${dayWords.length}`);
  const pct = Math.round((fcIdx+1)/Math.max(dayWords.length,1)*100);
  setEl('fc-prog-txt', `${fcIdx+1} / ${dayWords.length}`);
  setEl('fc-prog-pct', pct+'%');
  const bar = document.getElementById('fc-prog-bar');
  if(bar) bar.style.width = pct+'%';
  setEl('fc-know-num', fcKnow);
  setEl('fc-unsure-num', fcUnsure);
}

function fcFlipCard() {
  const inner = document.getElementById('fc-inner');
  if(!inner) return;
  fcFlipped = !fcFlipped;
  inner.classList.toggle('flipped', fcFlipped);
}

function fcNext() {
  const dayWords = getWordsByDay(getCurrentBook(), ensureCurrentDay());
  fcIdx=(fcIdx+1)%Math.max(dayWords.length,1);
  updateFcCard();
}
function fcPrev() {
  const dayWords = getWordsByDay(getCurrentBook(), ensureCurrentDay());
  fcIdx=(fcIdx-1+Math.max(dayWords.length,1))%Math.max(dayWords.length,1);
  updateFcCard();
}

function fcRate(know) {
  const book = getCurrentBook();
  const w = getWordsByDay(book, ensureCurrentDay())[fcIdx];
  if (!w) return;
  if(know){
    fcKnow++;
    weakWords = weakWords.filter(x=>!(x.en===w.en&&String(x.dayKey)===String(fcDayKey)&&x.bookId===book.id));
  } else {
    fcUnsure++;
    if(!weakWords.find(x=>x.en===w.en&&String(x.dayKey)===String(fcDayKey)&&x.bookId===book.id)) weakWords.push({...w,bookId:book.id,dayKey:String(fcDayKey)});
  }
  saveWeak();
  updateFcCard();
  fcNext();
}

function speakWord() {
  const w = getWordsByDay(getCurrentBook(), ensureCurrentDay())[fcIdx];
  if(!w) return;
  const u = new SpeechSynthesisUtterance(w.en);
  u.lang = 'en-US';
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function renderList() {
  const p = document.getElementById('page-list');
  if (!p) return;
  const book = getCurrentBook();
  const dayKeys = getDayKeys(book);
  const defaultDay = dayKeys[0] || null;
  p.innerHTML = `<div class="content">
  <div class="section-title">단어 <span>목록</span></div>
  <div style="color:var(--text2);font-size:.85rem;margin-bottom:1rem;">단어장: ${escapeHtml(book.title)}</div>
  <div class="search-bar"><span class="search-icon">🔍</span><input id="list-search" placeholder="단어 검색..." oninput="filterList()" /></div>
  <div class="day-selector" id="list-days"></div>
  <div class="word-list" id="word-list-body"></div>
  </div>`;

  let listDay = defaultDay;
  buildDaySelectorGeneric('list-days', book, listDay, d=>{listDay=d;renderListWords(listDay);});
  renderListWords(listDay);

  function renderListWords(dayKey) {
    const search = ((document.getElementById('list-search')||{}).value||'').trim().toLowerCase();
    const body = document.getElementById('word-list-body');
    if(!body) return;
    const words = getWordsByDay(book, dayKey).filter(w=>!search||w.en.toLowerCase().includes(search)||w.kr.toLowerCase().includes(search));
    body.innerHTML = words.map((w,i)=>{
      const isWeak = weakWords.find(x=>x.en===w.en&&String(x.dayKey)===String(dayKey)&&x.bookId===book.id);
      return `<div class="word-row${isWeak?' weak':''}">
        <div class="word-idx">${String(i+1).padStart(2,'0')}</div>
        <div>
          <div class="word-en">${escapeHtml(w.en)}</div>
          ${isWeak?'<span class="word-tag tag-weak">복습 필요</span>':''}
        </div>
        <div class="word-kr">${escapeHtml(w.kr)}</div>
        <button class="audio-btn" onclick="speakAny('${escapeAttr(w.en)}')" title="발음 듣기">🔊</button>
      </div>`;
    }).join('') || `<div class="empty-state"><div class="empty-icon">🔎</div>검색 결과가 없습니다.</div>`;
  }

  window.filterList = ()=> {
    const sel = document.querySelector('#list-days .day-btn.active');
    if(sel){ renderListWords(sel.textContent.replace(/^Day /,'' ) === sel.textContent ? sel.textContent : sel.textContent.replace('Day ','').trim()); }
    else if (listDay) renderListWords(listDay);
  };
}

function speakAny(word) {
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function clearWeak() {
  const book = getCurrentBook();

    weakWords = weakWords.filter(w => w.bookId !== book.id);

function removeWeak(en, dayKey) {
  const book = getCurrentBook();
  weakWords = weakWords.filter(w=>!(w.en===en&&String(w.dayKey)===String(dayKey)&&w.bookId===book.id));
  saveWeak(); renderWeak();
}

function buildDaySelectorMultiGeneric(containerId, book, selected, cb) {
  const c = document.getElementById(containerId);
  if(!c) return;
  c.innerHTML = '';
  getDayKeys(book).forEach(dayKey=>{
    const b = document.createElement('button');
    b.className = 'day-btn'+(selected.includes(dayKey)?' active':'');
    b.textContent = getDayLabel(dayKey);
    b.onclick = ()=>{
      if(selected.includes(dayKey)) selected = selected.filter(x=>x!==dayKey);
      else selected = [...selected, dayKey];
      b.classList.toggle('active', selected.includes(dayKey));
      cb([...selected]);
    };
    c.appendChild(b);
  });
}

function startStudentExam() {
  const code = (document.getElementById('student-code')||{}).value||'';
  if(!code.trim()){ alert('시험 코드를 입력하세요'); return; }
  const exam = sharedGeneratedExams.find(e=>e.code===code);
  if(!exam){ alert('해당 코드의 시험을 찾을 수 없습니다.'); return; }
  examStudentName = activeUsername || '학생';
  examDays = exam.dayKeys || exam.days || [];
  examWords = (exam.words || []).map(w => ({...w}));
  currentExamCode = code;
  beginExam();
}

function startPracticeExam() {
  const book = getCurrentBook();
  const days = window._practiceGetDays ? window._practiceGetDays() : getDayKeys(book).slice(0,1);
  if(!days.length){ alert('이 단어장에는 시험에 사용할 목록이 없습니다. day 형식을 확인하세요.'); return; }
  examStudentName = (activeUsername || '연습');
  examDays = days;
  let pool = [];
  days.forEach(dayKey=>{ pool = pool.concat((getWordsByDay(book, dayKey)||[]).map(w=>({...w,dayKey:String(dayKey),bookId:book.id,bookTitle:book.title}))); });
  pool = shuffle(pool).slice(0,Math.min(100,pool.length));
  examWords = pool;
  currentExamCode = null;
  beginExam();
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function beginExam() {
  examAnswers = examWords.map(()=>({ val:'', timedOut:false, finalVal:'', result:'' }));
  examIndex = 0;
  clearExamTimer();
  renderExamRunner();
}

function clearExamTimer() {
  if (examTimer) clearInterval(examTimer);
  examTimer = null;
}

function renderExamRunner() {
  const p = document.getElementById('page-exam');
  if (!p) return;
  const current = examWords[examIndex];
  if (!current) { renderStudentExam(); return; }
  const dayStr = examDays.map(d=>getDayLabel(d)).join(', ');
  p.innerHTML = `<div class="content">
    <div class="section-title">단어 시험 <span style="font-size:.8rem;color:var(--text2);">— ${escapeHtml(examStudentName)}</span></div>
    <div class="exam-meta">
      <div class="exam-meta-card"><div class="exam-meta-label">범위</div><div class="exam-meta-val" style="font-size:.9rem;">${escapeHtml(dayStr)}</div></div>
      <div class="exam-meta-card"><div class="exam-meta-label">진행</div><div class="exam-meta-val">${examIndex+1} / ${examWords.length}</div></div>
      <div class="exam-meta-card"><div class="exam-meta-label">제한시간</div><div class="exam-meta-val">40초</div></div>
    </div>
    <div class="exam-stage">
      <div class="exam-progress-line">
        <div>${examWords[examIndex].bookTitle ? escapeHtml(examWords[examIndex].bookTitle) : escapeHtml(getCurrentBook().title)}</div>
        <div>문항 ${examIndex+1}</div>
      </div>
      <div class="exam-q-header" style="margin-bottom:.5rem;">
        <div class="exam-q-num">${String(examIndex+1).padStart(2,'0')}</div>
        <div class="exam-timer" id="single-exam-timer">40</div>
      </div>
      <div class="exam-hint">${getDayLabel(current.dayKey || examDays[0] || '')}</div>
      <div style="font-size:.82rem;color:var(--text2);margin:.25rem 0 .5rem;">영어 단어를 보고 한국어 뜻을 쓰세요.</div>
      <div class="exam-word-meaning" style="font-size:2.3rem;">${escapeHtml(current.en)}</div>
      <input class="exam-input" id="single-answer" type="text" placeholder="한글 뜻 입력..." autocomplete="off"
        onkeydown="if(event.key==='Enter'){ submitCurrentAnswer(); }" />
      <div class="exam-controls">
        <button class="exam-btn primary" onclick="submitCurrentAnswer()">${examIndex === examWords.length-1 ? '제출하고 결과 보기' : '입력하고 다음으로'}</button>
        <button class="exam-btn secondary" onclick="skipCurrentQuestion()">${examIndex === examWords.length-1 ? '건너뛰고 결과 보기' : '건너뛰기'}</button>
      </div>
      <div class="inline-danger">입력 즉시 다음 문제로 넘어가며, 임시 채점 후 선생님이 최종 수정할 수 있습니다.</div>
    </div>
  </div>`;
  const input = document.getElementById('single-answer');
  if (input) input.focus();
  startQuestionTimer();
}

function startQuestionTimer() {
  clearExamTimer();
  examCountdown = 40;
  const el = document.getElementById('single-exam-timer');
  if (el) {
    el.textContent = examCountdown;
    el.classList.remove('urgent','done');
  }
  examTimer = setInterval(() => {
    examCountdown--;
    const timerEl = document.getElementById('single-exam-timer');
    if (!timerEl) { clearExamTimer(); return; }
    timerEl.textContent = examCountdown;
    if (examCountdown <= 10) timerEl.classList.add('urgent');
    if (examCountdown <= 0) {
      finalizeCurrentAnswer(true);
    }
  }, 1000);
}

function submitCurrentAnswer() {
  finalizeCurrentAnswer(false);
}

function skipCurrentQuestion() {
  finalizeCurrentAnswer(false, true);
}

function finalizeCurrentAnswer(timedOut=false, forcedBlank=false) {
  clearExamTimer();
  const input = document.getElementById('single-answer');
  const raw = forcedBlank ? '' : ((input && input.value) || '');
  examAnswers[examIndex].val = raw;
  examAnswers[examIndex].timedOut = timedOut;
  examAnswers[examIndex].finalVal = raw;
  if (examIndex >= examWords.length - 1) {
    submitExam();
  } else {
    examIndex++;
    renderExamRunner();
  }
}

function submitExam() {
  clearExamTimer();
  let correct=0, wrong=0, empty=0;
  examWords.forEach((w,i)=>{
    const a=examAnswers[i];
    const ans=(a.finalVal||'').trim();
    if(!ans){a.result='empty';empty++;}
    else if(isMeaningCorrect(ans, w.kr||'')){a.result='correct';correct++;}
    else{a.result='wrong';wrong++;}
  });
  const score = examWords.length ? Math.round(correct/examWords.length*100) : 0;
  renderResult(score,correct,wrong,empty);
}

function submitToTeacher(score,correct,wrong,empty, silent=false) {
  const sharedExam = currentExamCode ? sharedGeneratedExams.find(e => e.code === currentExamCode) : null;
  const target = sharedExam?.ownerUsername || 'teacher';
  const sub = {
    name: examStudentName || activeUsername || '학생',
    score, correct, wrong, empty,
    total: examWords.length,
    days: examDays,
    code: currentExamCode,
    teacherTarget: target,
    bookId: examWords[0]?.bookId || currentBookId,
    bookTitle: examWords[0]?.bookTitle || getBookById(examWords[0]?.bookId || currentBookId).title,
    timestamp: new Date().toISOString(),
    reviewPending: true,
    autoSubmitted: true,
    answers: examWords.map((w,i)=>({word:w.en,kr:w.kr,student:examAnswers[i].finalVal||'',result:examAnswers[i].result,dayKey:w.dayKey||''}))
  };
  submissions.push(sub);
  saveSubmissions();
  const statusEl = document.getElementById('auto-submit-status');
  if (statusEl) {
    statusEl.textContent = `자동 제출 완료 · 임시 점수 ${score}점 (${correct}/${examWords.length}) · 선생님이 제출함에서 최종 수정할 수 있습니다.`;
  }
  if (!silent) {
    alert(`${examStudentName}님의 결과가 자동 제출되었습니다.
임시 점수: ${score}점 (${correct}/${examWords.length})
선생님이 제출함에서 최종 수정할 수 있습니다.`);
  }
}

function generateExam() {
  const book = getCurrentBook();
  const selected=[];
  getDayKeys(book).forEach(dayKey=>{
    const cb=document.getElementById(`tc-${CSS.escape(String(dayKey))}`);
    if(cb&&cb.checked) selected.push(String(dayKey));
  });
  if(!selected.length){ alert('목록을 선택하세요. 이 단어장의 목록을 불러오지 못했다면 단어장 형식을 다시 확인하세요.'); return; }
  const count = parseInt((document.getElementById('exam-count')||{}).value||100, 10);
  let pool=[];
  selected.forEach(dayKey=>{ pool=pool.concat((getWordsByDay(book, dayKey)||[]).map(w=>({...w,dayKey:String(dayKey),bookId:book.id,bookTitle:book.title}))); });
  pool=shuffle(pool).slice(0,Math.min(count,pool.length));
  const code = 'EX'+String(Math.floor(Math.random()*9000)+1000);
  const exam = { code, bookId: book.id, bookTitle: book.title, dayKeys:selected, words:pool, created:new Date().toISOString(), count:pool.length, ownerUsername: activeUsername };
  generatedExams.push(exam);
  sharedGeneratedExams = sharedGeneratedExams.filter(e => e.code !== code);
  sharedGeneratedExams.push(exam);
  saveExams();
  saveSharedExams();

  const disp = document.getElementById('generated-exam-display');
  if(disp) disp.innerHTML=`
  <div class="exam-code-display">
    <div style="font-size:.8rem;color:var(--text2);margin-bottom:.5rem;">시험 코드 생성 완료</div>
    <div class="exam-code">${code}</div>
    <div class="exam-code-label">${escapeHtml(book.title)} · ${pool.length}문제 · ${selected.map(getDayLabel).join(', ')}</div>
  </div>`;
  renderExamList();
}

function renderExamList() {
  const el = document.getElementById('exam-list-display');
  if(!el) return;
  if(!generatedExams.length){ el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div>아직 출제한 시험이 없습니다.</div>'; return; }
  el.innerHTML=generatedExams.slice().reverse().map(e=>`
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:.75rem;display:flex;align-items:center;gap:1rem;">

}

async function setSubmissionAnswerResult(subIdx, ansIdx, nextResult) {
  const s = submissions[subIdx];
  if (!s || !Array.isArray(s.answers) || !s.answers[ansIdx]) return;
  s.answers[ansIdx].result = nextResult;
  s.reviewPending = false;
  const totals = summarizeSubmissionAnswers(s.answers);
  s.correct = totals.correct;
  s.wrong = totals.wrong;
  s.empty = totals.empty;
  s.total = totals.total;
  s.score = totals.score;
  try {
    if (typeof cloudSubmissionUpdater === 'function' && s._docId) {
      await cloudSubmissionUpdater(s._docId, {
        answers: s.answers,
        reviewPending: false,
        correct: s.correct,
        wrong: s.wrong,
        empty: s.empty,
        total: s.total,
        score: s.score,
        reviewedAt: new Date().toISOString()
      });
    } else {
      saveSubmissions();
    }
  } catch (e) {
    alert('채점 결과를 저장하지 못했습니다.\n' + (e && e.message ? e.message : '오류가 발생했습니다.'));
  }
  renderTeacherInbox();
  openSubmission(subIdx);
}

function setEl(id, val) {
  const el=document.getElementById(id);
  if(el) el.textContent=val;
}
function escapeHtml(str='') {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}
function escapeAttr(str='') {
  return String(str).replaceAll("'", "\\'");
}

function normalizeMeaningText(str='') {
  return String(str)
    .toLowerCase()
    .replace(/[()\[\]{}]/g,' ')
    .replace(/[·•]/g, ',')
    .replace(/[~～]/g,'')
    .replace(/\s+/g,'')
    .trim();
}
function splitMeaningCandidates(str='') {
  return String(str)
    .split(/[,/]|\s*;\s*/g)
    .map(s => s.trim())
    .filter(Boolean);
}
function isMeaningCorrect(student='', correct='') {
  const s = normalizeMeaningText(student);
  if (!s) return false;
  const candidates = splitMeaningCandidates(correct).map(normalizeMeaningText).filter(Boolean);
  if (!candidates.length) return s === normalizeMeaningText(correct);
  return candidates.some(c => c === s || c.includes(s) || s.includes(c));
}
function summarizeSubmissionAnswers(answers=[]) {
  let correct=0, wrong=0, empty=0;
  answers.forEach(a=>{
    if (a.result === 'correct') correct++;
    else if (a.result === 'wrong') wrong++;
    else empty++;
  });
  const total = answers.length;
  const score = total ? Math.round(correct / total * 100) : 0;
  return {correct, wrong, empty, total, score};
}

function setPassageHighlightLine(index) {
  currentPassageLineIndex = typeof index === 'number' ? index : -1;
  document.querySelectorAll('.passage-line.clickable').forEach((el, i) => {
    el.classList.toggle('playing', i === currentPassageLineIndex);

}
function setPassageHighlightWord(word) {
  currentPassageWord = String(word || '').toLowerCase();
  document.querySelectorAll('.passage-word').forEach(el => {
    const raw = String(el.dataset.word || '').toLowerCase();
    el.classList.toggle('speaking', !!currentPassageWord && raw === currentPassageWord);
  });
}
function clearPassageAudioState() {
  setPassageHighlightLine(-1);
  setPassageHighlightWord('');
}
function speakSingleUtterance(text, options = {}) {
  const value = String(text || '').trim();
  if (!value) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(value);
  u.lang = options.lang || 'en-US';
  u.rate = options.rate || 0.88;
  u.pitch = options.pitch || 1;
  u.onend = () => {
    if (typeof options.onend === 'function') options.onend();
  };
  speechSynthesis.speak(u);
}
function escapeJsString(value) {
  return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
function formatPassageText(text, clickable = true) {
  const lines = splitPassageIntoLines(text);
  if (!lines.length) return '';
  return lines.map((line, index) => `
    <div class="passage-line${clickable ? ' clickable' : ''}${currentPassageLineIndex===index?' playing':''}" ${clickable ? `onclick="speakPassageLine(${index})"` : ''}>
      ${clickable ? '<span class="line-audio">🔊</span>' : ''}${escapeHtml(line)}
    </div>`).join('');
}
function renderPassageLineAwareTokens(text) {
  const tokens = tokenizePassage(text);
  return tokens.map((tok, i) => {
    if (tok.type === 'word') {
      const sel = selectedPassageWords.find(s => s.idx === i);
      const safe = escapeAttr(tok.value);
      return `<span class="passage-word${sel?' selected':''}${currentPassageWord && currentPassageWord===String(tok.value).toLowerCase() ? ' speaking' : ''}" data-idx="${i}" data-word="${escapeAttr(tok.value)}" onclick="togglePassageWord(${i},'${safe}')" ondblclick="speakPassageWord('${safe}', event)" title="클릭: 선택 / 더블클릭: 발음">${escapeHtml(tok.value)}</span>`;
    }
    const html = escapeHtml(tok.value)
      .replace(/([.!?])\s*/g, '$1<br>')
      .replace(/\n+/g, '<br>');
    return `<span>${html}</span>`;
  }).join('');
}

speakPassageLine = function(index) {
  const ps = passages.find(ps => ps.id === currentPassageId);
  if (!ps) return;
  const lines = splitPassageIntoLines(ps.text);
  const line = lines[index];
  if (!line) return;
  setPassageHighlightWord('');
  setPassageHighlightLine(index);
  speakSingleUtterance(line, { rate: 0.86, onend: () => setPassageHighlightLine(-1) });
};

speakPassageWord = function(word, ev) {
  if (ev) {
    ev.preventDefault();
    ev.stopPropagation();
  }
  const clean = String(word || '').trim();
  if (!clean) return;
  setPassageHighlightLine(-1);
  setPassageHighlightWord(clean);
  speakSingleUtterance(clean, { rate: 0.8, onend: () => setPassageHighlightWord('') });
};

speakPassage = function() {
  const ps = passages.find(ps=>ps.id===currentPassageId);
  if (!ps) return;
  const lines = splitPassageIntoLines(ps.text);
  if (!lines.length) return;
  const session = ++passageSpeakSession;
  let i = 0;
  speechSynthesis.cancel();
  function next() {
    if (session !== passageSpeakSession) return;
    if (i >= lines.length) {
      clearPassageAudioState();
      return;
    }
    setPassageHighlightWord('');
    setPassageHighlightLine(i);
    const u = new SpeechSynthesisUtterance(lines[i]);
    u.lang = 'en-US';
    u.rate = 0.86;
    u.onend = () => {
      i += 1;
      setTimeout(next, 220);
    };
    speechSynthesis.speak(u);
  }
  next();
};

addCustomBook = async function() {
  if (typeof checkFirebaseReady === 'function' && !checkFirebaseReady()) return;
  const title = (document.getElementById('new-book-title')||{}).value?.trim();
  const customIdRaw = (document.getElementById('new-book-id')||{}).value?.trim();
  const jsonText = (document.getElementById('new-book-json')||{}).value?.trim();
  if (!title) { alert('단어장 제목을 입력하세요.'); return; }
  if (!jsonText) { alert('단어 JSON을 입력하세요.'); return; }

  let parsed;
  try { parsed = JSON.parse(jsonText); }
  catch(e){ alert('JSON 형식이 올바르지 않습니다.'); return; }
  if (Array.isArray(parsed) || typeof parsed !== 'object' || !Object.keys(parsed).length) {
    alert('JSON은 {"day1":[...], "day2":[...]} 형태의 객체여야 합니다.');
    return;
  }

  const normalizedDays = {};
  try {
    for (const [key, value] of Object.entries(parsed)) {
      if (!Array.isArray(value)) throw new Error(`"${key}"의 값은 배열이어야 합니다.`);
      normalizedDays[String(key)] = value.map((item, idx) => {
        if (!item || typeof item !== 'object' || !item.en || !item.kr) throw new Error(`"${key}"의 ${idx+1}번째 항목에 en, kr가 필요합니다.`);
        return { en: String(item.en).trim(), kr: String(item.kr).trim() };
      });
    }
  } catch (e) {
    alert(e.message || '단어장을 정리할 수 없습니다.');
    return;
  }

  const now = new Date().toISOString();
  const targetId = editingBookId || customIdRaw || ('book-' + Date.now());
  if (!editingBookId && getAllBooks().some(b => b.id === targetId)) { alert('이미 존재하는 book id입니다.'); return; }
  const old = customBooks.find(b => b.id === targetId) || {};
  const book = {
    ...old,
    id: targetId,
    title,
    days: normalizedDays,
    themes: old.themes || {},
    createdAt: old.createdAt || now,
    updatedAt: now
  };

  try {
    if (typeof fbDb !== 'undefined' && fbDb && typeof cloudBookPayload === 'function') {
      await fbDb.collection('books').doc(targetId).set(cloudBookPayload(book), { merge: true });
      await cloudLoadBooks();
    } else {
      const idx = customBooks.findIndex(b => b.id === targetId);
      if (idx >= 0) customBooks[idx] = book; else customBooks.push(book);
      saveBooks();
    }
    setCurrentBook(targetId);
    editingBookId = null;
    fcDayKey = getDayKeys(getCurrentBook())[0] || null;
    renderAll();
    alert('단어장이 저장되었습니다.');
  } catch (e) {
    alert('단어장을 저장하지 못했습니다.\n' + (e && e.message ? e.message : '오류가 발생했습니다.'));
  }
};

  function normalizePassageRecord(ps) {
    if (!ps || typeof ps !== 'object') return null;
    const id = ps.id || ('ps-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8));
    return {
      id,
      title: String(ps.title || '').trim(),
      text: String(ps.text || '').trim(),
      translation: String(ps.translation || ''),
      vocabRequests: Array.isArray(ps.vocabRequests) ? ps.vocabRequests : [],
      createdAt: ps.createdAt || new Date().toISOString(),
      updatedAt: ps.updatedAt || ps.createdAt || new Date().toISOString(),
      ownerUid: ps.ownerUid || currentUid || ''
    };
  }

  function mergePassageSets(localArr, cloudArr) {
    const map = new Map();
    [...(Array.isArray(localArr) ? localArr : []), ...(Array.isArray(cloudArr) ? cloudArr : [])].forEach(raw => {
      const ps = normalizePassageRecord(raw);
      if (!ps || !ps.title || !ps.text) return;
      const prev = map.get(ps.id);
      if (!prev) {
        map.set(ps.id, ps);
        return;
      }
      const prevTime = new Date(prev.updatedAt || prev.createdAt || 0).getTime() || 0;
      const nextTime = new Date(ps.updatedAt || ps.createdAt || 0).getTime() || 0;
      map.set(ps.id, nextTime >= prevTime ? ps : prev);
    });
    return Array.from(map.values()).sort((a,b) => {
      const at = new Date(a.updatedAt || a.createdAt || 0).getTime() || 0;
      const bt = new Date(b.updatedAt || b.createdAt || 0).getTime() || 0;
      return bt - at;
    });
  }

  async function cloudLoadPassages() {
    const localPassages = getPassageStore();
    if (!firebaseEnabled) {
      passages = localPassages;
      return;

    try {
      let snap;
      try {
        snap = await fbDb.collection('passages').orderBy('updatedAt','desc').get();
      } catch (orderErr) {
        snap = await fbDb.collection('passages').get();
      }
      const cloudPassages = snap.docs.map(d => normalizePassageRecord({ id: d.id, ...d.data() })).filter(Boolean);
      passages = mergePassageSets(localPassages, cloudPassages);
      savePassages();
      if (currentUid) {
        for (const ps of passages) {
          if (!ps.ownerUid) {
            ps.ownerUid = currentUid;
            try { await fbDb.collection('passages').doc(ps.id).set(ps, { merge: true }); } catch (_) {}
          }
        }
      }
    } catch(e) {
      passages = localPassages;
      savePassages();
    }
  }

  async function cloudSavePassage(ps) {
    const normalized = normalizePassageRecord({ ...ps, ownerUid: ps.ownerUid || currentUid || '' });
    passages = mergePassageSets(passages, [normalized]);
    savePassages();
    if (!firebaseEnabled || !currentUid) return;
    try {
      await fbDb.collection('passages').doc(normalized.id).set(normalized, { merge: true });
    } catch(e) { /* keep local copy */ }
  }

  function makeFirebaseEmailFromLogin(loginId) {
    const raw = String(loginId || '').trim();
    if (!raw) return { email: '', username: '' };
    if (raw.includes('@')) {
      const email = raw.toLowerCase();
      return { email, username: raw.split('@')[0] || raw };
    }
    const username = raw;
    const safe = raw.toLowerCase().replace(/[^a-z0-9._-]/g, '');
    return { email: `${safe}@wordtest.local`, username };
  }

  async function firebaseLoginFlow() {
    if (!checkFirebaseReady()) return false;
    const defaultLogin = activeUsername || (currentEmail ? (currentEmail.endsWith('@wordtest.local') ? currentEmail.replace(/@wordtest\.local$/,'') : currentEmail) : '');
    let loginId = prompt(defaultLogin ? `현재 로그인: ${defaultLogin}\n다른 계정으로 바꾸려면 아이디를 입력하세요.\n같은 계정이면 그대로 확인을 누르세요.` : '아이디를 입력하세요.\n처음이면 자동으로 회원가입됩니다.', defaultLogin);
    if (loginId === null) return false;
    loginId = String(loginId).trim();
    if (!loginId) {
      alert('아이디를 입력해야 합니다.');
      return false;
    }
    const mapped = makeFirebaseEmailFromLogin(loginId);
    if (!mapped.email) {
      alert('아이디 형식이 올바르지 않습니다.');
      return false;
    }
    let password = prompt('비밀번호를 입력하세요.');
    if (password === null) return false;
    password = String(password);
    if (!password) {
      alert('비밀번호를 입력해야 합니다.');
      return false;
    }
    try {
      await fbAuth.signInWithEmailAndPassword(mapped.email, password);
    } catch (err) {
      try {
        await fbAuth.createUserWithEmailAndPassword(mapped.email, password);
      } catch (createErr) {
        const code = createErr && createErr.code ? createErr.code : '';
        if (code === 'auth/email-already-in-use') {
          alert('비밀번호가 올바르지 않거나 이미 존재하는 계정입니다.\n비밀번호를 다시 확인하세요.');
        } else {

        }
        return false;
      }
    }
    const user = fbAuth.currentUser;
    if (!user) {
      alert('로그인 상태를 확인할 수 없습니다.');
      return false;
    }
    currentUid = user.uid;
    currentEmail = user.email || mapped.email;
    activeUsername = mapped.username;
    await cloudEnsureUserDoc(currentEmail, activeUsername);
    await cloudReloadEverything();
    return true;
  }
