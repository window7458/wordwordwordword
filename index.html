  addCustomBook = async function() {
    if (!checkFirebaseReady()) return;
    const title = (document.getElementById('new-book-title')||{}).value?.trim();
    const customIdRaw = (document.getElementById('new-book-id')||{}).value?.trim();
    const jsonText = (document.getElementById('new-book-json')||{}).value?.trim();
    if (!title) { alert('단어장 제목을 입력하세요.'); return; }
    if (!jsonText) { alert('단어 JSON을 입력하세요.'); return; }

    let parsed;
    try { parsed = JSON.parse(jsonText); }
    catch(e){ alert('JSON 형식이 올바르지 않습니다.'); return; }

    if (Array.isArray(parsed) || typeof parsed !== 'object' || !Object.keys(parsed).length) {
      alert('JSON은 {"day1":[...], "day2":[...]} 형태의 객체여야 합니다.');
      return;
    }

    const normalizedDays = {};
    try {
      for (const [key, value] of Object.entries(parsed)) {
        if (!Array.isArray(value)) throw new Error(`"${key}"의 값은 배열이어야 합니다.`);
        normalizedDays[String(key)] = value.map((item, idx) => {
          if (!item || typeof item !== 'object' || !item.en || !item.kr) {
            throw new Error(`"${key}"의 ${idx+1}번째 항목에 en, kr가 필요합니다.`);
          }
          return { en: String(item.en).trim(), kr: String(item.kr).trim() };
        });
      }
    } catch (e) {
      alert(e.message || '단어장을 정리할 수 없습니다.');
      return;
    }

    const newId = customIdRaw || ('book-' + Date.now());
    if (getAllBooks().some(b => b.id === newId)) { alert('이미 존재하는 book id입니다.'); return; }

    const book = { id: newId, title, days: normalizedDays, themes: {}, createdAt: new Date().toISOString() };
    try {
      await fbDb.collection('books').doc(newId).set(cloudBookPayload(book), { merge: true });
      await cloudLoadBooks();
      setCurrentBook(newId);
      fcDayKey = getDayKeys(getCurrentBook())[0] || null;
      renderAll();
      alert('단어장이 추가되었습니다.');
    } catch (e) {
      alert('단어장을 Firebase에 저장하지 못했습니다.\n' + (e && e.message ? e.message : '오류가 발생했습니다.'));
    }
  };

  generateExam = async function() {
    if (!checkFirebaseReady()) return;
    const book = getCurrentBook();
    const selected=[];
    getDayKeys(book).forEach(dayKey=>{
      const cb=document.getElementById(`tc-${CSS.escape(String(dayKey))}`);
      if(cb&&cb.checked) selected.push(String(dayKey));
    });
    if(!selected.length){ alert('목록을 선택하세요. 이 단어장의 목록을 불러오지 못했다면 단어장 형식을 다시 확인하세요.'); return; }
    const count = parseInt((document.getElementById('exam-count')||{}).value||100, 10);
    let pool=[];
    selected.forEach(dayKey=>{ pool=pool.concat((getWordsByDay(book, dayKey)||[]).map(w=>({...w,dayKey:String(dayKey),bookId:book.id,bookTitle:book.title}))); });
    pool=shuffle(pool).slice(0,Math.min(count,pool.length));
    const code = 'EX'+String(Math.floor(Math.random()*9000)+1000);
    const exam = {
      code,
      bookId: book.id,
      bookTitle: book.title,
      dayKeys:selected,
      words:pool,
      created:new Date().toISOString(),
      count:pool.length,
      ownerUid: currentUid,
      ownerUsername: activeUsername,
      active: true
    };
    try {
      await fbDb.collection('exams').doc(code).set(exam, { merge: true });
      generatedExams.push(exam);
      sharedGeneratedExams = sharedGeneratedExams.filter(e => e.code !== code);
      sharedGeneratedExams.push(exam);
      const disp = document.getElementById('generated-exam-display');
      if(disp) disp.innerHTML=`
      <div class="exam-code-display">
        <div style="font-size:.8rem;color:var(--text2);margin-bottom:.5rem;">시험 코드 생성 완료</div>
        <div class="exam-code">${code}</div>
        <div class="exam-code-label">${escapeHtml(book.title)} · ${pool.length}문제 · ${selected.map(getDayLabel).join(', ')}</div>
      </div>`;
      renderExamList();
    } catch (e) {
      alert('시험지를 Firebase에 저장하지 못했습니다.\n' + (e && e.message ? e.message : '오류가 발생했습니다.'));
    }
  };

        alert(`${examStudentName}님의 결과가 자동 제출되었습니다.
임시 점수: ${score}점 (${correct}/${examWords.length})
선생님이 제출함에서 최종 수정할 수 있습니다.`);
      }
    } catch (e) {
      const statusEl = document.getElementById('auto-submit-status');
      if (statusEl) {
        statusEl.textContent = '자동 제출에 실패했습니다. 다시 로그인한 뒤 재시도해 주세요.';
      }
      if (!silent) {
        alert('결과를 제출하지 못했습니다.\n' + (e && e.message ? e.message : '오류가 발생했습니다.'));
      }
    }
  };

  clearSubmissions = async function() {
    if (!checkFirebaseReady()) return;
    if (!confirm('제출 기록을 모두 삭제할까요?')) return;
    try {
      const snap = await fbDb.collection('submissions').where('teacherUid', '==', currentUid).get();
      const batch = fbDb.batch();
      snap.docs.forEach(doc => batch.delete(doc.ref));
      await batch.commit();
      submissions=[];
      renderTeacherInbox();
    } catch (e) {
      alert('제출 기록을 삭제하지 못했습니다.\n' + (e && e.message ? e.message : '오류가 발생했습니다.'));
    }
  };

  updateAccountBadge = (function(orig){
    return function(){
      orig();
      const badge = document.getElementById('account-badge');
      if (badge && activeUsername) badge.textContent = activeUsername;
    }
  })(updateAccountBadge);

  window.addEventListener('load', async () => {
    if (!firebaseEnabled) return;
    if (fbAuth.currentUser) {
      currentUid = fbAuth.currentUser.uid;
      currentEmail = fbAuth.currentUser.email || '';
      activeUsername = currentEmail && currentEmail.endsWith('@wordtest.local')
        ? currentEmail.replace(/@wordtest\.local$/, '')
        : currentEmail;
      await cloudReloadEverything();
      updateAccountBadge();
    }
  });
})();
</script>

</body>
</html>
