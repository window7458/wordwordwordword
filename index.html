<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English Master</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8fafc;--surface:#fff;--surface2:#f1f5f9;--border:#e2e8f0;--border2:#cbd5e1;
  --accent:#16a34a;--accent-dark:#15803d;--accent2:#dc2626;--accent3:#2563eb;--accent4:#ea580c;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;--card:#fff;
  --teacher:#ea580c;--student:#16a34a;
  --shadow:0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
  --radius:16px;--radius-sm:10px;
  --sidebar-width:260px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;height:100vh;display:flex;flex-direction:column;}

/* --- Layout --- */
#app { display:none; flex:1; display:flex; height:100vh; position:relative; }

/* --- Sidebar --- */
#sidebar {
  width: var(--sidebar-width); height: 100%; background: var(--surface);
  border-right: 1px solid var(--border); position: fixed; left: 0; top: 0;
  z-index: 1000; transition: transform 0.3s ease; display: flex; flex-direction: column;
}
/* 모바일에서 사이드바 숨김 */
@media (max-width: 900px) { #sidebar { transform: translateX(-100%); } }
#sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.1); }

#sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
.brand { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--accent); }
#sidebar-menu { flex: 1; padding: 12px; overflow-y: auto; }
.menu-item {
  width: 100%; padding: 12px 16px; margin-bottom: 4px; border: none; background: none;
  border-radius: var(--radius-sm); text-align: left; font-size: 0.95rem; font-weight: 600;
  color: var(--text2); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px;
}
.menu-item.active { background: var(--surface2); color: var(--accent); }
.menu-item:hover { background: var(--surface2); }

#sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }

/* --- Overlay --- */
#sidebar-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index: 999; backdrop-filter: blur(2px);
}
#sidebar-overlay.show { display: block; }

/* --- Main Content --- */
#main-container {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  margin-left: var(--sidebar-width); transition: margin 0.3s;
}
@media (max-width: 900px) { #main-container { margin-left: 0; } }

.top-bar {
  height: 60px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 900;
}
.menu-toggle {
  width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
}
@media (min-width: 901px) { .menu-toggle { display: none; } }

#page-content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

/* --- UI Elements --- */
.content-wrap { max-width: 800px; margin: 0 auto; }
.section-title { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 800; margin-bottom: 20px; color: var(--text); }
.section-title span { color: var(--accent); }

.card {
  background: var(--surface); border-radius: var(--radius); padding: 18px;
  box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px;
}
.btn {
  padding: 12px 20px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  font-weight: 700; cursor: pointer; font-family: inherit; transition: 0.2s; font-size: 0.9rem;
}
.btn.primary { background: var(--accent); color: white; border: none; }
.btn-full { width: 100%; display: block; text-align: center; }

/* --- Mobile Specific Fixes --- */
.kv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
@media (min-width: 600px) { .kv-grid { grid-template-columns: repeat(3, 1fr); } }

.book-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 600px) { .book-grid { grid-template-columns: 1fr 1fr; } }

.exam-word-big { font-size: 2rem; font-weight: 800; margin: 40px 0; text-align: center; color: var(--text); }
.exam-input { width: 100%; padding: 16px; border: 2px solid var(--border); border-radius: 12px; font-size: 1.1rem; text-align: center; }

/* Flashcard */
.fc-scene { height: 260px; margin-bottom: 20px; perspective: 1000px; }
.fc-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
.fc-inner.flipped { transform: rotateY(180deg); }
.fc-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 20px; border: 1px solid var(--border); background: white; box-shadow: var(--shadow); }
.fc-back { transform: rotateY(180deg); background: var(--surface2); }

/* --- Login Overlay --- */
#wm-overlay {
  position:fixed; inset:0; z-index:10000; background: var(--bg); display:flex; align-items:center; justify-content:center; padding:20px;
}
.wm-box { background: white; padding: 30px 24px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
.wm-inp { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal { background: white; border-radius: 24px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 24px; position: relative; }
</style>
</head>
<body>

<div id="wm-overlay">
  <div class="wm-box">
    <div style="font-size: 3rem;">📚</div>
    <h1 style="font-family: 'Outfit'; margin: 10px 0;">Word Master</h1>
    <p style="color: var(--text3); font-size: 0.85rem; margin-bottom: 20px;">모바일에서도 간편한 단어 학습</p>
    <div class="wm-tabs" style="display:flex; background: var(--surface2); padding: 5px; border-radius: 12px; margin-bottom: 15px;">
      <button id="tab-login" onclick="wmTab('login')" style="flex:1; padding:10px; border:none; border-radius:8px; font-weight:700; background: white;">로그인</button>
      <button id="tab-signup" onclick="wmTab('signup')" style="flex:1; padding:10px; border:none; border-radius:8px; font-weight:700; background: transparent;">회원가입</button>
    </div>
    <input class="wm-inp" id="wm-id" placeholder="아이디 (6자 이상)">
    <input class="wm-inp" id="wm-pw" type="password" placeholder="비밀번호 (6자 이상)">
    <button class="btn primary btn-full" id="wm-btn" onclick="wmLogin()" style="margin-top: 15px; padding: 15px;">시작하기</button>
  </div>
</div>

<div id="login-screen" style="display:none; height:100vh; align-items:center; justify-content:center; background: var(--bg);">
  <div style="width:100%; max-width:400px; padding:24px; text-align:center;">
    <h2 style="margin-bottom:30px;">접속 모드를 선택하세요</h2>
    <div onclick="enterApp('student')" class="card" style="cursor:pointer; padding:30px;">
      <div style="font-size:3rem; margin-bottom:10px;">📖</div>
      <div style="font-weight:800; font-size:1.2rem;">학생 모드</div>
    </div>
    <div onclick="enterApp('teacher')" class="card" style="cursor:pointer; padding:30px; border-top: 4px solid var(--teacher);">
      <div style="font-size:3rem; margin-bottom:10px;">👩‍🏫</div>
      <div style="font-weight:800; font-size:1.2rem; color:var(--teacher);">선생님 모드</div>
    </div>
  </div>
</div>

<div id="app" style="display:none;">
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <aside id="sidebar">
    <div id="sidebar-header">
      <div class="brand">📚 Word Master</div>
      <div id="role-tag" style="display:inline-block; font-size:0.7rem; padding:2px 8px; border-radius:20px; margin-top:5px;"></div>
    </div>
    <nav id="sidebar-menu">
      </nav>
    <div id="sidebar-footer">
      <div id="user-info" style="font-size: 0.8rem; margin-bottom: 10px; color: var(--text2);"></div>
      <button class="btn btn-full" onclick="logoutAccount()">로그아웃</button>
    </div>
  </aside>

  <main id="main-container">
    <header class="top-bar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div id="page-title" style="font-weight:800; font-size:1.1rem; flex:1;">단어장</div>
      <div id="account-status" style="font-size:0.8rem; font-weight:700; color:var(--accent3);"></div>
    </header>
    <div id="page-content">
      </div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <button onclick="closeModal()" style="position:absolute; right:20px; top:20px; border:none; background:none; font-size:1.5rem;">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore-compat.js"></script>

<script>
/* [핵심 로직 & 데이터] */
const WORDS={"1":[{en:"diligent",kr:"부지런한, 근면한"},{en:"generous",kr:"관대한, 후한"},{en:"creative",kr:"창의적인"},{en:"modest",kr:"겸손한, 적당한"},{en:"active",kr:"활동적인, 적극적인"},{en:"passive",kr:"수동적인"},{en:"arrogant",kr:"오만한, 거만한"},{en:"selfish",kr:"이기적인"},{en:"honest",kr:"정직한, 솔직한"},{en:"polite",kr:"예의 바른, 공손한"},{en:"impolite",kr:"무례한"},{en:"strict",kr:"엄격한, 엄한"},{en:"patient",kr:"참을성 있는; 환자"},{en:"impatient",kr:"참을성 없는, 성급한"},{en:"brave",kr:"용감한"},{en:"timid",kr:"겁이 많은, 소심한"},{en:"wise",kr:"지혜로운, 현명한"},{en:"foolish",kr:"어리석은"},{en:"gentle",kr:"온화한, 부드러운"},{en:"harsh",kr:"가혹한, 거친"}],"2":[{en:"assignment",kr:"과제, 숙제, 임무"},{en:"attendance",kr:"출석, 참석"},{en:"certificate",kr:"증명서, 자격증"},{en:"curriculum",kr:"교육 과정"},{en:"degree",kr:"학위; 도, 정도"},{en:"diploma",kr:"졸업장, 수료증"},{en:"discipline",kr:"규율, 훈육, 절제력"},{en:"elementary",kr:"초보의, 기본적인"},{en:"enroll",kr:"등록하다, 입학시키다"},{en:"evaluate",kr:"평가하다"},{en:"faculty",kr:"교수진; 능력"},{en:"institute",kr:"기관, 협회; 도입하다"},{en:"instructor",kr:"강사, 지도자"},{en:"lecture",kr:"강의; 강의하다"},{en:"major",kr:"주요한; 전공하다"},{en:"minor",kr:"사소한; 미성년자"},{en:"objective",kr:"객관적인; 목표"},{en:"principal",kr:"교장; 주요한"},{en:"register",kr:"등록하다; 등록부"},{en:"scholarship",kr:"장학금; 학식"}],"3":[{en:"acquaintance",kr:"지인, 아는 사람"},{en:"anniversary",kr:"기념일"},{en:"associate",kr:"연상하다; 동료"},{en:"banquet",kr:"연회, 만찬"},{en:"companion",kr:"동료, 동반자"},{en:"conflict",kr:"갈등, 충돌; 충돌하다"},{en:"cooperate",kr:"협력하다"},{en:"diverse",kr:"다양한, 다른"},{en:"encounter",kr:"마주치다; 만남"},{en:"harmony",kr:"조화, 화합"},{en:"intimate",kr:"친밀한, 사적인"},{en:"loyalty",kr:"충성, 충실"},{en:"marriage",kr:"결혼, 혼인"},{en:"neighbor",kr:"이웃"},{en:"partner",kr:"동반자, 파트너"},{en:"relationship",kr:"관계, 연관"},{en:"respect",kr:"존경하다; 측면"},{en:"rival",kr:"경쟁자, 라이벌"},{en:"sympathy",kr:"동정, 공감"},{en:"trust",kr:"신뢰하다; 신뢰"}]};
const BUILTIN_BOOKS=[{id:'wordmaster-basic',title:'Word Master BASIC',days:WORDS}];
const TEACHER_UID='gfedbKqE30VwTDfls7cfiGwaD982';
const BASE_BOOK_ID='wordmaster-basic';

let role='student', currentUid='', currentEmail='', activeUsername='', currentBookId=BASE_BOOK_ID;
let passages=[], homeworks=[], allProfiles=[], generatedExams=[], studentSubmissions=[], submissions=[];
let fbAuth, fbDb, firebaseEnabled=false;
let fcDayKey='1', fcIdx=0, fcFlipped=false;

// [UI 제어]
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ol = document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ol.classList.toggle('show');
}

function wmTab(type) {
  const isLogin = type === 'login';
  document.getElementById('tab-login').style.background = isLogin ? 'white' : 'transparent';
  document.getElementById('tab-signup').style.background = isLogin ? 'transparent' : 'white';
  document.getElementById('wm-btn').textContent = isLogin ? '로그인' : '회원가입 시작';
}

// [인증 & 초기화]
window.WM_FIREBASE_CONFIG={apiKey:"AIzaSyDRXpHtMbbLg5_zHn9DHclOQNacYWC1bFk",authDomain:"word-test-4cdf6.firebaseapp.com",projectId:"word-test-4cdf6",storageBucket:"word-test-4cdf6.firebasestorage.app",messagingSenderId:"175982857143",appId:"1:175982857143:web:2aae221a1e051c197ab632"};

(function init(){
  firebase.initializeApp(window.WM_FIREBASE_CONFIG);
  fbAuth = firebase.auth(); fbDb = firebase.firestore(); firebaseEnabled = true;
  fbAuth.onAuthStateChanged(async user => {
    if(user) {
      currentUid = user.uid; currentEmail = user.email;
      activeUsername = currentEmail.split('@')[0];
      const isT = currentUid === TEACHER_UID;
      await fbDb.collection('profiles').doc(currentUid).set({
        email: currentEmail, username: activeUsername, isTeacher: isT, updatedAt: new Date().toISOString()
      }, {merge:true});
      await loadData();
      document.getElementById('wm-overlay').style.display='none';
      document.getElementById('login-screen').style.display='flex';
    }
  });
})();

async function wmLogin() {
  const id = document.getElementById('wm-id').value.trim();
  const pw = document.getElementById('wm-pw').value.trim();
  if(id.length < 6) return alert('아이디를 6자 이상 입력하세요.');
  const email = id.includes('@') ? id : id + '@wordtest.local';
  try {
    await fbAuth.signInWithEmailAndPassword(email, pw);
  } catch(e) {
    if(e.code === 'auth/user-not-found') await fbAuth.createUserWithEmailAndPassword(email, pw);
    else alert(e.message);
  }
}

async function loadData() {
  fbDb.collection('passages').orderBy('updatedAt','desc').onSnapshot(s => { passages = s.docs.map(d=>({id:d.id, ...d.data()})); if(role==='student') renderPassagePage(); else renderPassageTeacherPage(); });
  fbDb.collection('homeworks').orderBy('createdAt','desc').onSnapshot(s => { homeworks = s.docs.map(d=>({id:d.id, ...d.data()})); renderHomeworkPage(); });
  fbDb.collection('exams').onSnapshot(s => { generatedExams = s.docs.map(d=>({id:d.id, ...d.data()})); });
  fbDb.collection('submissions').onSnapshot(s => {
    const all = s.docs.map(d=>({_docId:d.id, ...d.data()}));
    submissions = all.filter(x => x.teacherUid === currentUid || !x.teacherUid);
    studentSubmissions = all.filter(x => x.studentUid === currentUid);
    renderTeacherInbox(); renderStudentResults();
  });
  fbDb.collection('profiles').onSnapshot(s => { allProfiles = s.docs.map(d=>({id:d.id, ...d.data()})); renderTeacherStudentsPage(); });
}

// [네비게이션]
function enterApp(r) {
  role = r;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  const tag = document.getElementById('role-tag');
  tag.textContent = role === 'teacher' ? '선생님 계정' : '학생 계정';
  tag.style.background = role === 'teacher' ? 'var(--teacher)' : 'var(--student)';
  tag.style.color = 'white';
  document.getElementById('account-status').textContent = activeUsername;
  document.getElementById('user-info').textContent = currentEmail;
  buildNav();
}

function buildNav() {
  const menu = document.getElementById('sidebar-menu');
  menu.innerHTML = '';
  const items = role === 'student' 
    ? [['books','📚 단어장'],['flash','🃏 플래시카드'],['passage','📖 본문 학습'],['exam','✏️ 시험 보기'],['homework','📝 숙제 확인'],['results','📊 내 성적']]
    : [['books','📚 단어장'],['ps-t','📖 본문 관리'],['gen-t','🎯 시험 출제'],['inbox','📥 제출함'],['hw-t','📝 숙제 관리'],['students','👥 학생 관리']];

  items.forEach(([id, label]) => {
    const btn = document.createElement('button');
    btn.className = 'menu-item';
    btn.innerHTML = label;
    btn.onclick = () => { switchPage(id); toggleSidebar(); };
    btn.id = 'menu-' + id;
    menu.appendChild(btn);
  });
  switchPage('books');
}

function switchPage(id) {
  const content = document.getElementById('page-content');
  document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
  const activeMenu = document.getElementById('menu-' + id);
  if(activeMenu) {
    activeMenu.classList.add('active');
    document.getElementById('page-title').textContent = activeMenu.textContent.replace(/[^\w\sㄱ-ㅎㅏ-ㅣ가-힣]/g, '').trim();
  }
  
  // 라우팅
  const map = {
    'books': renderBooksPage, 'flash': renderFlash, 'passage': renderPassagePage,
    'exam': renderStudentExam, 'homework': renderHomeworkPage, 'results': renderStudentResults,
    'ps-t': renderPassageTeacherPage, 'gen-t': renderTeacherGen, 'inbox': renderTeacherInbox,
    'hw-t': renderHomeworkTeacherPage, 'students': renderTeacherStudentsPage
  };
  if(map[id]) map[id]();
}

/* [콘텐츠 렌더링 함수 - 모바일 최적화] */

function renderBooksPage() {
  const area = document.getElementById('page-content');
  area.innerHTML = `
    <div class="content-wrap">
      <div class="section-title">학습할 <span>단어장</span></div>
      <div class="book-grid">
        ${BUILTIN_BOOKS.map(b => `
          <div class="card ${b.id===currentBookId?'active':''}" onclick="selectBook('${b.id}')" style="border-left: 5px solid var(--accent);">
            <h3 style="margin-bottom:5px;">${b.title}</h3>
            <p style="font-size:0.8rem; color:var(--text3);">기본 제공 단어장 (Day 1~3)</p>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function renderFlash() {
  const area = document.getElementById('page-content');
  const book = BUILTIN_BOOKS[0];
  const words = book.days[fcDayKey] || [];
  const w = words[fcIdx];
  area.innerHTML = `
    <div class="content-wrap">
      <div class="day-selector" style="margin-bottom:20px;">
        ${Object.keys(book.days).map(d => `<button class="day-btn ${d===fcDayKey?'active':''}" onclick="setFlashDay('${d}')">Day ${d}</button>`).join('')}
      </div>
      <div class="fc-scene" onclick="fcFlip()">
        <div class="fc-inner ${fcFlipped?'flipped':''}">
          <div class="fc-face fc-front"><h1 style="font-size:2.5rem;">${w?.en || '끝'}</h1></div>
          <div class="fc-face fc-back"><h2 style="font-size:1.5rem; color:var(--accent3);">${w?.kr || ''}</h2></div>
        </div>
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <button class="btn" style="padding:15px;" onclick="moveFlash(-1)">이전</button>
        <button class="btn primary" style="padding:15px;" onclick="moveFlash(1)">다음</button>
      </div>
      <p style="text-align:center; margin-top:20px; color:var(--text3); font-size:0.8rem;">카드를 터치하면 뜻이 보입니다.</p>
    </div>`;
}
function setFlashDay(d){ fcDayKey=d; fcIdx=0; fcFlipped=false; renderFlash(); }
function moveFlash(dir){
  const words = BUILTIN_BOOKS[0].days[fcDayKey];
  fcIdx = (fcIdx + dir + words.length) % words.length;
  fcFlipped = false; renderFlash();
}
function fcFlip() { fcFlipped = !fcFlipped; document.querySelector('.fc-inner').classList.toggle('flipped'); }

// [선생님 - 본문 관리 (개별 저장 로직 포함)]
function renderPassageTeacherPage() {
  const area = document.getElementById('page-content');
  area.innerHTML = `
    <div class="content-wrap">
      <div class="section-title">📖 본문 <span>관리</span></div>
      <button class="btn primary btn-full" onclick="openPassageEditor()" style="margin-bottom:20px;">+ 새 본문 추가</button>
      <div id="ps-list">
        ${passages.map(ps => `
          <div class="card" style="display:flex; align-items:center; justify-content:space-between; padding:15px;">
            <div style="font-weight:700;">${ps.title}</div>
            <div style="display:flex; gap:8px;">
              <button class="btn" onclick="openPassageEditor('${ps.id}')">수정</button>
              <button class="btn" style="color:var(--accent2);" onclick="deletePassage('${ps.id}')">삭제</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function openPassageEditor(id = null) {
  const ps = passages.find(x => x.id === id) || { title: '', text: '' };
  if(!id) localStorage.removeItem('wm_passage_draft_id'); // 새 글일 때만 드래프트 초기화
  
  const mc = document.getElementById('modal-content');
  mc.innerHTML = `
    <h3 style="margin-bottom:20px;">${id?'본문 수정':'새 본문 추가'}</h3>
    <input class="wm-inp" id="edit-ps-title" value="${ps.title}" placeholder="본문 제목">
    <textarea class="wm-inp" id="edit-ps-text" style="height:300px; font-size:0.9rem;" placeholder="영어 지문을 입력하세요">${ps.text}</textarea>
    <button class="btn primary btn-full" style="margin-top:15px; padding:15px;" onclick="savePassage('${id||''}')">저장하기</button>
  `;
  document.getElementById('modal-overlay').classList.add('show');
}

async function savePassage(existingId) {
  const title = document.getElementById('edit-ps-title').value.trim();
  const text = document.getElementById('edit-ps-text').value.trim();
  if(!title || !text) return alert('내용을 입력하세요.');
  
  const id = existingId || 'ps-' + Date.now();
  await fbDb.collection('passages').doc(id).set({
    title, text, updatedAt: new Date().toISOString(), ownerUid: currentUid
  }, {merge:true});
  
  closeModal();
  alert('저장되었습니다.');
}

async function deletePassage(id) {
  if(confirm('정말 삭제하시겠습니까?')) await fbDb.collection('passages').doc(id).delete();
}

// [선생님 - 학생 관리 (이름 수정 기능)]
function renderTeacherStudentsPage() {
  const area = document.getElementById('page-content');
  const studentList = allProfiles.filter(p => p.id !== TEACHER_UID);
  area.innerHTML = `
    <div class="content-wrap">
      <div class="section-title">👥 학생 <span>관리</span></div>
      ${studentList.length === 0 ? '<p style="text-align:center; padding:50px; color:var(--text3);">아직 가입한 학생이 없습니다.</p>' : ''}
      ${studentList.map(p => `
        <div class="student-summary-row card">
          <div>
            <div style="font-weight:800; font-size:1.1rem; color:var(--accent3);">${p.displayName || p.username || '이름 없음'}</div>
            <div style="font-size:0.8rem; color:var(--text3);">${p.email}</div>
          </div>
          <button class="btn" onclick="editStudentName('${p.id}')">✏️ 이름 수정</button>
        </div>
      `).join('')}
    </div>`;
}

async function editStudentName(uid) {
  const prof = allProfiles.find(x => x.id === uid);
  const newName = prompt(`'${prof.email}' 학생의 이름을 무엇으로 변경할까요?`, prof.displayName || prof.username);
  if(newName === null) return;
  if(!newName.trim()) return alert('이름을 입력하세요.');
  
  await fbDb.collection('profiles').doc(uid).set({
    displayName: newName.trim(), updatedAt: new Date().toISOString()
  }, {merge:true});
  alert('수정되었습니다.');
}

// [공통 유틸리티]
function closeModal(e) {
  if(!e || e.target.id === 'modal-overlay' || e.target.className === 'modal-overlay') {
    document.getElementById('modal-overlay').classList.remove('show');
  }
}
function logoutAccount() { fbAuth.signOut(); location.reload(); }

function renderPassagePage() {
  const area = document.getElementById('page-content');
  if(passages.length === 0) return area.innerHTML = '<p style="text-align:center; padding:50px;">등록된 본문이 없습니다.</p>';
  const ps = passages[0]; // 샘플로 첫 번째
  area.innerHTML = `
    <div class="content-wrap">
      <div class="card" style="background:var(--surface2);">
        <h3 style="margin-bottom:10px;">${ps.title}</h3>
        <div style="line-height:1.8; font-size:1rem; color:var(--text);">
          ${ps.text.split('.').map(s => s.trim()).filter(Boolean).map(s => `<span style="display:block; margin-bottom:10px; cursor:pointer;" onclick="speak('${s}')">🔊 ${s}.</span>`).join('')}

}
function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang='en-US'; window.speechSynthesis.speak(u); }
