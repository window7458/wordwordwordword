<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Master</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;
  --accent:#16a34a;--accent-dark:#15803d;--accent-light:#dcfce7;
  --red:#dc2626;--red-light:#fef2f2;--blue:#2563eb;--blue-light:#dbeafe;
  --orange:#ea580c;--orange-light:#fff7ed;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh-md:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -2px rgba(0,0,0,.05);
  --sh-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.04);
  --r:16px;--r-sm:10px;--sb:260px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#app{flex:1;display:flex;height:100vh;}
#sidebar{width:var(--sb);height:100%;background:var(--surface);border-right:1px solid var(--border);position:fixed;left:0;top:0;z-index:1000;transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
@media(max-width:900px){#sidebar{transform:translateX(-100%);}}
#sidebar.open{transform:translateX(0);box-shadow:20px 0 40px rgba(0,0,0,.15);}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;backdrop-filter:blur(3px);}
#ov.show{display:block;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:var(--sb);}
@media(max-width:900px){#main{margin-left:0;}}
#sb-hd{padding:22px 18px 18px;border-bottom:1px solid var(--border);}
.brand{font-family:'Outfit',sans-serif;font-size:1.2rem;font-weight:900;letter-spacing:-.5px;}
.brand em{color:var(--accent);font-style:normal;}
.rbadge{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:5px;}
.rbadge.s{background:var(--accent-light);color:var(--accent-dark);}
.rbadge.t{background:var(--orange-light);color:var(--orange);}
#sb-nav{flex:1;padding:8px;overflow-y:auto;}
.nsec{font-size:.62rem;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:12px 10px 5px;}
.nitem{width:100%;padding:10px 13px;margin-bottom:2px;border:none;background:none;border-radius:var(--r-sm);text-align:left;font-size:.88rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px;font-family:'Noto Sans KR',sans-serif;}
.nitem:hover{background:var(--surface2);color:var(--text);}
.nitem.as{background:var(--accent-light);color:var(--accent-dark);}
.nitem.at{background:var(--orange-light);color:var(--orange);}
.ni{font-size:.95rem;width:18px;text-align:center;}
#sb-ft{padding:14px;border-top:1px solid var(--border);}
.sbemail{font-size:.72rem;color:var(--text3);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.ham{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}
@media(min-width:901px){.ham{display:none;}}
#pgtitle{font-family:'Outfit',sans-serif;font-weight:800;font-size:1rem;flex:1;}
#pgcontent{flex:1;overflow-y:auto;padding:18px 15px;-webkit-overflow-scrolling:touch;}
.wrap{max-width:820px;margin:0 auto;}
.pghd{margin-bottom:20px;}
.pghd h2{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:900;}
.pghd h2 em{color:var(--accent);font-style:normal;}
.pghd p{color:var(--text3);font-size:.82rem;margin-top:3px;}
.card{background:var(--surface);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border:1px solid var(--border);margin-bottom:12px;}
.btn{padding:9px 16px;border-radius:var(--r-sm);border:1.5px solid var(--border);font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;font-size:.84rem;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn.p{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.p:hover{background:var(--accent-dark);}
.btn.t{background:var(--orange);color:#fff;border-color:var(--orange);}
.btn.d{background:var(--red-light);color:var(--red);border-color:#fecaca;}
.btn.g{background:var(--surface2);color:var(--text2);}
.btn.full{width:100%;}
.btn.lg{padding:13px 22px;font-size:.95rem;border-radius:12px;}
.inp{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.92rem;font-family:'Noto Sans KR',sans-serif;color:var(--text);transition:border-color .15s;background:var(--surface);}
.inp:focus{outline:none;border-color:var(--accent);}
textarea.inp{resize:vertical;line-height:1.7;}
select.inp{cursor:pointer;}
.fl{display:flex;align-items:center;}
.fb{display:flex;align-items:center;justify-content:space-between;}
.gap8{gap:8px;}
.gap10{gap:10px;}
.mt8{margin-top:8px;}
.mt14{margin-top:14px;}
.mt20{margin-top:20px;}
.dvd{height:1px;background:var(--border);margin:16px 0;}
.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700;}
.chip.g{background:var(--accent-light);color:var(--accent-dark);}
.chip.o{background:var(--orange-light);color:var(--orange);}
.chip.b{background:var(--blue-light);color:var(--blue);}
/* LOGIN */
#wm-ov{position:fixed;inset:0;z-index:10000;background:linear-gradient(135deg,#f0fdf4,#eff6ff);display:flex;align-items:center;justify-content:center;padding:20px;}
.wmbox{background:#fff;padding:34px 26px;border-radius:26px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.12);}
.wmlogo{font-size:3.2rem;margin-bottom:5px;}
.wmtitle{font-family:'Outfit',sans-serif;font-size:1.75rem;font-weight:900;margin-bottom:3px;}
.wmtitle em{color:var(--accent);font-style:normal;}
.wmsub{color:var(--text3);font-size:.82rem;margin-bottom:24px;}
.wmtabs{display:flex;background:var(--bg);padding:4px;border-radius:11px;margin-bottom:18px;gap:3px;}
.wmtab{flex:1;padding:9px;border:none;border-radius:8px;font-weight:700;font-size:.88rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.wmtab.on{background:#fff;color:var(--accent);box-shadow:var(--sh);}
.wmtab:not(.on){background:none;color:var(--text3);}
.wminp{width:100%;padding:12px 13px;margin:5px 0;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Noto Sans KR',sans-serif;}
.wminp:focus{outline:none;border-color:var(--accent);}
.wmerr{color:var(--red);font-size:.78rem;margin-top:5px;min-height:18px;}
/* MODE SELECT */
#ls{display:none;position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#f0fdf4,#eff6ff);align-items:center;justify-content:center;padding:20px;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:18px;}
.mcard{background:#fff;border-radius:20px;padding:26px 16px;text-align:center;cursor:pointer;border:2px solid var(--border);transition:all .2s;box-shadow:var(--sh);}
.mcard:hover{transform:translateY(-3px);box-shadow:var(--sh-lg);}
.mcard.sc:hover{border-color:var(--accent);}
.mcard.tc:hover{border-color:var(--orange);}
/* STUDENT CARDS */
.stucard{background:var(--surface);border-radius:var(--r);border:1.5px solid var(--border);box-shadow:var(--sh);margin-bottom:11px;overflow:hidden;transition:all .2s;cursor:pointer;}
.stucard:hover{border-color:var(--orange);box-shadow:var(--sh-md);transform:translateY(-1px);}
.stucardrow{padding:14px 16px;display:flex;align-items:center;gap:13px;}
.stuav{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1rem;flex-shrink:0;background:var(--accent-light);color:var(--accent-dark);}
.backbtn{display:inline-flex;align-items:center;gap:6px;color:var(--text3);font-size:.82rem;font-weight:700;cursor:pointer;margin-bottom:18px;border:none;background:none;font-family:'Noto Sans KR',sans-serif;padding:0;}
.backbtn:hover{color:var(--text);}
/* SUB TABS */
.subtabs{display:flex;background:var(--bg);border-radius:11px;padding:4px;gap:3px;margin-bottom:18px;overflow-x:auto;}
.subtab{flex:1;min-width:max-content;padding:8px 12px;border:none;background:none;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;color:var(--text3);font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:all .15s;}
.subtab.on{background:#fff;color:var(--text);box-shadow:var(--sh);}
/* PASSAGE ITEMS */
.psitem{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:11px;border:1.5px solid var(--border);box-shadow:var(--sh);cursor:pointer;transition:all .2s;}
.psitem:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--sh-md);}
/* WORD SELECTION */
.ptxt{line-height:2.4;font-size:1rem;color:var(--text);user-select:none;-webkit-user-select:none;}
.pw{cursor:pointer;border-radius:4px;padding:2px 3px;transition:background .1s;display:inline;}
.pw:hover{background:#fef9c3;}
.pw.sel{background:var(--accent-light);color:var(--accent-dark);font-weight:700;border-bottom:2px solid var(--accent);}
.selbar{background:#fff;border-top:2px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-radius:0 0 var(--r) var(--r);box-shadow:0 -4px 12px rgba(0,0,0,.07);}
.selchips{display:flex;flex-wrap:wrap;gap:6px;flex:1;min-width:0;}
.selchip{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;background:var(--accent-light);color:var(--accent-dark);border-radius:20px;font-size:.75rem;font-weight:700;}
.scx{cursor:pointer;opacity:.6;font-size:.85rem;}
.scx:hover{opacity:1;}
/* MEANING GRID */
.mgrid2{display:flex;flex-direction:column;gap:10px;margin:14px 0;}
.mrow{display:grid;grid-template-columns:140px 1fr;gap:10px;align-items:center;}
@media(max-width:480px){.mrow{grid-template-columns:1fr;gap:6px;}}
.mword{font-family:'Outfit',sans-serif;font-weight:800;font-size:.95rem;color:var(--text);padding:10px 12px;background:var(--surface2);border-radius:var(--r-sm);}
/* FLASHCARD */
.fcscene{height:230px;perspective:1200px;margin-bottom:18px;cursor:pointer;}
.fcinner{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;}
.fcinner.flip{transform:rotateY(180deg);}
.fcface{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;border:1px solid var(--border);background:#fff;box-shadow:var(--sh-lg);}
.fcback{transform:rotateY(180deg);background:var(--accent-light);}
.fchint{font-size:.72rem;color:var(--text3);margin-bottom:8px;}
.fcword{font-family:'Outfit',sans-serif;font-size:2.3rem;font-weight:900;color:var(--text);}
.fcmn{font-size:1.25rem;font-weight:700;color:var(--accent-dark);}
.fcnav{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;}
.fccnt{text-align:center;font-size:.82rem;color:var(--text3);font-weight:700;}
.daytabs{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;}
.daytab{padding:6px 15px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-weight:700;font-size:.8rem;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.daytab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
/* WORD TABLE */
.wtbl{width:100%;border-collapse:collapse;}
.wtbl th{padding:9px 12px;background:var(--surface2);font-size:.78rem;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);font-weight:700;}
.wtbl td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:.88rem;}
.wtbl td:first-child{font-family:'Outfit',sans-serif;font-weight:700;}
.wtbl td:nth-child(2){color:var(--accent-dark);font-weight:600;}
.wtbl tr:last-child td{border-bottom:none;}
.wtbl tr:hover td{background:var(--surface2);}
/* EXAM */
.exprog{height:5px;background:var(--border);border-radius:5px;margin-bottom:22px;overflow:hidden;}
.exbar{height:100%;background:var(--accent);border-radius:5px;transition:width .3s;}
.exqword{font-family:'Outfit',sans-serif;font-size:2.4rem;font-weight:900;text-align:center;padding:28px 0 18px;color:var(--text);}
.exopts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(max-width:400px){.exopts{grid-template-columns:1fr;}}
.exopt{padding:15px 12px;border-radius:11px;border:2px solid var(--border);font-size:.92rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;font-family:'Noto Sans KR',sans-serif;background:#fff;}
.exopt:hover:not(.lk){border-color:var(--accent);background:var(--accent-light);}
.exopt.ok{border-color:var(--accent);background:var(--accent-light);color:var(--accent-dark);}
.exopt.no{border-color:var(--red);background:var(--red-light);color:var(--red);}
.exinp{width:100%;padding:16px;border:2px solid var(--border);border-radius:11px;font-size:1.1rem;text-align:center;font-family:'Noto Sans KR',sans-serif;}
.rcirc{width:110px;height:110px;border-radius:50%;background:var(--accent-light);border:3px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 18px;}
.rnum{font-family:'Outfit',sans-serif;font-size:2.3rem;font-weight:900;color:var(--accent-dark);line-height:1;}
.rlbl{font-size:.68rem;font-weight:700;color:var(--accent);}
/* HW */
.hwcard{background:#fff;border-radius:var(--r);padding:16px 18px;margin-bottom:11px;border:1.5px solid var(--border);box-shadow:var(--sh);}
.hwtitle{font-weight:800;font-size:.95rem;margin-bottom:7px;display:flex;align-items:center;gap:7px;}
.hwbody{font-size:.88rem;color:var(--text2);line-height:1.7;}
.hwmeta{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
/* MODAL */
.modalbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modalbg.show{display:flex;}
.modal{background:#fff;border-radius:22px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:24px;position:relative;box-shadow:0 25px 60px rgba(0,0,0,.2);}
.modal h3{font-family:'Outfit',sans-serif;font-size:1.25rem;font-weight:800;margin-bottom:16px;}
.modalx{position:absolute;right:16px;top:16px;border:none;background:var(--surface2);border-radius:50%;width:30px;height:30px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.flbl{font-size:.78rem;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;}
.frow{margin-bottom:14px;}
/* EMPTY */
.empty{text-align:center;padding:50px 20px;}
.empty .ei{font-size:2.8rem;margin-bottom:12px;}
.empty .et{font-weight:800;font-size:1rem;margin-bottom:5px;}
.empty .ed{font-size:.82rem;color:var(--text3);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="wm-ov">
  <div class="wmbox">
    <div class="wmlogo">📚</div>
    <div class="wmtitle">Word<em>Master</em></div>
    <p class="wmsub">스마트 영어 단어 학습 플랫폼</p>
    <div class="wmtabs">
      <button class="wmtab on" id="tl" onclick="wtab('login')">로그인</button>
      <button class="wmtab" id="ts" onclick="wtab('signup')">회원가입</button>
    </div>
    <input class="wminp" id="wid" placeholder="아이디 (6자 이상)">
    <input class="wminp" id="wpw" type="password" placeholder="비밀번호 (6자 이상)" onkeydown="if(event.key==='Enter')doAuth()">
    <p class="wmerr" id="werr"></p>
    <button class="btn p full lg mt8" id="wbtn" onclick="doAuth()">로그인 →</button>
  </div>
</div>

<!-- MODE SELECT -->
<div id="ls">
  <div style="width:100%;max-width:360px;">
    <div style="text-align:center;margin-bottom:22px;">
      <div style="font-size:2.2rem;margin-bottom:7px;">👋</div>
      <h2 style="font-family:'Outfit';font-size:1.5rem;font-weight:900;">어떤 역할인가요?</h2>
      <p style="color:var(--text3);font-size:.82rem;margin-top:4px;">역할을 선택해 시작하세요</p>
    </div>
    <div class="mgrid">
      <div class="mcard sc" onclick="enterApp('student')">
        <div style="font-size:2.2rem;margin-bottom:8px;">📖</div>
        <div style="font-weight:800;">학생</div>
        <p style="font-size:.72rem;color:var(--text3);margin-top:4px;">학습 & 시험</p>
      </div>
      <div class="mcard tc" onclick="enterApp('teacher')">
        <div style="font-size:2.2rem;margin-bottom:8px;">👩‍🏫</div>
        <div style="font-weight:800;color:var(--orange);">선생님</div>
        <p style="font-size:.72rem;color:var(--text3);margin-top:4px;">관리 & 출제</p>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div id="ov" onclick="toggleSB()"></div>
  <aside id="sidebar">
    <div id="sb-hd">
      <div class="brand">📚 Word<em>Master</em></div>
      <div id="rbadge" class="rbadge"></div>
    </div>
    <nav id="sb-nav"></nav>
    <div id="sb-ft">
      <div class="sbemail" id="sbemail"></div>
      <button class="btn full g" style="font-size:.82rem;" onclick="fbAuth.signOut().then(()=>location.reload())">로그아웃</button>
    </div>
  </aside>
  <main id="main">
    <header class="topbar">
      <button class="ham" onclick="toggleSB()">☰</button>
      <div id="pgtitle">단어장</div>
      <div id="pguser" style="font-size:.78rem;font-weight:700;color:var(--blue);"></div>
    </header>
    <div id="pgcontent"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modalbg" id="modalbg" onclick="cmout(event)">
  <div class="modal">
    <button class="modalx" onclick="cm()">✕</button>
    <div id="mbd"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
<script>
// ── CONSTANTS ──
const TID='gfedbKqE30VwTDfls7cfiGwaD982';
const FBCFG={apiKey:"AIzaSyDRXpHtMbbLg5_zHn9DHclOQNacYWC1bFk",authDomain:"word-test-4cdf6.firebaseapp.com",projectId:"word-test-4cdf6",storageBucket:"word-test-4cdf6.firebasestorage.app",messagingSenderId:"175982857143",appId:"1:175982857143:web:2aae221a1e051c197ab632"};

// ── STATE ──
let role='student',uid='',email='',uname='';
let passages=[],homeworks=[],allProfiles=[],submissions=[];
let customVocabs={};
let fbAuth,fbDb;
let curPage='',curStuId=null,curStuTab='passage';
let fcDay='1',fcIdx=0,fcFlip=false,curBkId='builtin',curBkDay='1';
let selWords=[],curPsId=null;
let authMode='login';
let examSt={};

async function doAuth(){
  const id=document.getElementById('wid').value.trim();

  const err=document.getElementById('werr');
  err.textContent='';
  if(id.length<6)return err.textContent='아이디를 6자 이상 입력하세요.';
  if(pw.length<6)return err.textContent='비밀번호를 6자 이상 입력하세요.';
  const em=id.includes('@')?id:id+'@wordtest.local';

  try{
    if(authMode==='login')await fbAuth.signInWithEmailAndPassword(em,pw);
    else await fbAuth.createUserWithEmailAndPassword(em,pw);
  }catch(e){
    document.getElementById('wbtn').textContent=authMode==='login'?'로그인 →':'회원가입 →';
    const ms={'auth/user-not-found':'계정이 없습니다.','auth/wrong-password':'비밀번호 오류','auth/email-already-in-use':'이미 사용 중인 아이디','auth/invalid-credential':'아이디 또는 비밀번호 오류'};
    err.textContent=ms[e.code]||e.message;
  }
}

// ── PASSAGE READ + WORD DRAG SELECT ──
let isDrag=false,dragSet=new Set();

function openPsRead(psId){
  curPsId=psId;selWords=[];
  const ps=passages.find(p=>p.id===psId);
  if(ps)renderPsRead(ps);
}

function renderPsRead(ps){
  const a=document.getElementById('pgcontent');
  // Tokenize by whitespace, wrap each word in span
  const html=ps.text.split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok))return tok;
    const clean=tok.replace(/^[^a-zA-Z]+|[^a-zA-Z]+$/g,'').toLowerCase();
    if(!clean)return esc(tok);
    const isSel=selWords.some(w=>w.lower===clean);
    return `<span class="pw${isSel?' sel':''}" data-word="${esc(clean)}" data-orig="${esc(tok)}">${esc(tok)}</span>`;
  }).join('');

  a.innerHTML=`<div class="wrap">
    <button class="backbtn" onclick="rPsList()">← 본문 목록</button>
    <div class="pghd"><h2>${esc(ps.title)}</h2>
      <p>💡 단어를 <b>클릭</b>하거나 <b>드래그</b>해서 선택 → 한꺼번에 뜻 입력 → 단어장 저장</p>
    </div>
    <div class="card" style="padding:20px 20px 0;">
      <div class="ptxt" id="ptxt">${html}</div>
      <div class="selbar" id="selbar">${renderSelBar()}</div>
    </div>
  </div>`;
  setupDrag();
}

function renderSelBar(){
  const chips=selWords.map(w=>`<span class="selchip">${esc(w.display)}<span class="scx" onclick="rmWord('${esc(w.lower)}')">✕</span></span>`).join('');
  return `<div class="selchips">${chips||'<span style="color:var(--text3);font-size:.82rem;">단어를 선택하면 여기에 표시됩니다</span>'}</div>
    ${selWords.length?`<button class="btn p" onclick="openMeaningModal()">📖 단어장 만들기 (${selWords.length})</button>`:''}`;
}

function setupDrag(){
  const ptxt=document.getElementById('ptxt');
  if(!ptxt)return;
  ptxt.addEventListener('mousedown',e=>{
    const pw=e.target.closest('.pw');
    isDrag=true; dragSet=new Set();
    if(pw){toggleWord(pw);dragSet.add(pw.dataset.word);}
    e.preventDefault();
  });
  ptxt.addEventListener('mouseover',e=>{
    if(!isDrag)return;
    const pw=e.target.closest('.pw');
    if(pw&&!dragSet.has(pw.dataset.word)){
      dragSet.add(pw.dataset.word);
      const w=pw.dataset.word,orig=pw.dataset.orig;
      if(!selWords.some(s=>s.lower===w)){
        const display=orig.replace(/^[^a-zA-Z]+|[^a-zA-Z]+$/g,'');
        selWords.push({lower:w,display});
        document.querySelectorAll(`.pw[data-word="${w}"]`).forEach(el=>el.classList.add('sel'));
        updateSelBar();
      }
    }
  });
  document.addEventListener('mouseup',()=>{isDrag=false;});
  // Touch support
  ptxt.addEventListener('touchstart',e=>{
    const pw=e.target.closest('.pw');
    if(pw){toggleWord(pw);}
    e.preventDefault();
  },{passive:false});
}

function toggleWord(el){
  const w=el.dataset.word;
  const orig=el.dataset.orig;
  const display=orig.replace(/^[^a-zA-Z]+|[^a-zA-Z]+$/g,'');
  const idx=selWords.findIndex(s=>s.lower===w);
  if(idx>=0){selWords.splice(idx,1);document.querySelectorAll(`.pw[data-word="${w}"]`).forEach(e=>e.classList.remove('sel'));}
  else{selWords.push({lower:w,display});document.querySelectorAll(`.pw[data-word="${w}"]`).forEach(e=>e.classList.add('sel'));}
  updateSelBar();
}

function updateSelBar(){const sb=document.getElementById('selbar');if(sb)sb.innerHTML=renderSelBar();}
function rmWord(w){const i=selWords.findIndex(s=>s.lower===w);if(i>=0)selWords.splice(i,1);document.querySelectorAll(`.pw[data-word="${w}"]`).forEach(e=>e.classList.remove('sel'));updateSelBar();}

async function saveMeanings(){
  const bkname=document.getElementById('bkname').value.trim()||'새 단어장';
  const day=document.getElementById('bkday').value.trim()||'1';
  const words=selWords.map((w,i)=>({en:w.display,kr:(document.getElementById('kr'+i)||{}).value.trim()||'(뜻 없음)'}));
  const existing=Object.values(customVocabs).find(b=>b.title===bkname);
  const bkId=existing?existing.id:'vocab-'+Date.now();
  const existDays=(existing&&existing.days)||{};
  await fbDb.collection('vocabBooks').doc(bkId).set({title:bkname,days:{...existDays,[day]:words},ownerUid:uid,updatedAt:new Date().toISOString()},{merge:false});

  const ps=passages.find(p=>p.id===curPsId);
  if(ps)renderPsRead(ps);
}

async function saveNewBk(){
  const title=document.getElementById('nb-title').value.trim();
  const day=document.getElementById('nb-day').value.trim()||'1';
  const raw=document.getElementById('nb-words').value.trim();
  if(!title)return alert('단어장 이름을 입력하세요.');
  const words=raw.split('\n').map(l=>{const[en,...r]=l.split('=');return{en:(en||'').trim(),kr:r.join('=').trim()};}).filter(w=>w.en&&w.kr);
  if(!words.length)return alert('형식에 맞게 입력하세요. (예: apple=사과)');
  await fbDb.collection('vocabBooks').doc('vocab-'+Date.now()).set({title,days:{[day]:words},ownerUid:uid,updatedAt:new Date().toISOString()});
  cm();
}

function exBkChange(id){
  const bk=getBook(id);
  const dsel=document.getElementById('ex-day');
  if(dsel)dsel.innerHTML=Object.keys(bk.days||{}).map(d=>`<option value="${d}">Day ${d}</option>`).join('');
}

function startExam(type){
  const bkSel=document.getElementById('ex-bk');
  const daySel=document.getElementById('ex-day');
  if(!bkSel||!daySel)return;
  const bk=getBook(bkSel.value);
  const words=(bk.days||{})[daySel.value]||[];
  if(words.length<4)return alert('최소 4개 이상의 단어가 필요합니다.');
  const shuffled=[...words].sort(()=>Math.random()-.5);
  examSt={words:shuffled,qIdx:0,score:0,type,bookTitle:bk.title,dayNum:daySel.value};
  rExamQ();
}

function rExamQ(){
  const{words,qIdx,type}=examSt;
  if(qIdx>=words.length){rExamResult();return;}
  const w=words[qIdx];
  const pct=Math.round((qIdx/words.length)*100);
  const a=document.getElementById('pgcontent');
  let qhtml='';
  if(type==='mc'){
    const others=words.filter((_,i)=>i!==qIdx).sort(()=>Math.random()-.5).slice(0,3);
    const opts=[w,...others].sort(()=>Math.random()-.5);
    qhtml=`<div class="exopts">${opts.map(o=>`<button class="exopt" onclick="checkMC(this,'${esc(o.kr)}','${esc(w.kr)}')">${esc(o.kr)}</button>`).join('')}</div>`;
  }else{
    qhtml=`<input class="exinp" id="exinp" placeholder="한국어 뜻 입력" onkeydown="if(event.key==='Enter')checkType()">
    <button class="btn p full mt8" onclick="checkType()">확인</button>`;
  }
  a.innerHTML=`<div class="wrap">
    <div class="exprog"><div class="exbar" style="width:${pct}%"></div></div>
    <div style="font-size:.8rem;color:var(--text3);text-align:center;margin-bottom:4px;">${qIdx+1} / ${words.length}</div>
    <div class="exqword">${esc(w.en)}</div>
    <p style="text-align:center;color:var(--text3);font-size:.82rem;margin-bottom:18px;">이 단어의 뜻은?</p>
    ${qhtml}
  </div>`;
  if(type==='type')setTimeout(()=>{const i=document.getElementById('exinp');if(i)i.focus();},100);
}

function checkMC(el,chosen,correct){
  document.querySelectorAll('.exopt').forEach(b=>b.classList.add('lk'));
  const ok=chosen===correct;
  el.classList.add(ok?'ok':'no');
  if(!ok)document.querySelectorAll('.exopt').forEach(b=>{if(b.textContent.trim()===correct)b.classList.add('ok');});
  if(ok)examSt.score++;
  setTimeout(()=>{examSt.qIdx++;rExamQ();},900);
}

function checkType(){
  const inp=document.getElementById('exinp');if(!inp)return;
  const val=inp.value.trim();if(!val)return;
  const correct=examSt.words[examSt.qIdx].kr;
  const ok=correct.split(/[,;]/).some(k=>k.trim()===val);
  inp.style.borderColor=ok?'var(--accent)':'var(--red)';
  inp.style.background=ok?'var(--accent-light)':'var(--red-light)';
  if(!ok){const h=document.createElement('p');h.style.cssText='color:var(--red);font-size:.85rem;margin-top:8px;text-align:center;';h.textContent=`정답: ${correct}`;inp.parentNode.appendChild(h);}
  if(ok)examSt.score++;
  setTimeout(()=>{examSt.qIdx++;rExamQ();},ok?700:1400);
}

async function rExamResult(){
  const{score,words,bookTitle,dayNum}=examSt;
  const pct=Math.round((score/words.length)*100);
  const a=document.getElementById('pgcontent');
  a.innerHTML=`<div class="wrap" style="text-align:center;">
    <div class="pghd"><h2>📊 <em>시험 결과</em></h2></div>
    <div class="card">
      <div class="rcirc"><div class="rnum">${pct}</div><div class="rlbl">점수</div></div>
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:5px;">${score} / ${words.length} 정답</div>
      <div style="font-size:.82rem;color:var(--text3);">${esc(bookTitle)} · Day ${esc(dayNum)}</div>
      <div class="dvd"></div>
      <button class="btn p full lg" onclick="rExamEntry()">다시 시험 보기</button>
    </div>
  </div>`;
  await fbDb.collection('submissions').add({studentUid:uid,type:'exam',examTitle:`${bookTitle} Day ${dayNum}`,score:pct,correct:score,total:words.length,timestamp:new Date().toISOString()});
}

// ── RESULTS (student) ──
function rResults(){
  const a=document.getElementById('pgcontent');
  const ss=submissions.filter(s=>s.studentUid===uid&&s.type==='exam').sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  a.innerHTML=`<div class="wrap">
    <div class="pghd"><h2>📊 <em>내 성적</em></h2></div>
    ${!ss.length?`<div class="empty"><div class="ei">📊</div><div class="et">시험 기록이 없습니다</div></div>`:''}
    ${ss.map(s=>`
      <div class="card" style="padding:14px 16px;">
        <div class="fb">
          <div><div style="font-weight:800;">${esc(s.examTitle||'시험')}</div><div style="font-size:.75rem;color:var(--text3);">${fd(s.timestamp)}</div></div>
          <div style="font-family:'Outfit';font-size:1.4rem;font-weight:900;color:${s.score>=80?'var(--accent-dark)':s.score>=60?'var(--blue)':'var(--red)'};">${s.score}점</div>
        </div>
        <div style="margin-top:8px;height:5px;background:var(--border);border-radius:5px;overflow:hidden;"><div style="height:100%;width:${s.score}%;background:${s.score>=80?'var(--accent)':s.score>=60?'var(--blue)':'var(--red)'};border-radius:5px;"></div></div>
      </div>
    `).join('')}
  </div>`;
}

// ── GEN EXAM / INBOX (teacher) ──
function rGenExam(){
  const a=document.getElementById('pgcontent');
  a.innerHTML=`<div class="wrap">
    <div class="pghd"><h2>🎯 <em>시험 출제</em></h2><p>학생들은 단어장을 선택해 직접 시험 볼 수 있습니다</p></div>
    <div class="card" style="text-align:center;padding:30px;">
      <div style="font-size:2rem;margin-bottom:10px;">✅</div>
      <p style="font-weight:700;">학생들이 직접 단어장과 Day를 선택해 시험을 봅니다</p>
      <p style="font-size:.82rem;color:var(--text3);margin-top:5px;">결과는 제출함과 학생 성적에서 확인하세요</p>
    </div>
    <div class="pghd mt20"><h2 style="font-size:1.1rem;">최근 제출 현황</h2></div>
    ${rInboxContent()}
  </div>`;
}

function rInbox(){
  const a=document.getElementById('pgcontent');
  a.innerHTML=`<div class="wrap"><div class="pghd"><h2>📥 <em>제출함</em></h2></div>${rInboxContent()}</div>`;
}

function rInboxContent(){
  const ss=submissions.filter(s=>s.type==='exam').sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  if(!ss.length)return `<div class="empty"><div class="ei">📭</div><div class="et">제출된 시험이 없습니다</div></div>`;
  return `<div class="card" style="padding:0;overflow:hidden;">
    <table class="wtbl">
      <thead><tr><th>학생</th><th>시험</th><th>점수</th><th>날짜</th></tr></thead>
      <tbody>${ss.map(s=>`<tr>
        <td>${esc(sname(s.studentUid))}</td>
        <td style="font-size:.78rem;">${esc(s.examTitle||'시험')}</td>
        <td><b style="color:${s.score>=80?'var(--accent-dark)':s.score>=60?'var(--blue)':'var(--red)'};">${s.score}점</b></td>
        <td style="color:var(--text3);font-size:.75rem;">${fd(s.timestamp)}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}
</script>
